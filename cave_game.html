<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마녀 설거지 게임</title>

<style>
body{
  margin:0;
  font-family:'GmarketSans', sans-serif;
  background:#111;
  display:flex;
  justify-content:center;
}

.game{
  position:relative;
  width:min(100%,900px);
}

.bg{
  width:100%;
  display:block;
}

/* HUD */
.hudPanel{
  position:absolute;
  top:10px;
  left:10px;
  background:#00000088;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

/* 버튼 */
button{
  cursor:pointer;
  border:none;
  border-radius:12px;
  padding:10px 16px;
  font-weight:bold;
}

#restartBtn{
  position:absolute;
  top:10px;
  right:10px;
  background:#ff9fd2;
}

/* 오버레이 */
#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.panel{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:80%;
  text-align:center;
}

#backBtn{
  margin-top:10px;
  width:100%;
  background:#6b5bff;
  color:white;
}

#successBtn{
  margin-top:10px;
  width:100%;
  background:#4caf50;
  color:white;
}

#retryBtn{
  margin-top:10px;
  width:100%;
  background:#ff9fd2;
}
</style>
</head>

<body>

<div class="game">
  <img src="images/witch_dish.png" class="bg">

  <div class="hudPanel">
    점수: <span id="score">0</span>
  </div>

  <button id="restartBtn">🔄</button>

  <!-- 결과 -->
  <div id="overlay">
    <div class="panel">
      <h2 id="title">결과</h2>
      <p id="text"></p>

      <!-- 버튼 영역 -->
      <div id="btnArea"></div>
    </div>
  </div>
</div>

<script>
const GOAL = 200;

let score = 0;
let gameOver = false;

const scoreEl = document.getElementById("score");
const overlay = document.getElementById("overlay");
const titleEl = document.getElementById("title");
const textEl = document.getElementById("text");
const btnArea = document.getElementById("btnArea");

document.getElementById("restartBtn").onclick = () => {
  resetGame();
};

/* ======================
   점수 테스트 (임시)
====================== */
setInterval(()=>{
  if(!gameOver){
    score += 10;
    scoreEl.textContent = score;

    if(score >= GOAL){
      endGame(true);
    }
  }
}, 800);

/* ======================
   종료 처리
====================== */
function endGame(success){
  gameOver = true;
  overlay.style.display = "flex";

  if(success){
    titleEl.textContent = "성공!";
    textEl.textContent = "설거지 완료!";

    btnArea.innerHTML = `
      <button id="successBtn">성공</button>
    `;

    document.getElementById("successBtn").onclick = () => {
      location.href = "cave_mage.html";
    };

  }else{
    titleEl.textContent = "실패!";
    textEl.textContent = "다시 도전해야 합니다.";

    btnArea.innerHTML = `
      <button id="retryBtn">다시하기</button>
      <button id="backBtn">돌아가기</button>
    `;

    document.getElementById("retryBtn").onclick = () => {
      resetGame();
    };

    document.getElementById("backBtn").onclick = () => {
      location.href = "cave_mage.html";
    };
  }
}

/* ======================
   리셋
====================== */
function resetGame(){
  score = 0;
  gameOver = false;
  scoreEl.textContent = 0;
  overlay.style.display = "none";
}
</script>

</body>
</html>
