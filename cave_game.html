
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Witch's Dish Rush — Alchemy Workshop</title>
<style>
  :root{
    --bg1:#2a2330;
    --bg2:#16111a;
    --gold:#f2c15d;
    --text:#f8f1ff;
    --panelA:#50345f;
    --panelB:#392344;
    --woodA:#7a4d22;
    --woodB:#5d391a;
    --woodC:#47270f;
    --glass:#a7e7ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body{
    touch-action:none;
    background:
      radial-gradient(circle at 50% 0%, rgba(123,92,153,.28), transparent 35%),
      radial-gradient(circle at 50% 100%, rgba(255,176,72,.16), transparent 28%),
      linear-gradient(180deg,var(--bg1),var(--bg2) 64%, #0d0a10 100%);
  }
  #app{position:relative;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #fx{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .rock{position:absolute;background:linear-gradient(180deg,#5c5057,#392f35);border-radius:40% 60% 55% 45% / 50% 40% 60% 50%;opacity:.92;filter:drop-shadow(0 12px 20px rgba(0,0,0,.25))}
  .crystal{position:absolute;width:0;height:0;filter:drop-shadow(0 0 12px rgba(127,224,255,.65))}
  .crystal.blue{border-left:24px solid transparent;border-right:24px solid transparent;border-bottom:80px solid #4dd5ff}
  .crystal.blue::before{content:"";position:absolute;left:-16px;top:22px;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:52px solid #8ce9ff}
  .crystal.purple{border-left:18px solid transparent;border-right:18px solid transparent;border-bottom:62px solid #9b6bff;filter:drop-shadow(0 0 12px rgba(179,123,255,.65))}
  .crystal.purple::before{content:"";position:absolute;left:-12px;top:18px;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:38px solid #d8b7ff}
  .candle{position:absolute;width:16px;height:42px;background:linear-gradient(180deg,#f7e5a8,#d1b16c);border-radius:8px 8px 5px 5px;box-shadow:0 0 8px rgba(255,204,120,.5)}
  .candle::before{content:"";position:absolute;left:50%;top:-18px;transform:translateX(-50%);width:20px;height:28px;border-radius:50% 50% 40% 40%;background:radial-gradient(circle at 50% 30%, #fff7bf 0%, #ffcb5b 42%, rgba(255,170,55,.55) 70%, rgba(255,170,55,0) 100%);animation:flicker 1.6s infinite alternate ease-in-out}
  .vine{position:absolute;width:10px;height:130px;background:linear-gradient(180deg,#6c8f3d,#39591f);border-radius:999px;opacity:.82}
  .herb{position:absolute;width:66px;height:12px;border-radius:999px;background:linear-gradient(90deg,#6d853a,#94ac51);transform:rotate(90deg)}
  .mist{position:absolute;left:50%;top:18%;transform:translateX(-50%);width:220px;height:80px;filter:blur(10px);background:radial-gradient(circle, rgba(208,156,255,.2), rgba(208,156,255,0) 70%)}
  @keyframes flicker{0%{transform:translateX(-50%) scale(1,.95) rotate(-2deg)}100%{transform:translateX(-50%) scale(1.08,1.1) rotate(2deg)}}

  #hud{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;padding:10px 10px 8px;align-items:stretch}
  .hudPanel{background:linear-gradient(180deg,#4a2f1e,#2f1d14);border:3px solid #7e5529;border-radius:18px;box-shadow:0 8px 18px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);padding:8px 10px;display:flex;flex-direction:column;justify-content:center;min-height:54px}
  .hudLabel{font-size:12px;color:#ffe3b4;letter-spacing:.6px}
  .hudValue{font-size:20px;font-weight:900;color:#fff4db;line-height:1.05}
  #restartBtn{border:none;border-radius:18px;padding:10px 14px;min-width:66px;background:linear-gradient(180deg,#68428c,#40254f);color:#fff;font-size:15px;font-weight:900;border:3px solid #9b72be;box-shadow:0 8px 18px rgba(0,0,0,.25)}

  #shelves{position:relative;z-index:2;display:flex;flex-direction:column;gap:10px;padding:0 10px 10px;min-height:0}
  .shelfWrap{position:relative;background:linear-gradient(180deg,var(--woodA),var(--woodB) 58%, var(--woodC));border:4px solid #8c5a2c;border-radius:18px;box-shadow:0 12px 24px rgba(0,0,0,.24), inset 0 2px 0 rgba(255,255,255,.08);padding:10px 10px 8px;overflow:hidden}
  .shelfTitle{display:flex;justify-content:space-between;align-items:center;color:#f8e3b0;font-weight:900;font-size:12px;margin-bottom:8px;letter-spacing:.4px}
  .shelfTitle .small{opacity:.85;font-weight:800}
  #bottleShelf{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  #bottleShelf::-webkit-scrollbar{display:none}
  .bottleCard{flex:0 0 auto;width:82px;height:102px;border-radius:16px;border:2px solid rgba(255,255,255,.08);background:linear-gradient(180deg,var(--panelA),var(--panelB));box-shadow:0 8px 16px rgba(0,0,0,.24);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;position:relative;color:#fff;overflow:hidden}
  .bottleCard.selected{outline:3px solid var(--gold);transform:translateY(-2px)}
  .bottleCard .badge{position:absolute;top:6px;right:6px;font-size:10px;font-weight:900;background:rgba(0,0,0,.25);padding:3px 7px;border-radius:999px}
  .bottleCard .name{margin-top:4px;font-size:12px;font-weight:900}
  .bottleCard .dirty{margin-top:2px;font-size:11px;opacity:.96}

  #workshop{position:relative;z-index:2;flex:1;min-height:0;display:flex;flex-direction:column;gap:10px}
  #mainStage{
    flex:1;min-height:0;margin:0 10px;
    position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
    border:2px solid rgba(255,255,255,.08);border-radius:24px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,220,128,.12), transparent 22%),
      linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  }
  #mainStage::before{
    content:"";position:absolute;inset:auto 0 0 0;height:42%;
    background:linear-gradient(180deg, rgba(28,19,16,.0), rgba(28,19,16,.3));pointer-events:none;
  }
  .arch{
    position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
    width:min(92vw,430px);height:min(64vw,280px);border-radius:44px 44px 50px 50px;
    border:1px solid rgba(255,255,255,.06);
    background:
      radial-gradient(circle at 50% 12%, rgba(255,215,120,.08), transparent 26%),
      linear-gradient(180deg, rgba(80,51,94,.12), rgba(45,27,60,.18));
    box-shadow:inset 0 0 36px rgba(0,0,0,.16);
  }
  .arch::before{
    content:"";position:absolute;left:50%;top:10px;transform:translateX(-50%);
    width:74%;height:42%;border-radius:50% 50% 0 0;
    border:8px solid rgba(255,255,255,.04);border-bottom:none;
    box-shadow:0 0 0 2px rgba(255,204,120,.05) inset;
  }
  .workbench{
    position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    width:min(82vw,390px);height:88px;border-radius:22px;
    background:
      linear-gradient(180deg,#8b5a29,#6b401c 52%,#4b2c12);
    border:4px solid #9a6737;
    box-shadow:0 18px 24px rgba(0,0,0,.22), inset 0 2px 0 rgba(255,255,255,.08);
  }
  .workbench::before{
    content:"";position:absolute;left:16px;right:16px;top:18px;height:12px;border-radius:999px;
    background:linear-gradient(90deg,rgba(255,255,255,.08),rgba(255,255,255,.01),rgba(255,255,255,.08));
  }
  .workbench::after{
    content:"";position:absolute;left:50%;top:-28px;transform:translateX(-50%);
    width:120px;height:36px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,220,120,.15), rgba(255,220,120,0) 70%);
    filter:blur(2px);
  }
  .magicRing{
    position:absolute;left:50%;bottom:90px;transform:translateX(-50%);
    width:280px;height:280px;border-radius:50%;
    border:2px solid rgba(118,225,255,.12);
    background:radial-gradient(circle, rgba(118,225,255,.10) 0 2px, transparent 3px) center/18px 18px;
    opacity:.55;filter:drop-shadow(0 0 18px rgba(118,225,255,.2));
  }
  .magicRing::before{
    content:"";position:absolute;inset:26px;border-radius:50%;
    border:1px solid rgba(242,193,93,.18);
  }

  .centerArea{
    position:absolute;left:50%;top:49%;transform:translate(-50%,-50%);
    width:min(74vw,340px);height:min(74vh,360px);display:flex;align-items:center;justify-content:center;
  }

  .bottleStage{
    position:relative;width:min(68vw,300px);height:min(64vh,320px);min-height:240px;
    display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,.25));
    animation:floaty 2.8s ease-in-out infinite alternate;
  }
  @keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-4px)}}
  .bottleStage .bottleShell{
    position:absolute;inset:0;border-radius:34px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
    border:1px solid rgba(255,255,255,.06);
    box-shadow:inset 0 0 38px rgba(0,0,0,.12);
  }
  .bottleStage .titleBar{
    position:absolute;left:50%;top:6px;transform:translateX(-50%);
    padding:6px 14px;border-radius:999px;
    background:linear-gradient(180deg,rgba(60,31,75,.92),rgba(34,18,41,.92));
    border:2px solid rgba(242,193,93,.35);
    font-size:14px;font-weight:900;color:#fff4cf;
    z-index:6;
  }
  .bottleStage .subBar{
    position:absolute;left:50%;top:40px;transform:translateX(-50%);
    padding:5px 12px;border-radius:999px;
    background:rgba(25,14,35,.72);
    border:1px solid rgba(255,255,255,.08);
    font-size:12px;font-weight:800;color:#fff2d0;
    z-index:6;
  }
  .bottleStage .needBar{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    padding:6px 12px;border-radius:999px;
    background:rgba(71,43,88,.78);
    border:2px solid rgba(242,193,93,.25);
    font-size:12px;font-weight:900;color:#fff5dd;
    z-index:6;
  }

  .centerGlow{
    position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);
    width:120%;height:120%;border-radius:50%;
    background:radial-gradient(circle, rgba(242,193,93,.12) 0 22%, rgba(242,193,93,0) 60%);
    z-index:0;
  }

  .centerBottleWrap{
    position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:4;
  }
  .selectedBottle{
    width:100%;height:100%;position:relative;
  }

  .scrubMeter{
    position:absolute;left:50%;bottom:58px;transform:translateX(-50%);
    width:60%;height:10px;border-radius:999px;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.1);overflow:hidden;z-index:7;display:none
  }
  .scrubMeter.show{display:block}
  .scrubMeter > span{display:block;height:100%;width:0%;background:linear-gradient(90deg,#bdf4ff,#fff);transition:width .08s linear}

  .plaque{
    position:absolute;left:50%;bottom:156px;transform:translateX(-50%);
    width:min(78vw,350px);padding:8px 12px;border-radius:18px;
    background:linear-gradient(180deg,#5b3520,#321d12);
    border:3px solid #8d5b2b;
    box-shadow:0 8px 18px rgba(0,0,0,.22);
    text-align:center;font-size:12px;line-height:1.45;color:#fff2d0;
  }
  .plaque strong{color:#ffe7a7}

  #tools{position:relative;z-index:2;padding:0 10px 10px;margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tool{min-height:90px;border:none;border-radius:20px;color:#fff;background:linear-gradient(180deg,#4f2c62,#341d43);border:3px solid #a56acc;box-shadow:0 10px 18px rgba(0,0,0,.23), inset 0 1px 0 rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;gap:2px;font-weight:900}
  .tool .emoji{font-size:28px;line-height:1}
  .tool .name{font-size:14px}
  .tool .desc{font-size:10px;color:#eadcff;opacity:.9}
  .tool.active{outline:3px solid var(--gold);transform:translateY(-1px)}
  #helpBar{grid-column:1 / -1;background:linear-gradient(180deg,#4a3122,#2e1f16);border:3px solid #8d5b2b;border-radius:18px;padding:10px 12px;box-shadow:0 8px 18px rgba(0,0,0,.2);color:#fff1d0;font-size:13px;line-height:1.4}
  #helpBar strong{color:#ffe7a7}

  #toast{position:absolute;left:50%;top:10px;transform:translateX(-50%);background:rgba(0,0,0,.56);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:900;opacity:0;transition:.18s;pointer-events:none;z-index:20}
  #toast.show{opacity:1}

  #overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:30;
    padding:20px;
  }
  #overlay .panel{
    width:min(92vw,430px);
    background:linear-gradient(180deg,#392547,#211729);
    border:3px solid #9d6bcb;
    border-radius:24px;
    padding:20px;
    text-align:center;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
  }
  #overlay h2{margin:0 0 10px;font-size:28px}
  #overlay p{margin:8px 0;color:#dccdf0;line-height:1.5;white-space:pre-line}
  .endActions{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:14px;
  }
  .endActions button{
    width:100%;
    border:none;
    border-radius:16px;
    padding:14px 16px;
    font-size:16px;
    font-weight:900;
    cursor:pointer;
  }
  #successBtn{
    background:linear-gradient(180deg,#f2c15d,#e3a440);
    color:#281b07;
  }
  #retryBtn{
    background:linear-gradient(180deg,#ff6b6b,#e94b4b);
    color:#fff;
  }
  #backBtn{
    background:linear-gradient(180deg,#7c5cff,#5b3fe0);
    color:#fff;
  }

  .spark{position:absolute;width:10px;height:10px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,#fff 0%,rgba(255,255,255,.1) 70%,rgba(255,255,255,0) 100%);animation:spark .65s ease-out forwards;z-index:20}
  @keyframes spark{from{transform:scale(.6);opacity:1}to{transform:translate(var(--dx),var(--dy)) scale(2.4);opacity:0}}

  .iconWrap svg{width:100%;height:100%;overflow:visible}
  .glassStroke{fill:none;stroke:#d8c9a9;stroke-width:2.8;opacity:.92}
  .glassBody{fill:#ffffff;opacity:.08}
  .glassHighlight{fill:#fff;opacity:.16}
  .liquidFill{opacity:.92}
  .effectLayer{pointer-events:none}
  .effectPoison circle{fill:#78ff59;opacity:.92;animation:bubbleRise 1.6s infinite ease-in-out}
  .effectSlime path{fill:#d14fff;opacity:.9;animation:dripDown 1.7s infinite alternate ease-in-out}
  .effectSlime .goo{fill:#b53dff;opacity:.7}
  .effectFire path,.effectFire polygon{fill:#ff7d39;opacity:.95;animation:fireDance 1.1s infinite alternate ease-in-out}
  .effectFire .ember{fill:#ffbd4d;opacity:.85}
  .effectIce path,.effectIce polygon{fill:#9fefff;opacity:.9;animation:frostGlint 1.6s infinite alternate ease-in-out}
  .effectIce .crystal{fill:#d8fbff;opacity:.85}
  .shineLine{stroke:#fff;stroke-width:2;opacity:.2}
  @keyframes bubbleRise{0%{transform:translateY(8px) scale(.7);opacity:0}20%{opacity:1}100%{transform:translateY(-18px) scale(1.1);opacity:0}}
  @keyframes dripDown{0%{transform:translateY(0) scaleY(.85);opacity:.3}50%{opacity:1}100%{transform:translateY(10px) scaleY(1.15);opacity:.55}}
  @keyframes fireDance{from{opacity:.45;transform:scale(.98) rotate(-1deg)}to{opacity:1;transform:scale(1.03) rotate(1deg)}}
  @keyframes frostGlint{0%{opacity:.25;transform:scale(.8)}100%{opacity:1;transform:scale(1.05)}}

  #cursorToken{position:absolute;left:0;top:0;z-index:50;display:none;pointer-events:none;transform:translate(-50%,-50%)}
  .token{
    width:60px;height:60px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:32px;font-weight:900;
    box-shadow:0 10px 20px rgba(0,0,0,.28);
    border:3px solid rgba(255,255,255,.16);
    user-select:none;
  }
  .token.water{background:linear-gradient(180deg, rgba(61,143,255,.98), rgba(24,86,190,.98))}
  .token.scrub{background:linear-gradient(180deg, rgba(116,102,74,.98), rgba(74,58,38,.98))}
  .token.heat{background:linear-gradient(180deg, rgba(255,116,61,.98), rgba(150,55,18,.98))}
  .token.cool{background:linear-gradient(180deg, rgba(122,226,255,.98), rgba(36,129,191,.98))}
  .token::after{content:"";position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(255,255,255,.12)}
  .tokenLine{position:absolute;width:2px;height:28px;background:rgba(255,255,255,.12);top:58px;left:50%;transform:translateX(-50%);border-radius:999px}

  .selectedBottle svg{width:100%;height:100%}
  .selectedBottle .shellGlow{
    position:absolute;inset:12px;border-radius:34px;
    background:radial-gradient(circle at 50% 30%, rgba(255,255,255,.06), rgba(255,255,255,0) 65%);
    box-shadow:inset 0 0 28px rgba(255,255,255,.04);
  }
  .selectedBottle .bottleLabel{
    position:absolute;left:50%;top:8px;transform:translateX(-50%);
    padding:5px 12px;border-radius:999px;background:rgba(0,0,0,.20);
    font-size:12px;font-weight:900;color:#fff7dc
  }
  .selectedBottle .bottleHint{
    position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
    padding:5px 12px;border-radius:999px;background:rgba(0,0,0,.20);
    font-size:12px;font-weight:900;color:#fff7dc
  }
  @media (max-width:380px){
    .hudValue{font-size:18px}
    .bottleCard{width:74px;height:94px}
    .tool{min-height:84px}
    .plaque{bottom:146px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="fx">
    <div class="mist"></div>
    <div class="rock" style="left:-20px;top:-18px;width:180px;height:120px;transform:rotate(12deg)"></div>
    <div class="rock" style="right:-28px;top:0;width:170px;height:150px;transform:rotate(-10deg)"></div>
    <div class="rock" style="left:12px;bottom:20px;width:120px;height:80px;transform:rotate(-18deg)"></div>
    <div class="rock" style="right:8px;bottom:6px;width:140px;height:96px;transform:rotate(14deg)"></div>
    <div class="crystal blue" style="left:8px;top:40%;transform:scale(.9)"></div>
    <div class="crystal blue" style="right:8px;top:18%;transform:scale(.72)"></div>
    <div class="crystal purple" style="left:12px;bottom:22%;transform:scale(.72)"></div>
    <div class="crystal purple" style="right:10px;bottom:16%;transform:scale(.9)"></div>
    <div class="candle" style="left:20px;top:30%;transform:scale(.9)"></div>
    <div class="candle" style="right:18px;top:62%;transform:scale(.85)"></div>
    <div class="vine" style="left:52px;top:52px"></div>
    <div class="vine" style="right:58px;top:56px"></div>
    <div class="herb" style="left:44px;top:18px"></div>
    <div class="herb" style="right:36px;top:22px;transform:rotate(-90deg)"></div>
  </div>

  <div id="hud">
    <div class="hudPanel"><div class="hudLabel">점수</div><div class="hudValue" id="score">0</div></div>
    <div class="hudPanel"><div class="hudLabel">시간</div><div class="hudValue" id="time">02:00</div></div>
    <div class="hudPanel"><div class="hudLabel">콤보</div><div class="hudValue" id="combo">0</div></div>
    <button id="restartBtn">🔄</button>
  </div>

  <div id="shelves">
    <div class="shelfWrap">
      <div class="shelfTitle"><span>주문 목록</span><span class="small" id="countText">0 / 8</span></div>
      <div id="bottleShelf"></div>
    </div>
  </div>

  <div id="workshop">
    <div id="mainStage">
      <div id="toast"></div>
      <div id="cursorToken"></div>
      <div class="arch"></div>
      <div class="workbench"></div>

      <div class="centerArea">
        <div class="bottleStage" id="bottleStage">
          <div class="centerGlow"></div>
          <div class="bottleShell"></div>
          <div class="titleBar" id="centerInfo">병을 선택하세요</div>
          <div class="subBar" id="centerSub">병을 선택하세요</div>
          <div class="needBar" id="centerNeed">도구 선택 → 병 터치</div>
          <div class="centerBottleWrap">
            <div class="selectedBottle" id="selectedCard" style="display:none;">
              <div class="shellGlow"></div>
              <div class="scrubMeter" id="scrubMeter"><span></span></div>
              <div class="bottleLabel" id="centerName">-</div>
              <div class="bottleHint" id="centerDirty">-</div>
              <div id="centerIconWrap" style="width:100%;height:100%;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="tools">
    <button class="tool" data-tool="water"><div class="emoji">🚰</div><div class="name">수도꼭지</div><div class="desc">병에 닿으면 물</div></button>
    <button class="tool" data-tool="scrub"><div class="emoji">🧽</div><div class="name">수세미</div><div class="desc">병 위에서 문지르기</div></button>
    <button class="tool" data-tool="heat"><div class="emoji">🔥</div><div class="name">버너</div><div class="desc">병에 닿으면 불</div></button>
    <button class="tool" data-tool="cool"><div class="emoji">❄️</div><div class="name">냉각 수정</div><div class="desc">병에 닿으면 정리</div></button>
    <div id="helpBar"><strong>목표:</strong> 200점 이상이면 성공, 그 아래는 실패. <strong>조작:</strong> 도구를 선택한 뒤 병을 클릭하면 바로 적용됩니다.</div>
  </div>

  <div id="overlay">
    <div class="panel">
      <h2 id="endTitle">게임 오버</h2>
      <p id="endText">-</p>
      <div class="endActions" id="endActions"></div>
    </div>
  </div>
</div>

<script>
(() => {
  const GOAL = 200;

  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const comboEl = document.getElementById('combo');
  const countText = document.getElementById('countText');
  const shelf = document.getElementById('bottleShelf');
  const toast = document.getElementById('toast');
  const mainStage = document.getElementById('mainStage');
  const bottleStage = document.getElementById('bottleStage');
  const centerInfo = document.getElementById('centerInfo');
  const centerSub = document.getElementById('centerSub');
  const centerNeed = document.getElementById('centerNeed');
  const selectedCard = document.getElementById('selectedCard');
  const centerName = document.getElementById('centerName');
  const centerDirty = document.getElementById('centerDirty');
  const centerIconWrap = document.getElementById('centerIconWrap');
  const scrubMeterWrap = document.getElementById('scrubMeter');
  const scrubMeter = scrubMeterWrap.querySelector('span');
  const overlay = document.getElementById('overlay');
  const endTitle = document.getElementById('endTitle');
  const endText = document.getElementById('endText');
  const endActions = document.getElementById('endActions');
  const restartBtn = document.getElementById('restartBtn');
  const toolBtns = [...document.querySelectorAll('.tool')];
  const cursorToken = document.getElementById('cursorToken');

  const dirtRules = {
    독:   { icon:'🟢', steps:['water','scrub'], label:'독', effect:'effectPoison' },
    점액: { icon:'🟣', steps:['scrub','water'], label:'점액', effect:'effectSlime' },
    화염: { icon:'🔴', steps:['cool','water'], label:'화염', effect:'effectFire' },
    얼음: { icon:'🔵', steps:['heat','water'], label:'얼음', effect:'effectIce' }
  };

  const bottleTypes = [
    { name:'시험관', type:'tube', points:10, dirty:['독','점액'], liquid:['#68d8ff','#2579d1'] },
    { name:'플라스크', type:'flask', points:20, dirty:['독','화염','얼음','점액'], liquid:['#ffcb6c','#ff8d22'] },
    { name:'가마솥', type:'cauldron', points:35, dirty:['독','화염','점액','얼음'], liquid:['#b4ff55','#4ea316'] }
  ];

  let uidSeed = 0;
  const uid = () => `b_${Date.now()}_${uidSeed++}`;

  const state = {
    score: 0, time: 120, combo: 0, best: 0,
    activeTool: null, selected: null, bottles: [],
    over: false, spawnTimer: null, tickTimer: null, spawnMs: 2400
  };

  let pointer = { x: 0, y: 0, down: false };
  let latch = false;
  let scrubLoop = null;
  let activeToken = null;

  try { state.best = Number(localStorage.getItem('witch_best_score') || 0) || 0; } catch {}

  function saveBest() {
    try {
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem('witch_best_score', String(state.best));
      }
    } catch {}
  }

  function rand(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
  function weightedDirty(list){
    const pool = [];
    list.forEach(d=>{
      const w = d === '점액' ? 1 : 3;
      for(let i=0;i<w;i++) pool.push(d);
    });
    return rand(pool);
  }
  function fmtTime(sec){ const m=Math.floor(sec/60), s=sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }

  function toastMsg(msg, good = true) {
    toast.textContent = msg;
    toast.style.background = good ? 'rgba(47,21,68,.74)' : 'rgba(120,20,20,.82)';
    toast.classList.add('show');
    clearTimeout(toastMsg.t);
    toastMsg.t = setTimeout(() => toast.classList.remove('show'), 820);
  }

  function hud() {
    scoreEl.textContent = state.score;
    timeEl.textContent = fmtTime(state.time);
    comboEl.textContent = state.combo;
    countText.textContent = `${state.bottles.length} / 8`;
  }

  function stepLabel(step) {
    return step === 'water' ? '물' : step === 'scrub' ? '수세미' : step === 'heat' ? '가열' : '냉각';
  }

  function bottleSVG(type, liquid1, liquid2, dirty) {
    const effect = dirtRules[dirty].effect;
    const effects = {
      effectPoison: `
        <g class="effectLayer effectPoison">
          <circle cx="52" cy="70" r="3.8"></circle>
          <circle cx="65" cy="80" r="5.1"></circle>
          <circle cx="76" cy="66" r="3.8"></circle>
          <circle cx="60" cy="94" r="6.6"></circle>
        </g>`,
      effectSlime: `
        <g class="effectLayer effectSlime">
          <path class="goo" d="M46 70c0 8 6 14 14 14s14-6 14-14c0-6-4-11-10-13 0 0-2-5-4-7-2 2-4 7-4 7-6 2-10 7-10 13z"></path>
          <path d="M74 86c0 6 4 10 9 10 6 0 10-4 10-10 0-4-2-7-6-8 0 0-1-4-2-6-1 2-2 6-2 6-4 1-9 4-9 8z"></path>
          <path d="M37 84c0 6 4 10 9 10 6 0 10-4 10-10 0-4-2-7-6-8 0 0-1-4-2-6-1 2-2 6-2 6-4 1-9 4-9 8z"></path>
        </g>`,
      effectFire: `
        <g class="effectLayer effectFire">
          <path d="M53 105c-5-12 2-20 9-28 2 6 7 8 9 14 2 6 0 13-4 19-3 4-8 6-14 6-1-3-1-7 0-11z"></path>
          <path class="ember" d="M79 94c-3-7 1-12 5-17 1 4 4 5 6 9 1 4 0 8-2 12-2 3-5 4-9 4-1-2-1-5 0-8z"></path>
          <polygon points="45,89 51,76 56,88 61,72 67,86 72,78 76,88 76,98 45,98"></polygon>
        </g>`,
      effectIce: `
        <g class="effectLayer effectIce">
          <polygon class="crystal" points="46,70 52,61 58,70 52,81"></polygon>
          <polygon class="crystal" points="69,74 75,65 81,74 75,85"></polygon>
          <polygon class="crystal" points="59,92 65,83 71,92 65,103"></polygon>
          <path d="M43 62h44" class="shineLine"></path>
          <path d="M47 107h36" class="shineLine"></path>
        </g>`
    };

    if (type === 'tube') {
      return `
      <svg viewBox="0 0 120 140" aria-hidden="true">
        <defs><linearGradient id="tubeLiquid_${dirty}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${liquid1}"/><stop offset="100%" stop-color="${liquid2}"/></linearGradient></defs>
        <path class="glassBody" d="M42 18 h36 v66 c0 8 8 18 18 36 5 9 4 20-2 28-7 9-18 14-34 14H60c-16 0-27-5-34-14-6-8-7-19-2-28 10-18 18-28 18-36V18z"/>
        <path class="glassStroke" d="M42 18 h36 v66 c0 8 8 18 18 36 5 9 4 20-2 28-7 9-18 14-34 14H60c-16 0-27-5-34-14-6-8-7-19-2-28 10-18 18-28 18-36V18z"/>
        <path class="glassStroke" d="M44 18 h32"/>
        <path class="glassHighlight" d="M49 28 h8 v80 h-8z"/>
        <path class="liquidFill" d="M47 74 h26 c0 7 7 16 16 33 4 8 3 16-2 22-6 7-15 11-27 11H60c-13 0-22-4-28-11-5-6-6-14-2-22 9-17 17-26 17-33z" fill="url(#tubeLiquid_${dirty})"/>
        ${effects[effect]}
      </svg>`;
    }

    if (type === 'flask') {
      return `
      <svg viewBox="0 0 120 140" aria-hidden="true">
        <defs><linearGradient id="flaskLiquid_${dirty}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${liquid1}"/><stop offset="100%" stop-color="${liquid2}"/></linearGradient></defs>
        <path class="glassBody" d="M54 14 h12 v24 l6 11 18 31c6 10 8 22 5 32-5 16-19 28-35 28H60c-16 0-30-12-35-28-3-10-1-22 5-32l18-31 6-11V14z"/>
        <path class="glassStroke" d="M54 14 h12 v24 l6 11 18 31c6 10 8 22 5 32-5 16-19 28-35 28H60c-16 0-30-12-35-28-3-10-1-22 5-32l18-31 6-11V14z"/>
        <path class="glassStroke" d="M54 14 h12"/>
        <path class="glassHighlight" d="M52 28 h7 v72 h-7z"/>
        <path class="liquidFill" d="M43 70h34l13 22c5 9 7 18 4 26-4 12-15 22-28 22H60c-13 0-24-10-28-22-3-8-1-17 4-26l7-12z" fill="url(#flaskLiquid_${dirty})"/>
        ${effects[effect]}
      </svg>`;
    }

    return `
      <svg viewBox="0 0 120 140" aria-hidden="true">
        <defs><linearGradient id="potLiquid_${dirty}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${liquid1}"/><stop offset="100%" stop-color="${liquid2}"/></linearGradient></defs>
        <path class="glassBody" d="M34 40c0-10 12-18 26-18h0c14 0 26 8 26 18v6c0 3 2 6 5 8 10 8 17 20 17 34 0 24-21 44-48 44H60c-27 0-48-20-48-44 0-14 7-26 17-34 3-2 5-5 5-8v-6z"/>
        <path class="glassStroke" d="M34 40c0-10 12-18 26-18h0c14 0 26 8 26 18v6c0 3 2 6 5 8 10 8 17 20 17 34 0 24-21 44-48 44H60c-27 0-48-20-48-44 0-14 7-26 17-34 3-2 5-5 5-8v-6z"/>
        <path class="glassStroke" d="M41 44c0-6 8-11 19-11h0c11 0 19 5 19 11"/>
        <path class="glassHighlight" d="M46 38h7v62h-7z"/>
        <ellipse cx="60" cy="104" rx="32" ry="17" fill="url(#potLiquid_${dirty})"/>
        <path class="liquidFill" d="M31 83c0-16 13-29 29-29h0c16 0 29 13 29 29v15c0 6-3 12-7 16-6 6-14 10-22 10H60c-8 0-16-4-22-10-4-4-7-10-7-16V83z" fill="url(#potLiquid_${dirty})"/>
        ${effects[effect]}
      </svg>`;
  }

  function renderBottleIcon(type, liquid1, liquid2, dirty) {
    return `<div class="iconWrap">${bottleSVG(type, liquid1, liquid2, dirty)}</div>`;
  }

  function applyBottleTheme(v) {
    centerIconWrap.innerHTML = renderBottleIcon(v.type, v.liquid[0], v.liquid[1], v.dirty);
  }

  function renderCenter() {
    toolBtns.forEach(b => b.classList.toggle('active', b.dataset.tool === state.activeTool));
    if (!state.selected) {
      centerInfo.textContent = '병을 선택하세요';
      centerSub.textContent = '병을 선택하세요';
      centerNeed.textContent = '도구 선택 → 병 터치';
      selectedCard.style.display = 'none';
      scrubMeterWrap.classList.remove('show');
      return;
    }

    const v = state.selected;
    centerInfo.textContent = '작업 중';
    centerSub.textContent = `${v.steps.map(stepLabel).join(' → ')}`;
    centerNeed.textContent = `필요 도구: ${stepLabel(v.steps[v.progress])}`;
    centerName.textContent = v.name;
    centerDirty.textContent = dirtRules[v.dirty].label;
    applyBottleTheme(v);
    selectedCard.style.display = 'block';
    scrubMeterWrap.classList.toggle('show', state.activeTool === 'scrub');
  }

  function renderShelf() {
    shelf.innerHTML = '';
    state.bottles.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'bottleCard';
      if (state.selected && state.selected.id === v.id) btn.classList.add('selected');
      btn.innerHTML = `
        <div class="badge">${dirtRules[v.dirty].icon}</div>
        ${renderBottleIcon(v.type, v.liquid[0], v.liquid[1], v.dirty)}
        <div class="name">${v.name}</div>
        <div class="dirty">${dirtRules[v.dirty].label}</div>
      `;
      btn.addEventListener('click', () => selectBottle(v.id));
      v.el = btn;
      shelf.appendChild(btn);
    });
    countText.textContent = `${state.bottles.length} / 8`;
  }

  function selectBottle(id) {
    const v = state.bottles.find(x => x.id === id);
    if (!v || v.done) return;
    state.selected = v;
    renderShelf();
    renderCenter();
    navigator.vibrate?.(10);
  }

  function createBottle() {
    if (state.over) return;
    if (state.bottles.length >= 8) {
      endGame(false, '선반 가득!', '더는 둘 자리가 없어요.');
      return;
    }
    const spec = rand(bottleTypes);
    const dirty = weightedDirty(spec.dirty);
    const v = {
      id: uid(),
      name: spec.name,
      type: spec.type,
      points: spec.points,
      dirty,
      steps: [...dirtRules[dirty].steps],
      progress: 0,
      scrub: 0,
      done: false,
      liquid: spec.liquid
    };
    state.bottles.push(v);
    renderShelf();
    if (!state.selected) selectBottle(v.id);
  }

  function showSpark(x, y) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = `${x}px`;
    s.style.top = `${y}px`;
    s.style.setProperty('--dx', `${Math.random()*90 - 45}px`);
    s.style.setProperty('--dy', `${Math.random()*90 - 45}px`);
    mainStage.appendChild(s);
    setTimeout(() => s.remove(), 680);
  }

  function addScore(base) {
    state.score += base + Math.floor(state.combo * 2);
    state.combo += 1;
    saveBest();
    hud();
    if (state.score >= GOAL && !state.over) endGame(true, '성공!', '설거지를 다 했어요!','가마솥 비밀번호는 1010');
  }

  function resetCombo() {
    state.combo = 0;
    hud();
  }

  function finishBottle(v) {
    if (v.done || state.over) return;
    addScore(v.points);
    toastMsg(`완료! +${v.points}점`, true);
    navigator.vibrate?.([18, 26, 18]);
    v.done = true;
    state.bottles = state.bottles.filter(x => x.id !== v.id);
    if (state.selected && state.selected.id === v.id) state.selected = null;
    renderShelf();
    renderCenter();
    if (state.bottles.length === 0 && !state.over) setTimeout(() => createBottle(), 450);
  }

  function wrong(msg) {
    resetCombo();
    toastMsg(msg, false);
    navigator.vibrate?.(35);
  }

  function applyTool(tool) {
    if (state.over) return;
    if (!state.selected) return toastMsg('먼저 병을 선택하세요.', false);

    const v = state.selected;
    const need = v.steps[v.progress];

    if (tool === 'scrub') {
      if (need !== 'scrub') return wrong('지금은 수세미가 아니에요.');
      v.scrub = Math.min(3, (v.scrub || 0) + 1);
      scrubMeterWrap.classList.add('show');
      scrubMeter.style.width = `${v.scrub * 33.33}%`;
      showSpark(180 + Math.random()*30, 190 + Math.random()*40);
      toastMsg(`문지르는 중 ${v.scrub}/3`, true);
      if (v.scrub >= 3) {
        v.scrub = 0;
        scrubMeter.style.width = '0%';
        v.progress += 1;
        if (v.progress >= v.steps.length) finishBottle(v);
        else renderCenter();
      }
      return;
    }

    if (tool !== need) return wrong(`지금 필요한 건 ${stepLabel(need)}이에요.`);
    v.progress += 1;
    showSpark(165, 128);
    toastMsg(`${stepLabel(tool)} 성공!`, true);
    navigator.vibrate?.(15);

    if (v.progress >= v.steps.length) finishBottle(v);
    else renderCenter();
  }

  function clearTimers() {
    if (state.spawnTimer) clearInterval(state.spawnTimer);
    if (state.tickTimer) clearInterval(state.tickTimer);
    state.spawnTimer = null;
    state.tickTimer = null;
  }

  function goMageHome() {
    location.href = "cave_mage.html";
  }

  function endGame(isWin, title, text) {
    state.over = true;
    clearTimers();
    saveBest();

    endTitle.textContent = isWin ? "🎉 성공" : "💀 실패";
    endText.innerHTML = `
      ${text}<br><br>
      <b>결과:</b> ${isWin ? "성공" : "실패"}<br>
      <b>최종 점수:</b> ${state.score}<br>
      <b>최고 점수:</b> ${state.best}
    `;

    endActions.innerHTML = isWin
      ? `<button id="successBtn">성공</button>`
      : `
          <button id="retryBtn">다시하기</button>
          <button id="backBtn">돌아가기</button>
        `;

    overlay.style.display = "flex";

    const successBtn = document.getElementById("successBtn");
    if (successBtn) successBtn.onclick = goMageHome;

    const retryBtn = document.getElementById("retryBtn");
    if (retryBtn) retryBtn.onclick = resetGame;

    const backBtn = document.getElementById("backBtn");
    if (backBtn) backBtn.onclick = goMageHome;
  }

  function resetGame() {
    clearTimers();
    state.score = 0;
    state.time = 120;
    state.combo = 0;
    state.activeTool = null;
    state.selected = null;
    state.bottles = [];
    state.over = false;
    state.spawnMs = 2400;

    overlay.style.display = "none";
    toast.classList.remove('show');
    scrubMeter.style.width = "0%";
    scrubMeterWrap.classList.remove('show');
    shelf.innerHTML = "";
    selectedCard.style.display = "none";
    hud();

    for (let i = 0; i < 4; i++) createBottle();
    renderShelf();
    renderCenter();
    toastMsg("다시 시작!", true);

    state.spawnTimer = setInterval(() => {
      if (!state.over) createBottle();
    }, state.spawnMs);

    state.tickTimer = setInterval(() => {
      if (state.over) return;
      state.time--;
      hud();
      if (state.time <= 0) endGame(false, '시간 종료', '마녀의 작업 시간이 끝났어요.');
    }, 1000);
  }

  function getCenterBottleRect() {
    if (!state.selected || selectedCard.style.display === 'none') return null;
    return selectedCard.getBoundingClientRect();
  }

  function updateCursorToken(tool, x, y) {
    if (!tool) return;
    if (!activeToken || activeToken.dataset.tool !== tool) {
      if (activeToken) activeToken.remove();
      activeToken = document.createElement('div');
      activeToken.id = 'cursorToken';
      activeToken.dataset.tool = tool;
      activeToken.style.display = 'block';
      activeToken.innerHTML = `<div class="token ${tool}">${tool==='water'?'💧':tool==='scrub'?'🧽':tool==='heat'?'🔥':'❄️'}<div class="tokenLine"></div></div>`;
      document.body.appendChild(activeToken);
    }
    activeToken.style.left = `${x}px`;
    activeToken.style.top = `${y}px`;
    activeToken.style.display = 'block';
  }

  function clearCursorToken() {
    if (activeToken) activeToken.remove();
    activeToken = null;
  }

  function pointInRect(x, y, rect) {
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  function toolLogicFromPointer(x, y) {
    if (!state.activeTool || !state.selected || state.over) return;
    const rect = getCenterBottleRect();
    if (!rect) return;

    const inside = pointInRect(x, y, rect);
    if (state.activeTool === 'scrub') {
      if (inside && pointer.down) {
        if (!scrubLoop) {
          scrubLoop = setInterval(() => {
            const r = getCenterBottleRect();
            if (!r || !state.selected || !pointer.down) return;
            if (pointInRect(pointer.x, pointer.y, r)) applyTool('scrub');
          }, 90);
        }
      } else {
        if (scrubLoop) { clearInterval(scrubLoop); scrubLoop = null; }
      }
    } else {
      if (inside && !latch) {
        applyTool(state.activeTool);
        latch = true;
      }
      if (!inside) latch = false;
    }
  }

  toolBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeTool = btn.dataset.tool;
      latch = false;
      renderCenter();
      toastMsg(`${btn.querySelector('.name').textContent} 선택`, true);
      updateCursorToken(state.activeTool, pointer.x || window.innerWidth/2, pointer.y || 120);
    });
  });

  window.addEventListener('pointerdown', (e) => {
    pointer.down = true;
    pointer.x = e.clientX;
    pointer.y = e.clientY;
    if (state.activeTool) updateCursorToken(state.activeTool, pointer.x, pointer.y);
    toolLogicFromPointer(pointer.x, pointer.y);
  });

  window.addEventListener('pointermove', (e) => {
    pointer.x = e.clientX;
    pointer.y = e.clientY;
    if (state.activeTool) updateCursorToken(state.activeTool, pointer.x, pointer.y);
    toolLogicFromPointer(pointer.x, pointer.y);
  });

  window.addEventListener('pointerup', () => {
    pointer.down = false;
    latch = false;
    if (scrubLoop) { clearInterval(scrubLoop); scrubLoop = null; }
    clearCursorToken();
  });

  window.addEventListener('pointercancel', () => {
    pointer.down = false;
    latch = false;
    if (scrubLoop) { clearInterval(scrubLoop); scrubLoop = null; }
    clearCursorToken();
  });

  mainStage.addEventListener('click', (e) => {
    if (!state.activeTool || !state.selected || state.over) return;
    const rect = getCenterBottleRect();
    if (!rect) return;
    const inside = pointInRect(e.clientX, e.clientY, rect);
    if (!inside) return;

    if (state.activeTool === 'scrub') {
      applyTool('scrub');
    } else {
      applyTool(state.activeTool);
    }
  });

  let secretTapCount = 0;
  let secretTapTimer = null;

  scoreEl.addEventListener('click', () => {
    secretTapCount++;
    clearTimeout(secretTapTimer);
    secretTapTimer = setTimeout(() => {
      secretTapCount = 0;
    }, 1500);

    if (secretTapCount >= 5) {
      secretTapCount = 0;
      if (!state.over) {
        state.score = 200;
        hud();
        endGame(true, '성공!', '개발자 치트키가 사용되었습니다.');
      }
    }
  });

  restartBtn.addEventListener('click', resetGame);

  resetGame();
})();
</script>
</body>
</html>
