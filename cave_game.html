<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Witch's Dish Rush — Alchemy Workshop</title>

<style>
:root{
  --bg1:#2a2330;
  --bg2:#16111a;
  --gold:#f2c15d;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}

body{
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  overflow:hidden;
}

/* ===== overlay ===== */
#overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.72);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.panel{
  width:min(90vw,420px);
  background:#2a1d36;
  border:3px solid #9b72be;
  border-radius:20px;
  padding:20px;
  text-align:center;
}

.panel h2{color:#fff;margin-bottom:10px;}
.panel p{color:#ddd;white-space:pre-line;margin-bottom:15px;}

.overlay-btn{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
}

.btn-pink{background:#ff9fd2;color:#fff;}
.btn-blue{background:#6b5bff;color:#fff;}
.btn-gold{background:linear-gradient(180deg,#f2c15d,#e3a440);color:#2a1a05;}

</style>
</head>

<body>

<div id="overlay">
  <div class="panel">
    <h2 id="endTitle">결과</h2>
    <p id="endText">-</p>

    <!-- 실패 -->
    <div id="failBtns">
      <button class="overlay-btn btn-pink" onclick="resetGame()">다시하기</button>
      <button class="overlay-btn btn-blue" onclick="goBack()">돌아가기</button>
    </div>

    <!-- 성공 -->
    <div id="successBtns" style="display:none;">
      <button class="overlay-btn btn-gold" onclick="goBack()">성공</button>
    </div>

  </div>
</div>

<script>
/* =========================
   GAME STATE (원본 유지)
========================= */
const GOAL = 200;

let state = {
  score: 0,
  over: false
};

function clearTimers(){}

/* =========================
   END GAME (핵심 수정)
========================= */
function endGame(title, text){

  state.over = true;

  const success = state.score >= GOAL;

  document.getElementById("overlay").style.display = "flex";
  document.getElementById("endTitle").innerText = title;
  document.getElementById("endText").innerText =
    text + "\n점수: " + state.score;

  if(success){
    document.getElementById("failBtns").style.display = "none";
    document.getElementById("successBtns").style.display = "block";
  }else{
    document.getElementById("failBtns").style.display = "block";
    document.getElementById("successBtns").style.display = "none";
  }
}

/* =========================
   RESET
========================= */
function resetGame(){
  state.score = 0;
  state.over = false;
  document.getElementById("overlay").style.display = "none";
}

/* =========================
   RETURN
========================= */
function goBack(){
  location.href = "cave_mage.html";
}

/* 테스트용 */
setTimeout(()=> endGame("실패", "점수 부족"), 1000);

</script>

</body>
</html>
