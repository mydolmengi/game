<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인벤토리</title>

<link rel="stylesheet" href="css/style.css">

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'GmarketSans', sans-serif;
}

.inventory-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 16px;
}

.inventory-box{
    width:100%;
    max-width:520px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:22px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.inventory-box h2{
    color:#5b3719;
    margin-bottom:16px;
    font-size:28px;
}

.inventory-item{
    background:#fff;
    margin:10px 0;
    padding:12px;
    border-radius:15px;
    border:2px solid #c89b5d;
    font-size:18px;
    color:#5b3719;
    text-align:left;
}

.choice-btn{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    cursor:pointer;
    font-size:18px;
    font-family:'GmarketSans', sans-serif;
    box-shadow:0 8px 18px rgba(0,0,0,0.12);
}
</style>
</head>

<body>

<div class="inventory-page">

    <div class="inventory-box">

        <h2>🎒 인벤토리</h2>

        <div id="inventoryItems"></div>

        <button class="choice-btn" onclick="goBack()">
            게임으로 돌아가기
        </button>

    </div>

</div>

<script src="js/inventory.js"></script>

<script>
/* =========================
   인벤토리 렌더링
========================= */
function renderInventory(){

    const list = document.getElementById("inventoryItems");
    const items = getInventory();

    if(!items || items.length === 0){
        list.innerHTML = "<div class='inventory-item'>비어있음</div>";
        return;
    }

    const data = {
        bubbletea : "🍹 흑당 버블티",
        jjamppong : "🍜 짬뽕",
        flower : "🌸 꽃",
        axe : "🪓 도끼",
        shield : "🛡 방패",
        key : "🔑 열쇠",
        heart : "💖 하트 생명",
        iceAmericano : "🧊 아이스 아메리카노",
        tiramisu : "🍰 티라미수"
        dateCoupon : "💌 마녀와 데이트 쿠폰"
    };

    list.innerHTML = items.map(item => {
        return `
            <div class="inventory-item">
                ${data[item] || item}
            </div>
        `;
    }).join("");
}

/* =========================
   돌아가기
========================= */
function goBack(){

    const returnPage = localStorage.getItem("returnPage");
    const lastPage = localStorage.getItem("lastPage");

    if(returnPage && returnPage !== "null" && returnPage !== "undefined" && returnPage !== ""){
        location.href = returnPage;
        return;
    }

    if(lastPage && lastPage !== "null" && lastPage !== "undefined" && lastPage !== ""){
        location.href = lastPage;
        return;
    }

    location.href = "room1.html";
}

/* =========================
   시작
========================= */
window.addEventListener("DOMContentLoaded", () => {
    renderInventory();
});
</script>

</body>
</html>
