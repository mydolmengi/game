
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마녀와의 데이트</title>
<style>
@font-face {
  font-family: 'GmarketSans';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  font-family: 'GmarketSans', sans-serif;
  background: #000;
  overflow: hidden;
}
.scene {
  position: relative;
  width: min(100vw, 1086px);
  height: 100vh;
  margin: 0 auto;
  overflow: hidden;
}
.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  user-select: none;
  pointer-events: none;
}
.hit-zone {
  position: absolute;
  left: 55%;
  top: 30%;
  width: 36%;
  height: 56%;
  cursor: pointer;
  z-index: 5;
  border-radius: 50%;
}
.hint {
  position: absolute;
  left: 50%;
  top: 4%;
  transform: translateX(-50%);
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(70, 40, 20, 0.45);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff7dd;
  font-size: 18px;
  text-shadow: 0 2px 6px rgba(0,0,0,.5);
  z-index: 4;
  pointer-events: none;
}
.popup, .letterView {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 18px;
  z-index: 1000;
}
.popup { background: rgba(0,0,0,0.62); }
.letterView { background: rgba(0,0,0,0.82); z-index: 1100; }
.popup.show, .letterView.show { display: flex; }
.card {
  width: min(92vw, 620px);
  background: linear-gradient(180deg, #fff9e9 0%, #f7e8c7 100%);
  border: 6px solid #c79554;
  border-radius: 30px;
  box-shadow: 0 20px 45px rgba(0,0,0,.35);
  overflow: hidden;
}
.card-top {
  padding: 16px 18px 10px;
  border-bottom: 3px solid rgba(184,140,73,0.35);
}
.title {
  font-size: 24px;
  color: #5f3717;
  font-weight: 900;
  margin-bottom: 8px;
}
.sub {
  font-size: 16px;
  color: #7b5730;
  line-height: 1.5;
}
.hero {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  display: block;
  background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.55) 55%, rgba(255,255,255,0));
}
.body {
  padding: 16px 18px 18px;
}
.name {
  font-size: 22px;
  color: #2a58a0;
  font-weight: 900;
  margin-bottom: 10px;
}
.text {
  min-height: 96px;
  font-size: 22px;
  line-height: 1.7;
  color: #6a4a25;
  white-space: pre-line;
}
.actions {
  padding: 0 18px 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.btn {
  border: none;
  border-radius: 18px;
  padding: 12px 18px;
  font-family: 'GmarketSans', sans-serif;
  font-size: 17px;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}
.btn.primary { background: #ff8fc7; color: #fff; }
.btn.secondary { background: #f7f1e1; color: #5f3717; border: 3px solid #c79554; }
.btn.gold { background: #ffd86a; color: #6b430f; border: 3px solid #cc9d33; }

.giftPopup {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 1200;
  background: rgba(0,0,0,0.72);
}
.giftPopup.show { display: flex; }
.giftCard {
  width: min(92vw, 560px);
  background: #f9e9c8;
  border: 6px solid #c89b5d;
  border-radius: 28px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.giftTitle {
  font-size: 24px;
  color: #5b3719;
  font-weight: 900;
  margin-bottom: 10px;
}
.giftSub {
  font-size: 16px;
  color: #7b5730;
  line-height: 1.5;
  margin-bottom: 14px;
}
.giftList {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 42vh;
  overflow: auto;
  padding-right: 4px;
  margin-bottom: 12px;
}
.giftItem {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 18px;
  background: #fff;
  color: #5b3719;
  font-size: 17px;
  cursor: pointer;
  border: 2px solid #c89b5d;
  font-family: 'GmarketSans', sans-serif;
  text-align: left;
}
.giftItem:hover { background: #fff8ea; }
.giftClose {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  border: none;
  border-radius: 18px;
  background: #ff9fd2;
  color: #fff;
  cursor: pointer;
  font-size: 18px;
  font-family: 'GmarketSans', sans-serif;
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.letterBox {
  width: min(92vw, 720px);
  text-align: center;
  color: #fff;
}
.letterImg {
  width: min(80vw, 560px);
  height: auto;
  display: block;
  margin: 0 auto 14px;
  object-fit: contain;
  cursor: pointer;
  filter: drop-shadow(0 14px 20px rgba(0,0,0,.35));
}
.letterText {
  margin-top: 10px;
  font-size: 28px;
  font-weight: 900;
  color: #fff6d9;
  text-shadow: 0 2px 8px rgba(0,0,0,.45);
}
.letterSub {
  margin-top: 12px;
  font-size: 18px;
  color: #f0ddbb;
  line-height: 1.6;
}
.letterBtn {
  margin-top: 18px;
  border: none;
  border-radius: 18px;
  padding: 14px 24px;
  background: #f9e9c8;
  color: #5b3719;
  font-family: 'GmarketSans', sans-serif;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

@media (max-width: 600px) {
  .hint { font-size: 14px; padding: 8px 12px; }
  .title { font-size: 20px; }
  .name { font-size: 20px; }
  .text { font-size: 18px; min-height: 82px; }
  .btn { font-size: 15px; padding: 11px 15px; }
  .giftTitle { font-size: 21px; }
  .giftItem { font-size: 15px; }
  .giftClose { font-size: 16px; }
  .letterImg { width: min(90vw, 500px); }
  .letterText { font-size: 24px; }
  .letterSub { font-size: 16px; }
  .letterBtn { font-size: 16px; padding: 12px 20px; }
}
</style>
</head>
<body>
<div class="scene">
  <img class="bg" src="images/adate_bg.png" alt="데이트 배경">
  <div class="hint" id="hint">마녀를 눌러보자</div>
  <div class="hit-zone" id="hitZone" title="마녀"></div>
</div>

<div class="popup" id="popup">
  <div class="card">
    <div class="card-top">
      <div class="title">마녀와의 대화</div>
      <div class="sub" id="subText">마녀가 미소를 짓고 있다.</div>
    </div>
    <img class="hero" id="hero" src="images/adate_mage_happy.png" alt="마녀 이미지">
    <div class="body">
      <div class="name" id="nameText">마녀</div>
      <div class="text" id="dialogText">왜 나한테 데이트를 신청했어?</div>
    </div>
    <div class="actions" id="actions">
      <button class="btn primary" onclick="startTalk()">대화하기</button>
      <button class="btn secondary" onclick="closePopup()">닫기</button>
    </div>
  </div>
</div>

<div class="giftPopup" id="giftPopup">
  <div class="giftCard">
    <div class="giftTitle">선물 선택하기</div>
    <div class="giftSub">가지고 있는 선물을 마녀에게 건네보자.</div>
    <div class="giftList" id="giftList"></div>
    <button class="giftClose" onclick="closeGiftPopup()">닫기</button>
  </div>
</div>

<div class="letterView" id="letterView">
  <div class="letterBox">
    <img class="letterImg" id="letterImg" src="images/adate_letter.png" alt="편지" onclick="goLetter()">
    <div class="letterText" id="letterText">여기 편지~ 여기부터 볼 수 있음.</div>
    <div class="letterSub" id="letterSub">편지를 눌러보자.</div>
    <button class="letterBtn" onclick="goLetter()">편지 열기</button>
  </div>
</div>

<script src="js/inventory.js"></script>

<script>
const mainLines = [
  { speaker: "마녀", text: "왜 나한테 데이트를 신청했어?", src: "images/adate_mage_happy.png" },
  { speaker: "왕자", text: "내 스타일이여서", src: "images/adate_mage_happy.png" },
  { speaker: "마녀", text: "허 참놰", src: "images/adate_mage_smirk.png" },
  { speaker: "왕자", text: "너 애기미 맞지?", src: "images/adate_mage_happy.png" },
  { speaker: "마녀", text: "?? 나 애기미....?", src: "images/adate_mage_smirk.png" },
  { speaker: "마녀", text: "맞아! 나 애기미였어!!! 기억이 났어", src: "images/adate_mage_happy.png" },
  { speaker: "왕자", text: "기억이 났어??", src: "images/adate_mage_happy.png" },
  { speaker: "마녀", text: "오빠미!!! 왜 이제야 왔어ㅠㅠ", src: "images/adate_mage_happy.png" },
  { speaker: "오빠미", text: "그래, 기억 돌아온거 축하해. 자, 그럼 이제 3주년 편지를 줘", src: "images/adate_mage_smirk.png" }
];

const branchLines = [
  { speaker: "애기미", text: "오빠미, 근데 내가 첫 데이트가 아니네;;", src: "images/adate_mage_smirk.png" },
  { speaker: "오빠미", text: "아니, 헷갈릴 수도 있지;;", src: "images/adate_mage_happy.png" },
  { speaker: "애기미", text: "흥, 난 용서할 수 없엉!!!!", src: "images/adate_mage_smirk.png" }
];

const hitZone = document.getElementById("hitZone");
const popup = document.getElementById("popup");
const hero = document.getElementById("hero");
const nameText = document.getElementById("nameText");
const dialogText = document.getElementById("dialogText");
const subText = document.getElementById("subText");
const actions = document.getElementById("actions");
const hint = document.getElementById("hint");
const giftPopup = document.getElementById("giftPopup");
const giftList = document.getElementById("giftList");
const letterView = document.getElementById("letterView");
const letterImg = document.getElementById("letterImg");
const letterText = document.getElementById("letterText");
const letterSub = document.getElementById("letterSub");

let step = 0;
let branchStep = 0;
let phase = "main"; // main, branch, flowerPrompt, flowerGiven1, flowerGiven2, letter
let ended = false;
const ending1 = localStorage.getItem("ending1") === "true";

function closePopup(){
  popup.classList.remove("show");
}

function openPopup(){
  popup.classList.add("show");
  hint.style.display = "none";
}

function setActionButtons(html){
  actions.innerHTML = html;
}

function getInventorySafe(){
  try{
    if(typeof getInventory === "function"){
      const inv = getInventory();
      return Array.isArray(inv) ? inv : [];
    }
  }catch(e){}
  try{
    const inv = JSON.parse(localStorage.getItem("inventory") || "[]");
    return Array.isArray(inv) ? inv : [];
  }catch(e){}
  return [];
}

function safeRemoveItem(id){
  try{
    if(typeof removeItem === "function"){
      removeItem(id);
      return;
    }
  }catch(e){}

  try{
    let inv = getInventorySafe();
    inv = inv.filter(item => item !== id);
    localStorage.setItem("inventory", JSON.stringify(inv));
  }catch(e){
    console.log(e);
  }
}

function normalizeLabel(item){
  if(item === "bubbletea") return "🍹 흑당 버블티";
  if(item === "jjamppong") return "🍜 짬뽕";
  if(item === "flower") return "🌸 꽃";
  if(item === "axe") return "🪓 도끼";
  if(item === "shield") return "🛡 방패";
  if(item === "key") return "🔑 열쇠";
  if(item === "heart") return "💖 하트 생명";
  if(item === "iceAmericano") return "🧊 아이스 아메리카노";
  if(item === "tiramisu") return "🍰 티라미수";
  if(item === "bugSpray") return "🧴 벌레 퇴치제";
  if(item === "goldenApple") return "🍎 황금사과";
  return item;
}

function startTalk(){
  step = 0;
  branchStep = 0;
  phase = "main";
  openPopup();
  hero.src = line.src;
  nameText.textContent = "마녀";
  subText.textContent = "마녀가 당신을 반갑게 맞이한다.";
  showMainLine();
}

function showMainLine(){
  const line = mainLines[step];
  nameText.textContent = line.speaker;
  dialogText.textContent = line.text;
  hero.src = "images/adate_mage_happy.png";

  if(step === 0){
    setActionButtons('<button class="btn gold" onclick="nextMain()">다음</button>');
    return;
  }

  if(step < mainLines.length - 1){
    setActionButtons('<button class="btn gold" onclick="nextMain()">다음</button>');
  }else{
    setActionButtons('<button class="btn gold" onclick="finishMain()">다음</button>');
  }
}

function nextMain(){
  step++;
  if(step < mainLines.length){
    showMainLine();
    return;
  }
  finishMain();
}

function finishMain(){
  if(ending1){
    phase = "branch";
    branchStep = 0;
    showBranchLine();
  }else{
    showLetterScene(false);
  }
}

function showBranchLine(){
  const line = branchLines[branchStep];
  hero.src = line.src;
  nameText.textContent = line.speaker;
  dialogText.textContent = line.text;
  subText.textContent = "애기미가 불만스러운 표정을 짓는다.";

  if(branchStep < branchLines.length - 1){
    setActionButtons('<button class="btn gold" onclick="nextBranch()">다음</button>');
  }else{
    setActionButtons('<button class="btn gold" onclick="openGiftPopup()">선물 주기</button><button class="btn secondary" onclick="location.href=\'room1.html\'">나가서 구해오기</button>');
    phase = "flowerPrompt";
  }
}

function nextBranch(){
  branchStep++;
  showBranchLine();
}

function openGiftPopup(){
  const inv = getInventorySafe();
  giftList.innerHTML = "";

  if(inv.length === 0){
    giftList.innerHTML = `<div class="gift-empty">가지고 있는 선물이 없다...<br>밖에 나가서 꽃을 구해오자.</div>`;
  }else{
    inv.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "giftItem";
      btn.innerHTML = `<span style="margin-right:8px;">🎁</span>${normalizeLabel(item)}`;
      btn.onclick = () => useGiftItem(item);
      giftList.appendChild(btn);
    });
  }

  giftPopup.classList.add("show");
}

function closeGiftPopup(){
  giftPopup.classList.remove("show");
}

function useGiftItem(item){
  closeGiftPopup();

  if(item !== "flower"){
    dialogText.textContent = "꽃만 필요해!";
    setActionButtons('<button class="btn gold" onclick="openGiftPopup()">선물 다시 고르기</button><button class="btn secondary" onclick="location.href=\'room1.html\'">나가서 구해오기</button>');
    return;
  }

  safeRemoveItem("flower");
  phase = "flowerGiven1";
  hero.src = "images/adate_mage_happy.png";
  nameText.textContent = "오빠미";
  subText.textContent = "오빠미가 애기미에게 사과의 꽃을 준다.";
  dialogText.textContent = "오빠미가 애기미에게 사과의 꽃을 준다.";
  setActionButtons('<button class="btn gold" onclick="nextFlowerGiven()">다음</button>');
}

function nextFlowerGiven(){
  if(phase === "flowerGiven1"){
    phase = "flowerGiven2";
    hero.src = "images/adate_mage_smirk.png";
    nameText.textContent = "애기미";
    subText.textContent = "애기미가 꽃을 받아들인다.";
    dialogText.textContent = "흥... 이번만이다.";
    setActionButtons('<button class="btn gold" onclick="showLetterScene(true)">다음</button>');
    return;
  }
}

function showLetterScene(fromFlower){
  phase = "letter";
  popup.classList.remove("show");
  letterView.classList.add("show");
  letterImg.src = "images/adate_letter.png";

  if(fromFlower){
    letterText.textContent = "여기 3주년 편지.";
    letterSub.textContent = "편지를 눌러서 확인해보자.";
  }else{
    letterText.textContent = "여기 3주년 편지.";
    letterSub.textContent = "편지를 눌러서 확인해보자.";
  }
}

function goLetter(){
  location.href = "letter.html";
}

hitZone.addEventListener("click", () => {
  if(ended) return;
  startTalk();
});
</script>
</body>
</html>
