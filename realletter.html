
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>천공도시의 마법 편지</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#bfe7ff;font-family:'Noto Serif KR',serif}
#scene{position:relative;width:100%;height:100%;overflow:hidden}
#sky{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

.cloud{position:absolute;left:-300px;opacity:.8;animation:cloud 28s linear infinite}
@keyframes cloud{to{transform:translateX(calc(100vw + 900px));}}

#envBtn{position:absolute;left:50%;bottom:6%;transform:translateX(-50%);width:min(700px,80vw);border:0;background:none;cursor:pointer;z-index:5}
#envBtn img,#openEnv{width:100%;display:block}
#openEnv{display:none;position:absolute;left:50%;bottom:6%;transform:translateX(-50%);width:min(700px,80vw);z-index:4}

#letter{
position:absolute;
left:50%;
bottom:7%;
transform:translate(-50%,180px);
width:min(620px,75vw);
opacity:0;
transition:1s;
z-index:10; /* 편지가 열린 봉투 위 */
}
#letter.show{opacity:1;transform:translate(-50%,-150px)}
#letter img{width:100%;display:block}

#content{
position:absolute;
left:50%;
top:13%;
width:72%;
transform:translateX(-50%);
text-align:center;
font-size:21px;
line-height:1.9;
color:#5b4631;
}

.sentence{
opacity:0;
transform:translateY(8px);
transition:.5s;
margin-bottom:10px;
}
.sentence.show{opacity:1;transform:translateY(0)}

#endingBtn{
position:absolute;
left:50%;
bottom:10%;
transform:translateX(-50%);
padding:12px 28px;
border-radius:40px;
border:none;
background:#fff7ef;
box-shadow:0 10px 20px rgba(0,0,0,.15);
font-size:18px;
display:none;
cursor:pointer;
}

#ending{
position:fixed;inset:0;background:rgba(0,0,0,.45);
display:none;align-items:center;justify-content:center;flex-direction:column;
z-index:100}
#ending img{width:min(800px,90vw)}
#ending h1{color:#fff;margin-top:20px}
</style>
</head>
<body>
<div id="scene">
<img id="sky" src="images/sky.png">

<script>
for(let i=0;i<8;i++){
 let c=document.createElement("img");
 c.src="images/cloud.png";
 c.className="cloud";
 c.style.top=(Math.random()*70)+"%";
 c.style.width=(120+Math.random()*180)+"px";
 c.style.animationDuration=(18+Math.random()*20)+"s";
 c.style.animationDelay=(-Math.random()*20)+"s";
 scene.appendChild(c);
}
</script>

<button id="envBtn"><img src="images/envelope_close.png"></button>
<img id="openEnv" src="images/envelope_open.png">

<div id="letter">
<img src="images/letter.png">
<div id="content"></div>
<button id="endingBtn">엔딩 보러가기</button>
</div>

<div id="ending">
<img src="images/ending.png">
<h1>엔딩2. 행복한 결말</h1>
</div>

</div>

<script>
const lines=[
"천공도시에서 보내는 작은 마법의 편지입니다.",
"오늘도 이 편지가 당신의 하루에 조용한 미소를 전해주기를 바랍니다.",
"아무리 바쁜 하루였더라도 잠시 하늘을 올려다보세요.",
"천천히 흘러가는 구름은 늘 같은 자리에서 당신을 기다리고 있습니다.",
"기쁨은 예상하지 못한 순간에 찾아오고,",
"행복은 아주 작은 순간들이 모여 만들어집니다.",
"오늘의 선택이 내일의 추억이 되고,",
"당신의 따뜻한 마음은 누군가에게 큰 힘이 될 것입니다.",
"조급해하지 않아도 괜찮습니다.",
"당신만의 속도로 천천히 걸어가도 충분합니다.",
"바람이 당신의 걱정을 데려가고,",
"햇살이 당신의 마음을 포근하게 감싸주기를 바랍니다.",
"언제나 당신의 이야기를 응원합니다.",
"오늘도 행복이 당신 곁에 오래 머물기를 바랍니다."
];

const envBtn=document.getElementById("envBtn");
const openEnv=document.getElementById("openEnv");
const letter=document.getElementById("letter");
const content=document.getElementById("content");
const endBtn=document.getElementById("endingBtn");

envBtn.onclick=()=>{
envBtn.style.display="none";
openEnv.style.display="block";
letter.classList.add("show");

let delay=800;

lines.forEach((t)=>{
 const p=document.createElement("div");
 p.className="sentence";
 p.textContent=t;
 content.appendChild(p);

 setTimeout(()=>p.classList.add("show"),delay);
 delay+=900; // 한 문장씩
});

setTimeout(()=>endBtn.style.display="block",delay+300);
};

endBtn.onclick=()=>document.getElementById("ending").style.display="flex";
</script>
</body>
</html>
