<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>천공도시의 마법 편지</title>
<style>
  :root {
    --sky: #bfe7ff;
    --paper: #fff7ec;
    --ink: #5b4631;
    --shadow: 0 20px 60px rgba(56, 74, 98, 0.18);
    --soft-shadow: 0 12px 32px rgba(56, 74, 98, 0.14);
    --envelope-w: min(66vw, 620px);
    --letter-w: min(74vw, 620px);
  }

  * { box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: 'Noto Serif KR', 'Apple SD Gothic Neo', serif;
    background: var(--sky);
  }

  body { position: relative; }

  #scene {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #sky {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
    pointer-events: none;
    user-select: none;
  }

  .cloud {
    position: absolute;
    left: -20vw;
    opacity: 0.82;
    filter: drop-shadow(0 10px 18px rgba(255,255,255,.22));
    animation-name: cloudMove;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    will-change: transform;
    pointer-events: none;
    user-select: none;
  }

  @keyframes cloudMove {
    from { transform: translateX(0); }
    to { transform: translateX(calc(140vw + 900px)); }
  }

  #envelopeBtn {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: var(--envelope-w);
    aspect-ratio: 1.88 / 1;
    border: 0;
    background: transparent;
    padding: 0;
    cursor: pointer;
    z-index: 20;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform .22s ease, filter .22s ease, opacity .25s ease;
    filter: drop-shadow(0 26px 36px rgba(72, 78, 107, .24));
  }

  #envelopeBtn::before {
    content: '';
    position: absolute;
    inset: -10%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.55), rgba(255,255,255,0) 68%);
    filter: blur(16px);
    opacity: .78;
    animation: envelopeGlow 2.2s ease-in-out infinite;
    z-index: -1;
  }

  @keyframes envelopeGlow {
    0%, 100% { transform: scale(1); opacity: .65; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  #envelopeBtn:hover {
    transform: translate(-50%, -50%) scale(1.03);
  }

  #envelopeBtn:active {
    transform: translate(-50%, -50%) scale(0.99);
  }

  #envelopeBtn img,
  #openEnvelope {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
  }

  #openEnvelope {
    position: absolute;
    left: 50%;
    top: 43%;
    width: var(--envelope-w);
    aspect-ratio: 1.88 / 1;
    transform: translate(-50%, -50%);
    z-index: 14;
    display: none;
    filter: drop-shadow(0 26px 36px rgba(72, 78, 107, .22));
  }

  #letter {
    position: absolute;
    left: 50%;
    top: 43%;
    width: var(--letter-w);
    aspect-ratio: 1.38 / 1.72;
    transform: translate(-50%, -36%) translateY(170px) scale(0.985);
    opacity: 0;
    z-index: 22;
    transition: transform 1s cubic-bezier(.2,.95,.2,1), opacity .8s ease;
    filter: drop-shadow(0 22px 40px rgba(72, 78, 107, .18));
    pointer-events: auto;
  }

  #letter.active {
    opacity: 1;
    transform: translate(-50%, -36%) translateY(-118px) scale(1);
  }

  #letter img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
  }

  #letterContent {
    position: absolute;
    left: 50%;
    top: 12.8%;
    width: 76%;
    height: 71%;
    transform: translateX(-50%);
    color: var(--ink);
    z-index: 2;
    font-size: clamp(15px, 1.9vw, 22px);
    line-height: 1.72;
    letter-spacing: 0.01em;
    text-align: center;
    white-space: normal;
    word-break: keep-all;
    user-select: none;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    gap: 0.7em;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    padding: 0 .5em 1.2em .3em;
    pointer-events: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(91,70,49,.45) rgba(255,255,255,.18);
  }

  #letterContent::-webkit-scrollbar {
    width: 8px;
  }

  #letterContent::-webkit-scrollbar-track {
    background: rgba(255,255,255,.18);
    border-radius: 999px;
  }

  #letterContent::-webkit-scrollbar-thumb {
    background: rgba(91,70,49,.42);
    border-radius: 999px;
  }

  .sentence {
    display: block;
    margin: 0;
    opacity: 0;
    transform: translateY(10px);
    max-width: 100%;
    text-align: center;
    white-space: normal;
    word-break: keep-all;
  }

  .char {
    display: inline-block;
    opacity: 0;
    transform: translateY(10px) rotate(-1deg) scale(0.98);
    filter: blur(1px);
    animation: inkWrite 0.42s ease forwards;
  }

  @keyframes inkWrite {
    0%   { opacity: 0; transform: translateY(12px) rotate(-1.5deg) scale(0.98); filter: blur(1.5px); }
    45%  { opacity: 1; transform: translateY(0) rotate(0deg) scale(1.01); filter: blur(0.2px); }
    100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); filter: blur(0); }
  }

  #endingButton {
    display: none;
    margin: 1.1rem auto 0;
    padding: 0.9em 1.45em;
    border-radius: 999px;
    border: 1px solid rgba(91, 70, 49, .22);
    background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,243,232,.92));
    color: #000;
    font-family: inherit;
    font-size: clamp(14px, 1.7vw, 17px);
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(95, 69, 46, 0.14), inset 0 1px 0 rgba(255,255,255,.7);
    opacity: 0;
    pointer-events: none;
    transition: transform .2s ease, box-shadow .2s ease, opacity .5s ease;
    z-index: 4;
  }

  #endingButton:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(95, 69, 46, 0.18), inset 0 1px 0 rgba(255,255,255,.7);
  }

  #endingButton.show {
    display: block;
    opacity: 1;
    pointer-events: auto;
  }

  .butterfly, .feather {
    position: absolute;
    left: 50%;
    bottom: 14vh;
    opacity: 0;
    pointer-events: none;
    z-index: 17;
    user-select: none;
    will-change: transform, opacity;
  }

  .butterfly { width: 60px; }
  .feather { width: 46px; }

  #paperCloud {
    position: absolute;
    width: min(26vw, 240px);
    top: 20%;
    left: -280px;
    opacity: 0;
    z-index: 16;
    pointer-events: none;
    user-select: none;
  }

  .pass {
    opacity: .8 !important;
    animation: pass 8s linear forwards !important;
  }

  @keyframes pass {
    from { left: -280px; }
    to   { left: 100vw; }
  }

  #endingOverlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    background: radial-gradient(circle at center, rgba(255,255,255,.18), rgba(120,171,221,.36));
    backdrop-filter: blur(3px);
    z-index: 100;
    text-align: center;
    padding: 24px;
  }

  #endingOverlay.show { display: flex; }

  #endingOverlay img {
    width: min(84vw, 760px);
    max-height: 72vh;
    object-fit: contain;
    border-radius: 28px;
    box-shadow: var(--shadow);
    animation: fadeUp .75s ease both;
  }

  #endingTitle {
    font-size: clamp(20px, 3vw, 34px);
    color: #000;
    letter-spacing: .04em;
    animation: fadeUp .9s ease .08s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px) scale(.985); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 720px) {
    :root {
      --envelope-w: min(86vw, 640px);
      --letter-w: min(86vw, 620px);
    }

    #envelopeBtn,
    #openEnvelope {
      top: 42%;
    }

    #letter {
      top: 42%;
      transform: translate(-50%, -34%) translateY(170px) scale(0.985);
    }

    #letter.active {
      transform: translate(-50%, -34%) translateY(-108px) scale(1);
    }

    #letterContent {
      top: 12.5%;
      width: 74%;
      height: 70%;
      font-size: clamp(15px, 4.1vw, 20px);
      line-height: 1.68;
    }

    #endingButton {
      font-size: 14px;
      padding: .85em 1.2em;
    }
  }
</style>
</head>
<body>
  <div id="scene">
    <img id="sky" src="images/sky.png" alt="하늘 배경" />
    <img id="paperCloud" src="images/cloud.png" alt="흐르는 구름" />

    <button id="envelopeBtn" aria-label="편지 봉투 열기">
      <img src="images/envelope_close.png" alt="닫힌 편지 봉투" />
    </button>

    <img id="openEnvelope" src="images/envelope_open.png" alt="열린 편지 봉투" />

    <div id="letter" aria-hidden="true">
      <img src="images/letter.png" alt="편지지" />
      <div id="letterContent"></div>
    </div>

    <div id="endingOverlay" aria-hidden="true">
      <img src="images/ending.png" alt="엔딩 이미지" />
      <div id="endingTitle">엔딩2. 행복한 결말</div>
    </div>
  </div>

<script>
  const scene = document.getElementById('scene');
  const closeBtn = document.getElementById('envelopeBtn');
  const closeImg = closeBtn.querySelector('img');
  const openEnvelope = document.getElementById('openEnvelope');
  const letter = document.getElementById('letter');
  const letterContent = document.getElementById('letterContent');
  const endingOverlay = document.getElementById('endingOverlay');
  const paperCloud = document.getElementById('paperCloud');

  const endingButton = document.createElement('button');
  endingButton.id = 'endingButton';
  endingButton.type = 'button';
  endingButton.textContent = '엔딩 보러가기';
  letterContent.appendChild(endingButton);

  const LETTER_SENTENCES = [


    
    오빠미에게
    
    이건 내가 이번에 따로 적는 편지야

  우리에게 많은 일이 있었지.

    먼저, 사과 먼저 할게

  오빠한테 너무 큰 상처를 준 것 같아. 미안해

  내가 사실 오빠에게는 크게 말 안했지만

  이성문제에 있어서는 내가 굉장히 예민한 것 같아

  그래서, 오빠가 내가 생각한 최악의 상황 속에서

  있었다고 생각하는게 너무 힘들었어

  진짜, 그날 정신적으로 너무 힘들었는데

  오빠는 이 상황이 얼마나 나에게 

  힘들고 고통스러웠는지

  내가 그런 오해를 하고 있는게

  얼마나 우리 사이에 위험한 일인지

  모르는 것 같아

  마음이 아팠어

  그래서 내가 그렇게 했던거고

  난 평소에 이성문제에 얼마나 예민한지 
  
  미리 말해줬다고 생각했는데,

  생각해보니, 오빠는 또 심각하게는 

  생각하지 못 했을 수도 있었을 것 같아.
    

  그래도 오빠가 변한다고 해줘서 고마워.

  진심이야.


  우리가 함께 할 수 있게 

  용기를 내 준 오빠한테 고마워


  앞으로 잘 지내보자!

  - 애기미가 -
   
  ];

  const CLOUD_COUNT = 8;
  let opened = false;

  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function addClouds() {
    for (let i = 0; i < CLOUD_COUNT; i++) {
      const img = document.createElement('img');
      img.src = 'images/cloud.png';
      img.className = 'cloud';
      img.alt = '';

      const size = random(110, 280);
      const top = random(3, 74);
      const delay = random(-18, 0);
      const duration = random(18, 40);
      const opacity = random(0.45, 0.92);
      const scaleY = random(0.9, 1.25);

      img.style.width = `${size}px`;
      img.style.top = `${top}%`;
      img.style.opacity = opacity.toFixed(2);
      img.style.animationDuration = `${duration}s`;
      img.style.animationDelay = `${delay}s`;
      img.style.transform = `scale(${random(0.8, 1.2)}, ${scaleY})`;
      img.style.zIndex = String(5 + Math.floor(random(0, 4)));

      scene.appendChild(img);
    }
  }

  async function typeSentence(target, sentence) {
    for (const ch of sentence) {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      target.appendChild(span);
      letterContent.scrollTop = letterContent.scrollHeight;
      await sleep(/[,.!?…]/.test(ch) ? 72 : 42);
    }
  }

  async function buildHandwrittenText() {
    letterContent.querySelectorAll('.sentence').forEach(node => node.remove());

    for (const sentence of LETTER_SENTENCES) {
      const p = document.createElement('p');
      p.className = 'sentence';
      letterContent.insertBefore(p, endingButton);
      p.style.opacity = '1';
      await typeSentence(p, sentence);
      letterContent.scrollTop = letterContent.scrollHeight;
      await sleep(220);
    }

    endingButton.classList.add('show');
    await sleep(80);
    endingButton.scrollIntoView({ behavior: 'smooth', block: 'end' });
    letterContent.scrollTop = letterContent.scrollHeight;
  }

  function spawnButterflies() {
    for (let i = 0; i < 5; i++) {
      const b = document.createElement('img');
      b.src = 'images/butterfly.png';
      b.className = 'butterfly';
      b.alt = '';
      b.style.bottom = `${random(18, 30)}vh`;
      b.style.left = '50%';
      document.body.appendChild(b);

      setTimeout(() => { b.style.opacity = 1; }, 40);

      const x = random(-240, 240);
      const y = -random(170, 360);
      const rot = random(90, 340);

      b.animate(
        [
          { transform: 'translate(0,0) rotate(0deg)' },
          { transform: `translate(${x}px, ${y}px) rotate(${rot}deg)` }
        ],
        {
          duration: 2600 + random(0, 1400),
          fill: 'forwards',
          easing: 'ease-out'
        }
      );

      setTimeout(() => b.remove(), 5000);
    }
  }

  function spawnFeathers() {
    for (let i = 0; i < 7; i++) {
      const f = document.createElement('img');
      f.src = 'images/feather.png';
      f.className = 'feather';
      f.alt = '';
      f.style.bottom = `${random(16, 25)}vh`;
      f.style.left = '50%';
      document.body.appendChild(f);

      setTimeout(() => { f.style.opacity = 1; }, 40);

      const x = random(-180, 180);
      const y1 = random(220, 420);
      const y2 = random(180, 520);
      const rot1 = random(180, 520);
      const rot2 = random(360, 860);

      f.animate(
        [
          { transform: 'translate(0,0) rotate(0deg)' },
          { transform: `translate(${x}px, -${y1}px) rotate(${rot1}deg)` },
          { transform: `translate(${x + 40}px, ${y2}px) rotate(${rot2}deg)` }
        ],
        {
          duration: 5000 + random(0, 1500),
          fill: 'forwards',
          easing: 'ease-in-out'
        }
      );

      setTimeout(() => f.remove(), 5600);
    }
  }

  function openLetterSequence() {
    if (opened) return;
    opened = true;

    closeBtn.style.pointerEvents = 'none';
    closeBtn.style.opacity = '0';
    closeImg.style.opacity = '0';

    openEnvelope.style.display = 'block';
    openEnvelope.animate(
      [
        { opacity: 0, transform: 'translate(-50%, -50%) translateY(10px) scale(0.99)' },
        { opacity: 1, transform: 'translate(-50%, -50%) translateY(0) scale(1)' }
      ],
      { duration: 420, fill: 'forwards', easing: 'ease-out' }
    );

    spawnButterflies();
    spawnFeathers();

    setTimeout(() => {
      letter.classList.add('active');
      letter.setAttribute('aria-hidden', 'false');
    }, 420);

    setTimeout(() => {
      buildHandwrittenText();
    }, 1250);

    setTimeout(() => {
      paperCloud.classList.add('pass');
      paperCloud.style.opacity = '.85';
    }, 8500);
  }

  closeBtn.addEventListener('click', openLetterSequence);
  closeBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openLetterSequence();
    }
  });

  endingButton.addEventListener('click', () => {
    endingOverlay.classList.add('show');
    endingOverlay.setAttribute('aria-hidden', 'false');
  });

  endingOverlay.addEventListener('click', () => {
    endingOverlay.classList.remove('show');
    endingOverlay.setAttribute('aria-hidden', 'true');
  });

  addClouds();
</script>
</body>
</html>
