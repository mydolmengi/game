<!DOCTYPE html>
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Kingdom Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:
radial-gradient(circle at top,#6d4cff33,transparent 35%),
linear-gradient(#07111f,#12072b 60%,#05070d);font-family:"Noto Serif KR",serif}
#scene{position:relative;width:100%;height:100%;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2.5s ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.2;transform:scale(.8)}to{opacity:1;transform:scale(1.5)}}
.nebula,.fog{position:absolute;inset:-30%;filter:blur(70px);pointer-events:none}
.nebula{background:radial-gradient(circle,#7a5cff22,transparent 55%);animation:spin 80s linear infinite}
.fog{background:radial-gradient(circle,#ffffff10,transparent 60%);animation:fog 35s ease-in-out infinite alternate}
@keyframes fog{to{transform:translate(8%,-2%)}}
@keyframes spin{to{transform:rotate(360deg)}}
#trail{position:absolute;width:180px;height:180px;border-radius:50%;
background:radial-gradient(circle,#fff8,transparent 70%);pointer-events:none;mix-blend-mode:screen;transform:translate(-50%,-50%)}
#seal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
width:150px;height:150px;border-radius:50%;
background:radial-gradient(circle,#d92f4b,#720015);
display:flex;align-items:center;justify-content:center;
font-size:60px;color:#fff;box-shadow:0 0 50px #ff4a7a;z-index:9;
animation:breakSeal 2.2s forwards}
@keyframes breakSeal{
0%,60%{transform:translate(-50%,-50%) scale(1)}
100%{transform:translate(-50%,-50%) scale(.2) rotate(120deg);opacity:0}
}
#letterWrap{
position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
perspective:1600px}
#letter{
width:min(900px,88vw);
height:min(78vh,920px);
background:linear-gradient(#fffdf5,#f3e8cc);
border-radius:18px;
overflow:hidden;
box-shadow:0 0 90px #9074ff55,0 30px 80px #0008;
transform-origin:top;
transform:rotateX(-90deg) scale(.7);
opacity:0;
animation:open 2.2s ease forwards 1.4s;
position:relative;
}
@keyframes open{
to{transform:rotateX(0) scale(1);opacity:1}
}
.gold{
position:absolute;inset:14px;border:3px solid rgba(212,177,70,.9);border-radius:12px;
box-shadow:0 0 12px #ffd96688 inset;
animation:gold 4s infinite}
@keyframes gold{50%{box-shadow:0 0 24px #ffd966,0 0 18px #ffd966 inset}}
.corner{position:absolute;width:90px;height:90px;border:2px solid #d8b24a55}
.c1{left:22px;top:22px;border-right:none;border-bottom:none}
.c2{right:22px;top:22px;border-left:none;border-bottom:none}
.c3{left:22px;bottom:22px;border-right:none;border-top:none}
.c4{right:22px;bottom:22px;border-left:none;border-top:none}
h1{font-family:Cinzel,serif;text-align:center;margin:42px 0 8px;color:#9b7b1d;letter-spacing:4px}
.subtitle{text-align:center;color:#8d7d5d}
#scroll{
position:absolute;left:55px;right:55px;top:110px;bottom:40px;
overflow:auto;padding-right:16px;
scroll-behavior:smooth}
#scroll::-webkit-scrollbar{width:8px}
#scroll::-webkit-scrollbar-thumb{background:#bda66b;border-radius:10px}
#content{
white-space:pre-wrap;
font-size:22px;
line-height:2.0;
color:#463824}
.rune{position:absolute;color:#ffe58a33;font-size:24px;animation:float 6s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-12px)}}
.spark{position:absolute;width:4px;height:4px;background:gold;border-radius:50%;animation:fly 2.6s linear forwards}
@keyframes fly{to{transform:translate(var(--x),-240px);opacity:0}}
.butterfly{position:absolute;font-size:20px;animation:butter 12s linear infinite}
@keyframes butter{
0%{transform:translate(-10vw,70vh)}
50%{transform:translate(50vw,35vh)}
100%{transform:translate(110vw,55vh)}
}

#nextLetter{
display:none;
margin:40px auto 20px;
padding:16px 40px;
font-size:18px;
font-family:"Cinzel","Noto Serif KR",serif;
color:#fff;
background:linear-gradient(135deg,#d4af37,#9b6b1b);
border:none;border-radius:999px;
cursor:pointer;
box-shadow:0 0 20px rgba(255,215,0,.4),0 8px 20px rgba(0,0,0,.25);
transition:.35s;
animation:goldPulse 2.5s infinite;
}
#nextLetter:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 0 30px gold,0 12px 25px rgba(0,0,0,.35)}
@keyframes goldPulse{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.4)}50%{box-shadow:0 0 30px rgba(255,215,0,.9)}}
#nextLetter.show{display:block;animation:fadeUp .8s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
 
@media (max-width:600px){
    .choice-box{
        font-size:20px;
        padding:12px;
    }

    .date-car{
        top:51%;
        width:78vw;
        max-width:none;
    }

    .date-car-label{
        font-size:15px;
        padding:5px 10px;
    }
}
</style>
</head>
<body>
<div id="scene">
<div class="nebula"></div><div class="fog"></div>
<div id="trail"></div>
<div id="seal">🌙</div>
<div id="letterWrap">
<div id="letter">
<div class="gold"></div>
<div class="corner c1"></div><div class="corner c2"></div><div class="corner c3"></div><div class="corner c4"></div>
<h1>3주년 기념 편지</h1>
<div class="subtitle">애기미의 진심</div>
<div id="scroll"><div id="content"></div><button id="nextLetter">✨ 후속 편지 보기 →</button></div>
</div>
</div>
</div>
<script>
for(let i=0;i<260;i++){
 let s=document.createElement("div");
 s.className="star";
 let z=Math.random()*3+1;
 s.style.width=z+"px";s.style.height=z+"px";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 s.style.animationDelay=Math.random()*3+"s";
 document.getElementById("scene").appendChild(s);
}
for(let i=0;i<12;i++){
 let r=document.createElement("div");
 r.className="rune";
 r.textContent=["✦","✧","☽","✶","❈"][i%5];
 r.style.left=(5+Math.random()*90)+"vw";
 r.style.top=(5+Math.random()*90)+"vh";
 r.style.animationDelay=(Math.random()*5)+"s";
 scene.appendChild(r);
}
let b=document.createElement("div");
b.className="butterfly"; b.textContent="🦋"; scene.appendChild(b);

setInterval(()=>{
 for(let i=0;i<10;i++){
  let p=document.createElement("div");
  p.className="spark";
  p.style.left=(innerWidth/2+(Math.random()-0.5)*500)+"px";
  p.style.top=(innerHeight/2+180)+"px";
  p.style.setProperty("--x",(Math.random()*240-120)+"px");
  scene.appendChild(p);
  setTimeout(()=>p.remove(),2600);
 }
},600);

document.onmousemove=e=>{
 trail.style.left=e.clientX+"px";
 trail.style.top=e.clientY+"px";
};

const msg=`오빠미에게,


오빠가 이 편지를 언제 볼 수 있을지 모르겠네


저번 생일날 오빠가 난이도가 너무 쉽다고 해서

좀 어렵게 만들어봤어 ㅎㅎ


어려웠을까나?


훔



하여튼, 우리가 만난지 벌써 3년이 되었네



근데 난 뭐라고 할까나~


내 생각보다는 짧은 것 같기도 해. 

그만큼 우리가 알차게 시간을 보낸게 아닐까?


오늘 우리는 맛있는 것을 먹고 있겠지? 아마도?


오빠에게 요즘 짜증을 많이 낸 것 같아 미안해ㅠㅠ


나도 요즘 많이 반성하고 있어!


착한 애기미도 돌아갈게미


오빠 우리 아직 즐길게 많아!
그 모든 걸 오빠랑 난 즐기도 싶은데 오빠는 어때?


해외여행도 더 가고 싶고 맛있는 것도 많이 먹고 싶고 ㅎㅎ


갑자기 오빠가 나한테 편지 써서

내 서랍 채워준다고 한게 생각난다 ㅎㅎ


아직도 기다리고 있어......


언능 매일매일써줭


내가 얼른 취업해서 오빠 맛있는거 사줄게


뭐 먹고 싶어?



뭐 소고기? 



알았엉 그거 사줄게 암암


오빠 우리 앞으로도 사이좋게 지내고


이뿌게 만나쟝~

-귀여운 애기미가-`;

let idx=0;
const content=document.getElementById("content");
const scroll=document.getElementById("scroll");
const nextBtn=document.getElementById("nextLetter");
function type(){
 if(idx<msg.length){
   content.textContent+=msg[idx++];
   scroll.scrollTop=scroll.scrollHeight;
   setTimeout(type,msg[idx-1]=="\n"?180:61);
 }else{
   nextBtn.classList.add("show");
 }
}
setTimeout(type,3600);

if(window.AudioContext){
const ctx=new AudioContext();
function chime(){
let o=ctx.createOscillator(),g=ctx.createGain();
o.type="sine";o.frequency.value=880;
g.gain.value=.0001;
g.gain.exponentialRampToValueAtTime(.06,ctx.currentTime+.01);
g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.9);
o.connect(g).connect(ctx.destination);
o.start();o.stop(ctx.currentTime+1);
}
addEventListener("click",()=>{ctx.resume();chime();},{once:true});
}

nextBtn.addEventListener("click",()=>{
 document.body.style.transition="opacity .8s";
 document.body.style.opacity="0";
 setTimeout(()=>location.href="realletter.html",800);
});
</script>
</body>
</html>
