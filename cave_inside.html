<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동굴 내부</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

/* 버튼 */
.game-btn{
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 30px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* 이동 버튼 */
.enter-btn{
    position:absolute;
    left:50%;
    top:55%;
    transform:translateX(-50%);
    display:none;
}

.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
}

/* 인벤토리 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
}

/* 선택 UI */
.choice-box{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/cave_inside.png" class="bg">

    <!-- 대사 -->
    <div id="dialog"
        style="
        position:absolute;
        bottom:18%;
        left:50%;
        transform:translateX(-50%);
        width:85%;
        background:#f9e9c8;
        border:6px solid #c89b5d;
        border-radius:25px;
        padding:18px;
        font-size:20px;
        color:#5b3719;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
        ">
        와... 여기는 어디지?
    </div>

    <!-- 다음 -->
    <button class="game-btn"
        id="nextBtn"
        style="position:absolute; bottom:8%; left:50%; transform:translateX(-50%);"
        onclick="nextDialogue()">
        다음
    </button>

    <!-- 이동 -->
    <button class="game-btn enter-btn" id="enterBtn"
    onclick="location.href='cave_mage.html'">
        마녀의 집으로 바로가기
    </button>

    <!-- 돌아가기 -->
    <button class="game-btn back-btn"
    onclick="location.href='cave.html'">
        돌아가기
    </button>

</div>

<button class="inventory-btn"
onclick="location.href='inventory.html'">🎒</button>

<script>

/* ======================
   상태 복구
====================== */
window.addEventListener("DOMContentLoaded", () => {

    localStorage.setItem("lastPage","cave_inside.html");

    if(localStorage.getItem("caveUnlocked") === "true"){
        document.getElementById("enterBtn").style.display = "block";
    }
});

/* ======================
   대사 시스템
====================== */
let step = 0;

function nextDialogue(){

    const dialog = document.getElementById("dialog");
    step++;

    if(step === 1){
        dialog.innerHTML = "안으로 더 들어가볼까?";
    }

    else if(step === 2){
        dialog.innerHTML = "뭔가... 날 보호할 물건이 필요할 것 같다.";
        document.getElementById("nextBtn").innerText = "선택하기";
    }

    else if(step === 3){
        showChoice();
    }
}

/* ======================
   선택 UI
====================== */
function showChoice(){

    const dialog = document.getElementById("dialog");

    dialog.innerHTML = `
        어떻게 할까?

        <div class="choice-box">
            <button class="game-btn" onclick="goIn()">들어간다</button>
            <button class="game-btn" onclick="goOut()">아니야, 나가자</button>
        </div>
    `;

    document.getElementById("nextBtn").style.display = "none";
}

/* ======================
   선택 결과
====================== */
function goIn(){

    const hasShield =
        localStorage.getItem("shield") === "true" ||
        localStorage.getItem("hasShield") === "true";

    if(hasShield){

        localStorage.setItem("caveUnlocked","true");

        document.getElementById("dialog").innerHTML =
        "방패가 나를 보호해준다...!";

        document.getElementById("enterBtn").style.display = "block";
    }
    else{

        document.getElementById("dialog").innerHTML =
        "??? 쑤쑤숫쑥<br>헉! 화살이다!!!";

        document.getElementById("nextBtn").style.display = "none";

        const btn = document.createElement("button");
        btn.className = "game-btn";
        btn.innerText = "도망치자";
        btn.onclick = () => location.href = "cave.html";

        document.getElementById("dialog").appendChild(btn);
    }
}

function goOut(){
    location.href = "cave.html";
}

</script>

</body>
</html>
