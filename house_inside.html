<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>드래그 좌표 생성기</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    font-family:sans-serif;
}

.wrapper{
    position:relative;
    width:900px;
    margin-top:10px;
}

/* 배경 */
.bg{
    width:100%;
    display:block;
    user-select:none;
}

/* 생성되는 박스 */
.box{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,0,0,0.3);
    border:2px dashed red;
    cursor:grab;
}

/* 좌표 표시 */
#info{
    position:fixed;
    top:10px;
    left:10px;
    background:white;
    padding:10px;
    font-size:14px;
    border-radius:10px;
    z-index:999;
    width:260px;
}

textarea{
    width:100%;
    height:120px;
    margin-top:10px;
}
button{
    width:100%;
    padding:8px;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="info">
<b>📍 좌표 생성기</b><br>
<span id="coords">클릭하세요</span>

<textarea id="output" placeholder="여기에 코드 자동 생성됨"></textarea>

<button onclick="copyCode()">📋 복사</button>
<button onclick="addBox()">➕ 박스 추가</button>
</div>

<div class="wrapper" id="map">

    <img src="images/house_inside.png" class="bg" id="bg">

</div>

<script>

let activeBox = null;
let offsetX = 0;
let offsetY = 0;
let boxCount = 0;

/* 박스 추가 */
function addBox(){

    const box = document.createElement("div");
    box.className = "box";
    box.id = "box" + boxCount++;

    box.style.left = "50%";
    box.style.top = "50%";

    document.getElementById("map").appendChild(box);

    drag(box);
}

/* 드래그 */
function drag(box){

    box.addEventListener("mousedown", (e)=>{

        activeBox = box;
        offsetX = e.offsetX;
        offsetY = e.offsetY;

    });

}

/* 이동 */
document.addEventListener("mousemove",(e)=>{

    if(!activeBox) return;

    const map = document.getElementById("map");
    const rect = map.getBoundingClientRect();

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    activeBox.style.left = x + "px";
    activeBox.style.top = y + "px";

    let px = (x / rect.width * 100).toFixed(1);
    let py = (y / rect.height * 100).toFixed(1);

    document.getElementById("coords").innerText =
    `left:${px}%; top:${py}%`;

    activeBox.dataset.code =
    `left:${px}%; top:${py}%;`;

    updateOutput();
});

document.addEventListener("mouseup", ()=>{

    activeBox = null;
});

/* 코드 생성 */
function updateOutput(){

    let boxes = document.querySelectorAll(".box");

    let result = "";

    boxes.forEach((b, i)=>{

        let rect = b.getBoundingClientRect();
        let map = document.getElementById("map").getBoundingClientRect();

        let x = ((rect.left - map.left) / map.width * 100).toFixed(1);
        let y = ((rect.top - map.top) / map.height * 100).toFixed(1);

        result += `.zone${i}{ left:${x}%; top:${y}%; width:10%; height:10%; }\n`;
    });

    document.getElementById("output").value = result;
}

/* 복사 */
function copyCode(){
    let text = document.getElementById("output");
    text.select();
    document.execCommand("copy");
    alert("복사 완료!");
}

</script>

</body>
</html>
