<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>드래그 좌표 편집기</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.wrapper{
    position:relative;
    width:900px;
}

.bg{
    width:100%;
    display:block;
}

/* 🎯 드래그 박스 */
.box{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,0,0,0.3);
    border:2px dashed red;
    cursor:grab;
    user-select:none;
}

/* 좌표 표시 */
#info{
    position:fixed;
    top:10px;
    left:10px;
    background:#fff;
    padding:10px;
    font-size:14px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="info">
좌표: <span id="coords">0,0</span>
</div>

<div class="wrapper" id="map">

    <img src="images/house_inside.png" class="bg">

    <!-- 🧠 드래그 영역 (예: 침대) -->
    <div class="box" id="bed"></div>

    <div class="box" id="closet"></div>

    <div class="box" id="deer"></div>

</div>

<script>

let activeBox = null;
let offsetX = 0;
let offsetY = 0;

document.querySelectorAll(".box").forEach(box => {

    box.addEventListener("mousedown", (e) => {
        activeBox = box;

        offsetX = e.offsetX;
        offsetY = e.offsetY;

        box.style.cursor = "grabbing";
    });
});

document.addEventListener("mousemove", (e) => {

    if(!activeBox) return;

    const rect = document.getElementById("map").getBoundingClientRect();

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    activeBox.style.left = x + "px";
    activeBox.style.top = y + "px";

    // 📍 퍼센트 변환 (게임용)
    let percentX = (x / rect.width * 100).toFixed(1);
    let percentY = (y / rect.height * 100).toFixed(1);

    document.getElementById("coords").innerText =
    `left:${percentX}%; top:${percentY}%;`;
});

document.addEventListener("mouseup", () => {

    if(activeBox){
        activeBox.style.cursor = "grab";
    }

    activeBox = null;
});

</script>

</body>
</html>
