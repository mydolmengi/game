<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집 내부</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    font-family:'GmarketSans', sans-serif;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;
    background:rgba(255,255,255,0);
}

/* 침대 */
.bed{ left:4%; top:48%; width:27%; height:14%; }

/* 옷장 */
.closet{ left:24%; top:29%; width:18%; height:20%; }

/* 책장 */
.bookshelf{ left:43%; top:33%; width:8%; height:13%; }

/* 액자 */
.frame{ left:53%; top:29%; width:11%; height:8%; }

/* 주방 */
.kitchen{ left:66%; top:23%; width:33%; height:25%; }

/* 상자 */
.box{ left:89%; top:49%; width:13%; height:9%; }

/* 돌아가기 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
    padding:12px 30px;
    background:#f9e9c8;
    border:5px solid #c89b5d;
    border-radius:25px;
    cursor:pointer;
    font-size:18px;
    color:#5b3719;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* 인벤토리 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:60px;
    height:60px;
    border:none;
    border-radius:15px;
    background:#ff9fd2;
    font-size:24px;
    cursor:pointer;
    z-index:999;
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.popup-box{
    width:90%;
    max-width:500px;
    background:#f9e9c8;
    border-radius:25px;
    border:5px solid #c89b5d;
    padding:20px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.close-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#ff9fd2;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.popup-title{
    font-size:22px;
    color:#5b3719;
    margin-bottom:10px;
    line-height:1.6;
}

.popup-body{
    font-size:18px;
    color:#5b3719;
    margin-bottom:10px;
    line-height:1.7;
}

.choice-btn{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:10px;
}

.keypad button{
    padding:12px;
    background:#f9e9c8;
    border:5px solid #c89b5d;
    border-radius:20px;
    cursor:pointer;
    font-size:18px;
    color:#5b3719;
}

.code-display{
    font-size:22px;
    letter-spacing:8px;
    margin-bottom:10px;
    color:#5b3719;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/house_inside.png" class="bg" alt="집 내부">

    <!-- 🛏 침대 -->
    <div class="zone bed"
    onclick="getItem('bubbletea','bubbletea','흑당 버블티','꿀맛도리 흑당 버블버블티~~~')"></div>

    <!-- 👕 옷장 -->
    <div class="zone closet"
    onclick="getItem('jjamppong','jjamppong','짬뽕','얼큰 짬뽕')"></div>

    <!-- 📚 책장 -->
    <div class="zone bookshelf"
    onclick="showPhoto('photo1','사진1','책장 사진')"></div>

    <!-- 🖼 액자 -->
    <div class="zone frame"
    onclick="showPhoto('photo2','사진2','행복해 보인다.....')"></div>

    <!-- 🍳 주방 -->
    <div class="zone kitchen"
    onclick="location.href='kitchen.html'"></div>

    <!-- 📦 상자 -->
    <div class="zone box"
    onclick="openBox()"></div>

    <!-- ↩ 돌아가기 -->
    <button class="back-btn" onclick="location.href='room1.html'">
        돌아가기
    </button>

</div>

<!-- 🎒 인벤토리 -->
<button class="inventory-btn" onclick="location.href='inventory.html'">🎒</button>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">

        <button class="close-btn" onclick="closePopup()">✕</button>

        <div class="popup-title" id="title"></div>
        <div class="popup-body" id="body"></div>
        <div id="actions"></div>

    </div>
</div>

<script src="js/inventory.js"></script>

<script>

/* =========================
   LAST PAGE FIX
========================= */
window.addEventListener("DOMContentLoaded", () => {
    localStorage.setItem("lastPage","house_inside.html");
});

/* =========================
   POPUP
========================= */
function openPopup(t,b,a){
    document.getElementById("title").innerHTML = t;
    document.getElementById("body").innerHTML = b;
    document.getElementById("actions").innerHTML = a;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

/* =========================
   ITEM
========================= */
function getItem(id,img,title,desc){

    if(!hasItem(id)){
        addItem(id);
    }

    openPopup(
        title,
        `<img src="images/${img}.png" style="width:180px; display:block; margin:10px auto;"><br>${desc}`,
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

/* =========================
   PHOTO
========================= */
function showPhoto(img,title,desc){

    openPopup(
        title,
        `<img src="images/${img}.png" style="width:200px; display:block; margin:10px auto;"><br>${desc}`,
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

/* =========================
   KEYPAD BOX
========================= */
let code = "";

function openBox(){

    code = "";

    openPopup(
        "비밀번호",
        `<div class="code-display" id="code">____</div>`,
        `
        <div class="keypad">
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
            <button onclick="clearC()">C</button>
            <button onclick="press(0)">0</button>
            <button onclick="check()">✔</button>
        </div>
        `
    );
}

function press(n){
    if(code.length >= 4) return;
    code += n;
    document.getElementById("code").innerText = code.padEnd(4, "_");
}

function clearC(){
    code = "";
    document.getElementById("code").innerText = "____";
}

function check(){

    if(code === "8297"){

        addItem("key");

        openPopup(
            "성공",
            `<img src="images/key.png" style="width:120px; display:block; margin:10px auto;"><br>열쇠 획득`,
            `<button class="choice-btn" onclick="closePopup()">확인</button>`
        );

    }else{

        openPopup(
            "실패",
            "바보... 그거 아닌데..",
            `<button class="choice-btn" onclick="closePopup()">확인</button>`
        );
    }
}

</script>

</body>
</html>
