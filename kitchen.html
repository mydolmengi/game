<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이미지 무관 드래그 에디터</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
}

/* 🔥 맵 영역 */
.wrapper{
    position:relative;
    width:900px;
    margin-top:20px;
}

img{
    width:100%;
    display:block;
    user-select:none;
}

/* ======================
   🧱 드래그 박스
====================== */
.box{
    position:absolute;

    width:10%;
    height:10%;

    background:rgba(255,0,0,0.25);
    border:2px dashed red;

    cursor:grab;
    z-index:10;
}

/* ======================
   📊 UI 패널 (고정)
====================== */
#panel{
    position:fixed;
    top:20px;
    left:20px;

    width:520px;
    background:white;
    padding:18px;
    border-radius:12px;

    font-size:16px;
}

textarea{
    width:100%;
    height:220px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    cursor:pointer;
}

#info{
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔥 UI -->
<div id="panel">
<b>🎮 UNIVERSAL DRAG EDITOR</b>

<div id="info">이미지 무관 좌표 시스템</div>

<textarea id="output"></textarea>

<button onclick="addBox()">➕ 박스 추가</button>
<button onclick="copyCode()">📋 복사</button>
</div>

<!-- 🔥 맵 -->
<div class="wrapper" id="map">

    <!-- 👇 이미지 바꿔도 OK -->
    <img src="images/kitchen_bg.png" id="bg">

</div>

<script>

let activeBox = null;
let offsetX = 0;
let offsetY = 0;

/* ======================
   ➕ 박스 생성
====================== */
function addBox(){

    const box = document.createElement("div");
    box.className = "box";

    box.style.left = "50%";
    box.style.top = "50%";

    document.getElementById("map").appendChild(box);

    enableDrag(box);
}

/* ======================
   🖱 드래그
====================== */
function enableDrag(box){

    box.addEventListener("mousedown",(e)=>{
        activeBox = box;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
    });
}

/* ======================
   📌 이동 (핵심: % 기준)
====================== */
document.addEventListener("mousemove",(e)=>{

    if(!activeBox) return;

    const map = document.getElementById("map");
    const rect = map.getBoundingClientRect();

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    activeBox.style.left = (x / rect.width * 100) + "%";
    activeBox.style.top = (y / rect.height * 100) + "%";

    updateOutput();
});

document.addEventListener("mouseup",()=>{
    activeBox = null;
});

/* ======================
   📊 코드 생성 (핵심)
====================== */
function updateOutput(){

    const boxes = document.querySelectorAll(".box");
    const map = document.getElementById("map").getBoundingClientRect();

    let result = "";

    boxes.forEach((b,i)=>{

        const rect = b.getBoundingClientRect();

        let x = ((rect.left - map.left) / map.width * 100).toFixed(1);
        let y = ((rect.top - map.top) / map.height * 100).toFixed(1);
        let w = (rect.width / map.width * 100).toFixed(1);
        let h = (rect.height / map.height * 100).toFixed(1);

        result += `.zone${i}{
  left:${x}%;
  top:${y}%;
  width:${w}%;
  height:${h}%;
}\n\n`;
    });

    document.getElementById("output").value = result;
}

/* ======================
   📋 복사
====================== */
function copyCode(){

    const t = document.getElementById("output");
    t.select();
    document.execCommand("copy");

    alert("복사 완료!");
}

</script>

</body>
</html>
