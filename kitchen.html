.box{

    position:absolute;

вҖӢ

    position:fixed;

<body>

вҖӢ

<!-- ======================

   рҹ“Ҡ UI нҢЁл„җ

====================== -->

<div id="panel">

<b>рҹҺ® FINAL MAP EDITOR FIX</b>

<div id="info">мқҙлҜём§Җ м•Ҳ ліҙмқҙлҠ” л¬ём ң н•ҙкІ° лІ„м „</div>

вҖӢ

<textarea id="output"></textarea>

вҖӢ

<button onclick="addBox()">вһ• л°•мҠӨ м¶”к°Җ</button>

<button onclick="copyCode()">рҹ“Ӣ ліөмӮ¬</button>

</div>

вҖӢ

<!-- ======================

   рҹ—ә л§ө

====================== -->

<div class="wrapper" id="map">

вҖӢ

    <!-- рҹ”Ҙ м—¬кё° мқҙлҜём§Җ л„ЈлҠ” кіі -->

    <img src="images/kitchen_bg.png">

вҖӢ

</div>

вҖӢ

<script>

вҖӢ

let activeBox = null;

let offsetX = 0;

let offsetY = 0;

вҖӢ

/* ======================

   вһ• л°•мҠӨ мғқм„ұ

====================== */

function addBox(){

вҖӢ

    const box = document.createElement("div");

    box.className = "box";

вҖӢ

    box.style.left = "50%";

    box.style.top = "50%";

вҖӢ

    document.getElementById("map").appendChild(box);

вҖӢ

    enableDrag(box);

}

вҖӢ

/* ======================

   рҹ–ұ л“ңлһҳк·ё

====================== */

function enableDrag(box){

вҖӢ

    box.addEventListener("mousedown",(e)=>{

вҖӢ

        // resize мҳҒм—ӯ нҒҙлҰӯмқҙл©ҙ л“ңлһҳк·ё м•Ҳн•Ё

        if(e.offsetX > box.clientWidth - 20 &&

           e.offsetY > box.clientHeight - 20){

            return;

        }

вҖӢ

        activeBox = box;

вҖӢ

        offsetX = e.offsetX;

        offsetY = e.offsetY;

вҖӢ

        box.classList.add("dragging");

    });

}

вҖӢ

/* ======================

   рҹ“Ң мқҙлҸҷ (100% кё°мӨҖ)

====================== */

document.addEventListener("mousemove",(e)=>{

вҖӢ

    if(!activeBox) return;

вҖӢ

    const map = document.getElementById("map");

    const rect = map.getBoundingClientRect();

вҖӢ

    let x = e.clientX - rect.left - offsetX;

    let y = e.clientY - rect.top - offsetY;

вҖӢ

    activeBox.style.left = (x / rect.width * 100) + "%";

    activeBox.style.top = (y / rect.height * 100) + "%";

вҖӢ

    updateOutput();

});

вҖӢ

document.addEventListener("mouseup",()=>{

вҖӢ

    if(activeBox){

        activeBox.classList.remove("dragging");

    }

вҖӢ

    activeBox = null;

});

вҖӢ

/* ======================

   рҹ“Ҡ мҪ”л“ң мғқм„ұ

====================== */

function updateOutput(){

вҖӢ

    const boxes = document.querySelectorAll(".box");

    const map = document.getElementById("map").getBoundingClientRect();

вҖӢ

    let result = "";

вҖӢ

    boxes.forEach((b,i)=>{

вҖӢ

        const rect = b.getBoundingClientRect();

вҖӢ

        let x = ((rect.left - map.left) / map.width * 100).toFixed(1);

        let y = ((rect.top - map.top) / map.height * 100).toFixed(1);

вҖӢ

        let w = (rect.width / map.width * 100).toFixed(1);

        let h = (rect.height / map.height * 100).toFixed(1);

вҖӢ

        result += `.zone${i}{

  left:${x}%;

  top:${y}%;

  width:${w}%;

  height:${h}%;

}\n\n`;

    });

вҖӢ

    document.getElementById("output").value = result;

}

вҖӢ

/* ======================

   рҹ“Ӣ ліөмӮ¬

====================== */

function copyCode(){

вҖӢ

    const t = document.getElementById("output");

    t.select();

    document.execCommand("copy");

вҖӢ

    alert("ліөмӮ¬ мҷ„лЈҢ!");

}

вҖӢ

</script>
