<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RPG 맵 에디터 FINAL FIX</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    font-family:sans-serif;
}

/* ======================
   🗺 맵 영역 (핵심 수정)
====================== */
.wrapper{
    position:relative;
    width:900px;

    /* 🔥 중요: 반드시 있어야 화면 보임 */
    height:auto;

    margin-top:20px;
}

/* 🔥 이미지 확실히 보이게 */
.wrapper img{
    width:100%;
    height:auto;
    display:block;
}

/* ======================
   🧱 드래그 박스
====================== */
.box{
    position:absolute;

    width:120px;
    height:120px;

    background:rgba(255,0,0,0.25);
    border:2px dashed red;

    cursor:grab;
    z-index:10;

    resize: both;
    overflow: hidden;

    min-width:30px;
    min-height:30px;
}

/* ======================
   📊 UI 패널
====================== */
#panel{
    position:fixed;
    top:20px;
    left:20px;

    width:520px;
    background:white;
    padding:18px;
    border-radius:12px;

    font-size:16px;
    z-index:999;
}

textarea{
    width:100%;
    height:240px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    cursor:pointer;
}

#info{
    font-weight:bold;
    margin-top:10px;
}

/* 드래그 상태 */
.dragging{
    cursor:grabbing !important;
}
</style>
</head>

<body>

<!-- ======================
   📊 UI 패널
====================== -->
<div id="panel">
<b>🎮 FINAL MAP EDITOR FIX</b>

<div id="info">이미지 안 보이는 문제 해결 버전</div>

<textarea id="output"></textarea>

<button onclick="addBox()">➕ 박스 추가</button>
<button onclick="copyCode()">📋 복사</button>
</div>

<!-- ======================
   🗺 맵
====================== -->
<div class="wrapper" id="map">

    <!-- 🔥 여기 이미지 넣는 곳 -->
    <img src="images/kitchen_bg.png">

</div>

<script>

let activeBox = null;
let offsetX = 0;
let offsetY = 0;

/* ======================
   ➕ 박스 생성
====================== */
function addBox(){

    const box = document.createElement("div");
    box.className = "box";

    box.style.left = "50%";
    box.style.top = "50%";

    document.getElementById("map").appendChild(box);

    enableDrag(box);
}

/* ======================
   🖱 드래그
====================== */
function enableDrag(box){

    box.addEventListener("mousedown",(e)=>{

        // resize 영역 클릭이면 드래그 안함
        if(e.offsetX > box.clientWidth - 20 &&
           e.offsetY > box.clientHeight - 20){
            return;
        }

        activeBox = box;

        offsetX = e.offsetX;
        offsetY = e.offsetY;

        box.classList.add("dragging");
    });
}

/* ======================
   📌 이동 (100% 기준)
====================== */
document.addEventListener("mousemove",(e)=>{

    if(!activeBox) return;

    const map = document.getElementById("map");
    const rect = map.getBoundingClientRect();

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    activeBox.style.left = (x / rect.width * 100) + "%";
    activeBox.style.top = (y / rect.height * 100) + "%";

    updateOutput();
});

document.addEventListener("mouseup",()=>{

    if(activeBox){
        activeBox.classList.remove("dragging");
    }

    activeBox = null;
});

/* ======================
   📊 코드 생성
====================== */
function updateOutput(){

    const boxes = document.querySelectorAll(".box");
    const map = document.getElementById("map").getBoundingClientRect();

    let result = "";

    boxes.forEach((b,i)=>{

        const rect = b.getBoundingClientRect();

        let x = ((rect.left - map.left) / map.width * 100).toFixed(1);
        let y = ((rect.top - map.top) / map.height * 100).toFixed(1);

        let w = (rect.width / map.width * 100).toFixed(1);
        let h = (rect.height / map.height * 100).toFixed(1);

        result += `.zone${i}{
  left:${x}%;
  top:${y}%;
  width:${w}%;
  height:${h}%;
}\n\n`;
    });

    document.getElementById("output").value = result;
}

/* ======================
   📋 복사
====================== */
function copyCode(){

    const t = document.getElementById("output");
    t.select();
    document.execCommand("copy");

    alert("복사 완료!");
}

</script>

</body>
</html>
