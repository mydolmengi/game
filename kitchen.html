<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주방</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
}

.game{
    position:relative;
    width:min(100%,900px);
    margin:auto;
}

.bg{
    width:100%;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;
    background:rgba(255,255,255,0);
}

/* 싱크대 */
.sink-zone{
    left:12.9%;
    top:44.6%;
    width:13.8%;
    height:7.8%;
}

/* 화로 */
.fire-zone{
    left:45.8%;
    top:43.3%;
    width:15.6%;
    height:9.9%;
}

/* 냉장고 */
.fridge-zone{
    left:74.9%;
    top:32.5%;
    width:15.6%;
    height:13.5%;
}

/* 러그 */
.rug-zone{
    position:absolute;
    left:211px;
    top:967px;
    width:425px;
    height:389px;
    transform:rotate(32deg);
    cursor:pointer;
}

/* 버튼 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 30px;
    cursor:pointer;
}

.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
}

/* basement */
.basement-btn{
    position:absolute;
    left:50%;
    top:70%;
    transform:translateX(-50%);
    display:none;
    background:#c89b5d;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:20px;
}

/* popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:20px;
    width:90%;
    max-width:600px;
    text-align:center;
}

.choice-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/kitchen_bg.png" class="bg">

    <!-- 싱크대 -->
    <div class="zone sink-zone" onclick="getIce()"></div>

    <!-- 화로 -->
    <div class="zone fire-zone" onclick="getTiramisu()"></div>

    <!-- 냉장고 -->
    <div class="zone fridge-zone" onclick="openFridge()"></div>

    <!-- 러그 -->
    <div class="rug-zone" onclick="openRug()"></div>

    <!-- 지하통로 -->
    <button class="basement-btn" id="basementBtn"
    onclick="location.href='underground_passage.html'">
        Enter Underground Passage
    </button>

    <!-- 집으로 -->
    <button class="back-btn"
    onclick="location.href='house_inside.html'">
        집 안으로 돌아가기
    </button>

</div>

<button class="inventory-btn"
onclick="location.href='inventory.html'">🎒</button>

<!-- popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div id="txt"></div>
        <div id="btns"></div>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>

/* ======================
   INIT
====================== */
window.onload = () => {

    localStorage.setItem("lastPage","kitchen.html");

    if(localStorage.getItem("basementOpened")==="true"){
        document.getElementById("basementBtn").style.display="block";
    }
};

function show(t,b){
    document.getElementById("txt").innerHTML=t;
    document.getElementById("btns").innerHTML=b;
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* ======================
   싱크대
====================== */
function getIce(){
    addItem("iceAmericano");
    show("아이스 아메리카노",
    "<button class='choice-btn' onclick='closePopup()'>확인</button>");
}

/* ======================
   화로
====================== */
function getTiramisu(){
    addItem("tiramisu");
    show("티라미수",
    "<button class='choice-btn' onclick='closePopup()'>확인</button>");
}

/* ======================
   냉장고 (하트 1회 제한)
====================== */
function openFridge(){

    show("냉장고",
    "<button class='choice-btn' onclick='getHeart()'>갈비찜</button>");
}

function getHeart(){

    if(hasItem("heart")){
        show("이미 있음",
        "<button class='choice-btn' onclick='closePopup()'>확인</button>");
        return;
    }

    addItem("heart");

    show("💖 하트 생명 획득",
    "<button class='choice-btn' onclick='closePopup()'>확인</button>");
}

/* ======================
   러그
====================== */
function openRug(){

    show("러그",
    "<button class='choice-btn' onclick='checkDoor()'>확인</button>");
}

function checkDoor(){

    if(hasItem("key")){

        localStorage.setItem("basementOpened","true");
        document.getElementById("basementBtn").style.display="block";

        location.href="underground_passage.html";

    } else {

        show("열쇠 필요",
        "<button class='choice-btn' onclick='closePopup()'>확인</button>");
    }
}

</script>

</body>
</html>
