<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>л“ңлһҳк·ё мўҢн‘ң мғқм„ұкё° V2</title>

вҖӢ

<style>

body{

    margin:0;

    background:#111;

    display:flex;

    justify-content:center;

    font-family:sans-serif;

}

вҖӢ

/* рҹ”Ҙ 2л°° нҷ•лҢҖ */

.wrapper{

    position:relative;

    width:1800px; /* 900 вҶ’ 1800 */

    margin-top:20px;

}

вҖӢ

.bg{

    width:100%;

    display:block;

    user-select:none;

}

вҖӢ

/* =========================

   рҹ§ұ л°•мҠӨ (л“ңлһҳк·ё + лҰ¬мӮ¬мқҙмҰҲ)

========================= */

вҖӢ

.box{

    position:absolute;

    min-width:40px;

    min-height:40px;

вҖӢ

    background:rgba(255,0,0,0.25);

    border:2px dashed red;

вҖӢ

    cursor:grab;

    resize:both;      /* рҹ”Ҙ нҒ¬кё° мЎ°м Ҳ к°ҖлҠҘ */

    overflow:auto;

вҖӢ

    z-index:10;

}

вҖӢ

/* =========================

   рҹ“Ҡ UI нҢЁл„җ (2л°° нҷ•лҢҖ)

========================= */

вҖӢ

#info{

    position:fixed;

    top:20px;

    left:20px;

вҖӢ

    background:white;

    padding:20px;

вҖӢ

    font-size:18px;

    border-radius:12px;

вҖӢ

    width:520px;   /* рҹ”Ҙ нҷ•лҢҖ */

    z-index:999;

}

вҖӢ

textarea{

    width:100%;

    height:220px;  /* рҹ”Ҙ нҷ•лҢҖ */

    margin-top:10px;

    font-size:14px;

}

вҖӢ

button{

    width:100%;

    padding:12px;

    margin-top:8px;

    font-size:16px;

    cursor:pointer;

}

вҖӢ

/* мўҢн‘ң н‘ңмӢң */

#coords{

    display:block;

    margin-top:10px;

    font-weight:bold;

}

</style>

</head>

вҖӢ

<body>

вҖӢ

<div id="info">

<b>рҹҺҜ л“ңлһҳк·ё мўҢн‘ң мғқм„ұкё° V2 (м—…к·ёл Ҳмқҙл“ң)</b>

вҖӢ

<span id="coords">мўҢн‘ң лҢҖкё°мӨ‘...</span>

вҖӢ

<textarea id="output" placeholder="мһҗлҸҷ CSS мҪ”л“ң"></textarea>

вҖӢ

<button onclick="addBox()">вһ• л°•мҠӨ м¶”к°Җ</button>

<button onclick="copyCode()">рҹ“Ӣ ліөмӮ¬</button>

</div>

вҖӢ

<div class="wrapper" id="map">

вҖӢ

    <img src="images/kitchen_bg.png" class="bg">

вҖӢ

</div>

вҖӢ

<script>

вҖӢ

let activeBox = null;

let offsetX = 0;

let offsetY = 0;

вҖӢ

/* =========================

   вһ• л°•мҠӨ м¶”к°Җ (мһҗмң  нҒ¬кё°)

========================= */

вҖӢ

function addBox(){

вҖӢ

    const box = document.createElement("div");

    box.className = "box";

вҖӢ

    box.style.left = "50%";

    box.style.top = "50%";

    box.style.width = "120px";

    box.style.height = "120px";

вҖӢ

    document.getElementById("map").appendChild(box);

вҖӢ

    makeDraggable(box);

}

вҖӢ

/* =========================

   рҹ–ұ л“ңлһҳк·ё

========================= */

вҖӢ

function makeDraggable(box){

вҖӢ

    box.addEventListener("mousedown",(e)=>{

вҖӢ

        activeBox = box;

вҖӢ

        offsetX = e.offsetX;

        offsetY = e.offsetY;

    });

вҖӢ

}

вҖӢ

/* =========================

   рҹ“Ң мқҙлҸҷ мІҳлҰ¬

========================= */

вҖӢ

document.addEventListener("mousemove",(e)=>{

вҖӢ

    if(!activeBox) return;

вҖӢ

    const map = document.getElementById("map");

    const rect = map.getBoundingClientRect();

вҖӢ

    let x = e.clientX - rect.left - offsetX;

    let y = e.clientY - rect.top - offsetY;

вҖӢ

    activeBox.style.left = x + "px";

    activeBox.style.top = y + "px";

вҖӢ

    updateOutput();

});

вҖӢ

document.addEventListener("mouseup",()=>{

вҖӢ

    activeBox = null;

});

вҖӢ

/* =========================

   рҹ“Ҡ мҪ”л“ң мғқм„ұ (мўҢн‘ң + нҒ¬кё°)

========================= */

вҖӢ

function updateOutput(){

вҖӢ

    const boxes = document.querySelectorAll(".box");

    const map = document.getElementById("map").getBoundingClientRect();

вҖӢ

    let result = "";

вҖӢ

    boxes.forEach((b,i)=>{

вҖӢ

        let rect = b.getBoundingClientRect();

вҖӢ

        let x = ((rect.left - map.left) / map.width * 100).toFixed(1);

        let y = ((rect.top - map.top) / map.height * 100).toFixed(1);

вҖӢ

        let w = (rect.width / map.width * 100).toFixed(1);

        let h = (rect.height / map.height * 100).toFixed(1);

вҖӢ

        result += `.zone${i}{ left:${x}%; top:${y}%; width:${w}%; height:${h}%; }\n`;

    });

вҖӢ

    document.getElementById("output").value = result;

вҖӢ

    document.getElementById("coords").innerText =

    "мўҢн‘ң + нҒ¬кё° мһҗлҸҷ мғқм„ұ мҷ„лЈҢ";

}

вҖӢ

/* =========================

   рҹ“Ӣ ліөмӮ¬

========================= */

вҖӢ

function copyCode(){

вҖӢ

    let text = document.getElementById("output");

    text.select();

    document.execCommand("copy");

вҖӢ

    alert("ліөмӮ¬ мҷ„лЈҢ!");

}

вҖӢ

</script>

вҖӢ

</body>

</html>
