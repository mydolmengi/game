<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주방</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

html, body{
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
    background:#000;
    font-family:'GmarketSans', sans-serif;
}

*{
    box-sizing:border-box;
}

.game{
    position:relative;
    width:100%;
    max-width:900px;
    margin:0 auto;
}

.bg{
    width:100%;
    height:auto;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;
}

/* zones */
.sink-zone{ left:12.9%; top:44.6%; width:13.8%; height:7.8%; }
.fire-zone{ left:45.8%; top:43.3%; width:15.6%; height:9.9%; }
.fridge-zone{ left:74.9%; top:32.5%; width:15.6%; height:13.5%; }

.rug-zone{
    position:absolute;
    left:27.3%;
    top:70.5%;
    width:55%;
    height:28.3%;
    transform:rotate(32deg);
    cursor:pointer;
}

/* 버튼 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 30px;
    cursor:pointer;
    font-size:18px;
    color:#5b3719;
    font-family:'GmarketSans', sans-serif;
    z-index:10;
}

.inventory-btn{
    position:absolute;
    top:2%;
    right:2%;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
    z-index:999;
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:flex-start;
    overflow-y:auto;
    padding:20px 15px;
    z-index:9999;
}

.popup-box{
    width:100%;
    max-width:520px;

    max-height:85vh;
    overflow-y:auto;

    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:28px;
    padding:22px 20px 18px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    margin:auto;
}

#txt{
    font-size:18px;
    line-height:1.6;
    color:#5b3719;
    word-break:keep-all;
    overflow-wrap:break-word;
}

.choice-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    cursor:pointer;
    font-family:'GmarketSans', sans-serif;
    font-size:18px;
}

.popup-img{
    width:min(100%, 220px);
    margin:10px auto;
    display:block;
    cursor:pointer;
    height:auto;
}

/* ======================
   🧊 냉장고 애니메이션
====================== */
.fridge-open {
    animation: fridgeShake 0.6s ease;
}

@keyframes fridgeShake {
    0% { transform: scale(1); }
    25% { transform: scale(1.03) rotate(1deg); }
    50% { transform: scale(0.98) rotate(-1deg); }
    100% { transform: scale(1); }
}

/* ======================
   🟫 러그 들림 효과
====================== */
.rug-lift {
    animation: rugUp 0.4s ease forwards;
}

@keyframes rugUp {
    from { transform: rotate(32deg) translateY(0); }
    to   { transform: rotate(32deg) translateY(-25px); }
}

@media (max-width:600px){

    .popup{
        padding:15px 12px;
    }

    .popup-box{
        max-height:80vh;
        padding:16px;
    }

    .choice-btn{
        font-size:16px;
        padding:10px;
    }

    #txt{
        font-size:16px;
    }

    .inventory-btn{
        width:52px;
        height:52px;
        font-size:24px;
        border-radius:16px;
    }

    .back-btn{
        font-size:16px;
        padding:10px 22px;
    }
}
</style>
</head>

<body>

<div class="game">

    <img src="images/kitchen_bg.png" class="bg" alt="주방">

    <button class="inventory-btn" onclick="location.href='inventory.html'">🎒</button>

    <!-- 싱크대 -->
    <div class="zone sink-zone" onclick="getIce()"></div>

    <!-- 화로 -->
    <div class="zone fire-zone" onclick="getCake()"></div>

    <!-- 냉장고 -->
    <div class="zone fridge-zone" onclick="openFridge()"></div>

    <!-- 러그 -->
    <div class="rug-zone" onclick="openRug()"></div>

    <!-- 돌아가기 -->
    <button class="back-btn"
    onclick="location.href='house_inside.html'">
        집 안으로
    </button>

</div>

<!-- popup -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div id="txt"></div>
        <div id="btns"></div>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>
function show(t,b){
    document.getElementById("txt").innerHTML=t;
    document.getElementById("btns").innerHTML=b;
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* ======================
   싱크대
====================== */
function getIce(){
    addItem("iceAmericano");

    show(`
        아이스 아메리카노
        <br><img src="images/ice.png" class="popup-img" alt="아이스 아메리카노">
        <br>겁나 차갑다
    `,
    `<button class='choice-btn' onclick='closePopup()'>확인</button>`);
}

/* ======================
   화로
====================== */
function getCake(){
    addItem("tiramisu");

    show(`
        티라미수
        <br><img src="images/tiramisu.png" class="popup-img" alt="티라미수">
        <br>달콤해보인다
    `,
    `<button class='choice-btn' onclick='closePopup()'>확인</button>`);
}

/* ======================
   냉장고 (애니메이션 추가)
====================== */
function openFridge(){

    const fridge = document.querySelector(".fridge-zone");

    fridge.classList.add("fridge-open");

    setTimeout(() => {
        fridge.classList.remove("fridge-open");
    }, 600);

    show(`
        냉장고 안
        <br><br>
        <img src="images/fridge.png"
        class="popup-img"
        alt="냉장고"
        onclick="getHeart()">
        <br>헐, 맛있는 갈비당!
    `,
    `<button class='choice-btn' onclick='closePopup()'>닫기</button>`);
}

function getHeart(){

    if(hasItem("heart")){
        show("이미 있음",
        `<button class='choice-btn' onclick='closePopup()'>확인</button>`);
        return;
    }

    addItem("heart");

    show(`
        💖 하트 생명 획득
        <br><img src="images/heart.png" class="popup-img" alt="하트">
    `,
    `<button class='choice-btn' onclick='closePopup()'>확인</button>`);
}

/* ======================
   러그 (들림 효과 추가)
====================== */
function openRug(){

    const rug = document.querySelector(".rug-zone");

    rug.classList.add("rug-lift");

    show(`
        러그
        <br><br>
        <img src="images/rug1.png"
        class="popup-img"
        alt="러그"
        onclick="rug2()">
        <br>이 러그 매우 수상한 걸....?
    `,
    `<button class='choice-btn' onclick='closePopup()'>닫기</button>`);
}

function rug2(){

    show(`
        러그 아래
        <br><br>
        <img src="images/rug2.png"
        class="popup-img"
        alt="러그 아래"
        onclick="checkDoor()">
        <br>아니 이게 뭐야????!!!
    `,
    `<button class='choice-btn' onclick='closePopup()'>닫기</button>`);
}

function checkDoor(){

    if(hasItem("key")){
        localStorage.setItem("basementOpened","true");
        location.href="undergroundbattle.html";
    } else {
        show("문 잠김",
        `<button class='choice-btn' onclick='closePopup()'>확인</button>`);
    }
}
</script>

</body>
</html>
