<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숲</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100%;
}

body{
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow-x:hidden;
}

.game{
    position:relative;
    width:min(100%, 900px);
    margin:0 auto;
}

.bg{
    width:100%;
    display:block;
    position:relative;
    z-index:1;
}

/* 공통 클릭 오브젝트 */
.collectible,
.deer-left,
.deer-right{
    position:absolute;
    cursor:pointer;
    user-select:none;
    z-index:20;
}

.collectible img{
    width:100%;
    height:auto;
    display:block;
    pointer-events:none;
}

/* 아이템 위치 */
.apple-item{
    left:19%;
    top:10%;
    width:11%;
    transform:translate(-50%, -50%);
}

.axe-item{
    left:49%;
    top:60%;
    width:12%;
    transform:translate(-50%, -50%);
}

.flower-item{
    left:16%;
    top:75%;
    width:7%;
    transform:translate(-50%, -50%);
}

/* 사슴 클릭 영역 */
.deer-left{
    left:41%;
    top:30%;
    width:11%;
    height:18%;
    background:rgba(255,255,255,0);
}

.deer-right{
    left:58%;
    top:28%;
    width:18%;
    height:22%;
    background:rgba(255,255,255,0);
}

/* 돌아가기 버튼 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 35px;
    font-size:20px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    z-index:30;
    font-family:'GmarketSans', sans-serif;
}

/* 인벤토리 버튼 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
    z-index:999;
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
    font-family:'GmarketSans', sans-serif;
}

/* 팝업 */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.popup-box{
    position:relative;
    width:90%;
    max-width:620px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.close-btn{
    position:absolute;
    top:12px;
    right:12px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#ff9fd2;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    z-index:5;
    font-family:'GmarketSans', sans-serif;
}

.popup-image{
    height:280px;
    background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(249,233,200,0.55));
    backdrop-filter:blur(8px);
    border-bottom:6px solid #c89b5d;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.popup-media{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.popup-dialog{
    padding:22px 18px 20px;
    text-align:left;
}

.popup-title{
    font-size:26px;
    color:#5b3719;
    margin-bottom:10px;
    line-height:1.5;
}

.popup-body{
    font-size:20px;
    color:#5b3719;
    line-height:1.8;
    margin-bottom:18px;
    white-space:normal;
}

.popup-actions{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.choice-btn{
    background:#f9e9c8;
    border:4px solid #c89b5d;
    border-radius:22px;
    padding:12px 16px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
    font-family:'GmarketSans', sans-serif;
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
}

.choice-btn:active{
    transform:scale(0.98);
}

@media (max-width: 600px){

    .popup-image{
        height:220px;
    }

    .popup-dialog{
        padding:18px 14px 16px;
    }

    .popup-title{
        font-size:22px;
    }

    .popup-body{
        font-size:18px;
    }

    .choice-btn{
        font-size:16px;
        padding:10px 14px;
    }

    .back-btn{
        font-size:18px;
        padding:10px 28px;
    }

    .inventory-btn{
        width:58px;
        height:58px;
        font-size:26px;
    }
}
</style>
</head>
<body>

<div class="game">
    <img src="images/forest_bg.png" class="bg" alt="숲 배경">

    <div class="collectible apple-item" id="appleItem" onclick="collectGoldenApple()">
        <img src="images/golden_apple.png" alt="황금 사과">
    </div>

    <div class="collectible axe-item" id="axeItem" onclick="collectAxe()">
        <img src="images/axe.png" alt="도끼">
    </div>

    <div class="collectible flower-item" id="flowerItem" onclick="collectFlower()">
        <img src="images/flower.png" alt="꽃">
    </div>

    <div class="deer-left" onclick="talkLeftAnimal()"></div>
    <div class="deer-right" onclick="talkRightDeer()"></div>

    <button class="back-btn" onclick="location.href='room1.html'">
        ↩ 돌아가기
    </button>

    <button class="inventory-btn" onclick="location.href='inventory.html'">
        🎒
    </button>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <button class="close-btn" onclick="closePopup()">✕</button>
        <div class="popup-image" id="popupVisual"></div>

        <div class="popup-dialog">
            <div class="popup-title" id="popupTitle"></div>
            <div class="popup-body" id="popupBody"></div>
            <div class="popup-actions" id="popupActions"></div>
        </div>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    localStorage.setItem("lastPage", "forest.html");

    if(hasItem("goldenApple")) document.getElementById("appleItem").style.display = "none";
    if(hasItem("axe")) document.getElementById("axeItem").style.display = "none";
    if(hasItem("flower")) document.getElementById("flowerItem").style.display = "none";
});

function showPopup(img, title, body, actions){
    document.getElementById("popupVisual").innerHTML =
        `<img src="${img}" class="popup-media" alt="">`;

    document.getElementById("popupTitle").innerHTML = title;
    document.getElementById("popupBody").innerHTML = body;
    document.getElementById("popupActions").innerHTML = actions;

    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

/* 아이템 */
function collectGoldenApple(){
    if(hasItem("goldenApple")) return;
    addItem("goldenApple");
    document.getElementById("appleItem").style.display = "none";

    showPopup(
        "images/golden_apple.png",
        "황금 사과",
        "황금 사과를 얻었다.<br>뭔가 아주 중요한 것 같다",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

function collectAxe(){
    if(hasItem("axe")) return;
    addItem("axe");
    document.getElementById("axeItem").style.display = "none";

    showPopup(
        "images/axe.png",
        "도끼",
        "도끼를 얻었다.<br>아주 단단한걸~",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

function collectFlower(){
    if(hasItem("flower")) return;
    addItem("flower");
    document.getElementById("flowerItem").style.display = "none";

    showPopup(
        "images/flower.png",
        "꽃",
        "꽃을 얻었다.<br>사과하장",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

/* 왼쪽 사슴 */
function talkLeftAnimal(){
    const lied = localStorage.getItem("forest_deer_lied") === "true";
    const gifted = localStorage.getItem("forest_deer_gifted") === "true";

    if(lied && !gifted){
        showLeftAngry();
        return;
    }

    if(gifted){
        showLeftQuestion();
        return;
    }

    showLeftIntro();
}

function showLeftIntro(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "너 뭐야?!",
        `<button class="choice-btn" onclick="showLeftQuestion()">다음</button>`
    );
}

function showLeftQuestion(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "여긴 아무나 들어올 수 없는 곳인데...<br>여기 어떻게 왔어?",
        `
        <button class="choice-btn" onclick="truth()">사실대로 말하기</button>
        <button class="choice-btn" onclick="lie()">거짓말하기</button>
        `
    );
}

function truth(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "홀리, 당근 알쥥~ 아주 중요한 날이라고 했던 것 같은데!",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

function lie(){
    localStorage.setItem("forest_deer_lied", "true");

    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "아아아ㅏ아아아악!!!!!!!! 이 구라쟁이! 아주 싹이 노랗구나!",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

function showLeftAngry(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "이 거짓말쟁이!",
        `<button class="choice-btn" onclick="offerFlower()">선물주기</button>`
    );
}

function offerFlower(){
    if(!hasItem("flower")){
        showPopup(
            "images/flower.png",
            "꽃",
            "꽃이 필요하다...<br>먼저 꽃을 찾아와야 해!",
            `<button class="choice-btn" onclick="closePopup()">확인</button>`
        );
        return;
    }

    removeItem("flower");
    localStorage.setItem("forest_deer_gifted", "true");

    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "흠...흠.. 뭘 이런걸다.....",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

/* 오른쪽 사슴 */
function talkRightDeer(){
    showPopup(
        "images/deer.png",
        "사슴",
        "....옛날부터 전해져 오던 말이 있었지./",
        `<button class="choice-btn" onclick="rightNext()">다음</button>`
    );
}

function rightNext(){
    showPopup(
        "images/deer.png",
        "사슴",
        "그건 보이는게 다가 아니라는거지!<br><br>주인공이 말한다.<br>무슨 말을 하는거야......<br><br><b>잘 기억하도록</b>",
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}
</script>

</body>
</html>
