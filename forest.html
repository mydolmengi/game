<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숲</title>

<link rel="stylesheet" href="css/style.css">

<style>
/* (네 기존 CSS 그대로 유지한다고 가정) */
</style>

</head>

<body>

<div class="game">

    <img src="images/forest_bg.png" class="bg">

    <!-- 🍎 황금사과 -->
    <div class="collectible apple-item" onclick="collectGoldenApple()">
        <img src="images/golden_apple.png">
    </div>

    <!-- 🪓 도끼 -->
    <div class="collectible axe-item" onclick="collectAxe()">
        <img src="images/axe.png">
    </div>

    <!-- 🌸 꽃 -->
    <div class="collectible flower-item" onclick="collectFlower()">
        <img src="images/flower.png">
    </div>

    <!-- 🦌 왼쪽 동물 -->
    <div class="deer-left" onclick="talkLeftAnimal()"></div>

    <!-- 🦌 오른쪽 사슴 -->
    <div class="deer-right" onclick="talkRightDeer()"></div>

    <!-- ↩ 돌아가기 -->
    <button class="back-btn" onclick="location.href='room1.html'">
        ↩ 돌아가기
    </button>

    <!-- 🎒 인벤토리 (하나만 유지) -->
    <button class="inventory-btn"
    onclick="location.href='inventory.html'">
    🎒
    </button>

</div>

<!-- 📌 팝업 -->
<div class="popup" id="popup">
    <div class="popup-box">

        <button class="close-btn" onclick="closePopup()">✕</button>

        <div class="popup-image" id="popupVisual"></div>

        <div class="popup-dialog">
            <div id="popupTitle"></div>
            <div id="popupBody"></div>
            <div id="popupActions"></div>
        </div>

    </div>
</div>

<script src="js/inventory.js"></script>

<script>

/* =====================
   상태 체크
===================== */

function hasFlag(key){
    return localStorage.getItem(key) === "true";
}

function setFlag(key){
    localStorage.setItem(key,"true");
}

/* =====================
   팝업
===================== */

function showPopup(img,title,body,actions){

    document.getElementById("popupVisual").innerHTML =
    `<img src="${img}" class="popup-media">`;

    document.getElementById("popupTitle").innerHTML = title;
    document.getElementById("popupBody").innerHTML = body;
    document.getElementById("popupActions").innerHTML = actions;

    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

/* =====================
   아이템
===================== */

function collectGoldenApple(){
    addItem("goldenApple");

    showPopup(
        "images/golden_apple.png",
        "황금 사과",
        "황금 사과를 얻었다.<br>뭔가 아주 중요한 것 같다",
        `<button onclick="closePopup()">확인</button>`
    );
}

function collectAxe(){
    addItem("axe");

    showPopup(
        "images/axe.png",
        "도끼",
        "도끼를 얻었다.<br>아주 단단한걸~",
        `<button onclick="closePopup()">확인</button>`
    );
}

function collectFlower(){
    addItem("flower");

    showPopup(
        "images/flower.png",
        "꽃",
        "꽃을 얻었다.<br>사과하장",
        `<button onclick="closePopup()">확인</button>`
    );
}

/* =====================
   🦌 왼쪽 사슴
===================== */

function talkLeftAnimal(){

    const lied = hasFlag("forest_deer_lied");
    const gifted = hasFlag("forest_deer_gifted");

    if(lied && !gifted){
        showLeftAngry();
        return;
    }

    if(gifted){
        showLeftQuestion();
        return;
    }

    showLeftIntro();
}

function showLeftIntro(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "너 뭐야?!",
        `<button onclick="showLeftQuestion()">다음</button>`
    );
}

function showLeftQuestion(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "여긴 아무나 들어올 수 없는 곳인데...<br>여기 어떻게 왔어?",
        `
        <button onclick="truth()">사실대로 말하기</button>
        <button onclick="lie()">거짓말하기</button>
        `
    );
}

function truth(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "홀리, 당근 알쥥~ 중요한 날이라 했던 것 같은데!",
        `<button onclick="closePopup()">확인</button>`
    );
}

function lie(){
    setFlag("forest_deer_lied");

    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "아아아ㅏ아아악! 이 구라쟁이!",
        `<button onclick="closePopup()">확인</button>`
    );
}

function showLeftAngry(){
    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "이 거짓말쟁이!",
        `<button onclick="offerFlower()">선물주기</button>`
    );
}

function offerFlower(){

    if(!hasItem("flower")){
        showPopup(
            "images/flower.png",
            "꽃",
            "꽃이 필요하다...",
            `<button onclick="closePopup()">확인</button>`
        );
        return;
    }

    removeItem("flower");
    setFlag("forest_deer_gifted");

    showPopup(
        "images/babydeer.png",
        "애기 사슴",
        "흠... 뭘 이런걸 다...",
        `<button onclick="closePopup()">확인</button>`
    );
}

/* =====================
   🦌 오른쪽 사슴
===================== */

function talkRightDeer(){

    showPopup(
        "images/deer.png",
        "사슴",
        "옛날부터 전해져 오던 말이 있었지...",
        `<button onclick="rightNext()">다음</button>`
    );
}

function rightNext(){

    showPopup(
        "images/deer.png",
        "사슴",
        "그건 보이는게 다가 아니라는거지.<br><br>잘 기억하도록.",
        `<button onclick="closePopup()">확인</button>`
    );
}

</script>

</body>
</html>
