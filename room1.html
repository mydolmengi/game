<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>갈림길</title>

<style>

@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'GmarketSans', sans-serif;
}

.game{
    position:relative;
    width:100%;
    max-width:900px;
}

.bg{
    width:100%;
    display:block;
}

/* 🌳 숲 */

.forest{
    position:absolute;
    left:0%;
    top:10%;
    width:33%;
    height:40%;
    cursor:pointer;
}

/* 🏠 집 */

.house{
    position:absolute;
    left:33%;
    top:15%;
    width:34%;
    height:50%;
    cursor:pointer;
}

/* 🕳️ 동굴 */

.cave{
    position:absolute;
    right:0%;
    top:15%;
    width:33%;
    height:50%;
    cursor:pointer;
}

/* 🚗 분좋카 */

.date-car{
    position:absolute;

    left:50%;
    bottom:100px;

    transform:translateX(-50%);

    width:90vw;
    max-width:900px;

    height:auto;

    z-index:20;

    cursor:pointer;

    display:none;
}

.date-car img{
    width:100%;
    height:auto;
    display:block;
}
    
.date-car-label{
    position:absolute;

    left:50%;
    bottom:-45px;

    transform:translateX(-50%);

    background:#f9e9c8;
    border:4px solid #c89b5d;
    border-radius:18px;

    padding:8px 20px;

    color:#5b3719;
    font-size:24px;

    white-space:nowrap;
}

/* 하단 대화창 */

.choice-box{

    position:absolute;

    bottom:15%;

    left:50%;

    transform:translateX(-50%);

    width:80%;

    max-width:650px;

    background:#f9e9c8;

    border:6px solid #c89b5d;

    border-radius:30px;

    padding:18px;

    text-align:center;

    font-size:28px;

    color:#5b3719;

    box-shadow:
        0 8px 20px rgba(0,0,0,0.2);
}

@media (max-width:600px){

    .choice-box{
        font-size:20px;
        padding:12px;
    }

    .date-car{
        left:25%;
        top:72%;
        width:50%;
        height:auto;
    }

    .date-car-label{
        font-size:18px;
    }

}

</style>
</head>
<body>

<div class="game">

    <img
    src="images/room1.png"
    class="bg"
    alt="갈림길">

    <div
    class="forest"
    onclick="location.href='forest.html'"
    title="숲">
    </div>

    <div
    class="house"
    onclick="location.href='house.html'"
    title="집">
    </div>

    <div
    class="cave"
    onclick="location.href='cave.html'"
    title="동굴">
    </div>

    <!-- 🚗 분좋카 -->
    <div
        class="date-car"
        id="dateCar"
        onclick="location.href='Date.html'">

        <img
        src="images/date_car.png"
        alt="분좋카">

        <div class="date-car-label">
            🚗 분좋카
        </div>

    </div>

    <div class="choice-box">
        🌿 어디로 갈까? 🌿
    </div>

</div>

<script src="js/inventory.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

    let hasCoupon = false;

    try{

        if(typeof getInventory === "function"){

            const inv = getInventory();

            hasCoupon =
                Array.isArray(inv) &&
                inv.includes("pdateCoupon");

        }else{

            const inv = JSON.parse(
                localStorage.getItem("inventory") || "[]"
            );

            hasCoupon =
                inv.includes("pdateCoupon");
        }

    }catch(e){
        console.log(e);
    }

    if(hasCoupon){

        document
            .getElementById("dateCar")
            .style.display = "block";
    }

});

</script>

</body>
</html>
