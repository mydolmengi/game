<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지하통로 보스전</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#05060a;
    font-family:'GmarketSans', sans-serif;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
}

canvas{
    display:block;
    margin:0 auto;
    background:#0b0d12;
    touch-action:none;
}

#hud{
    position:fixed;
    left:10px;
    top:10px;
    z-index:5;
    display:flex;
    gap:8px;
    align-items:flex-start;
    pointer-events:none;
}

.card{
    background:rgba(20,22,28,.72);
    backdrop-filter:blur(4px);
    border:1px solid rgba(180,200,255,.14);
    border-radius:16px;
    padding:8px 10px;
    min-width:120px;
    box-shadow:0 8px 22px rgba(0,0,0,.25);
    color:#e9eef8;
    font-weight:700;
}

.bar{
    width:150px;
    height:12px;
    border-radius:999px;
    overflow:hidden;
    background:#311d26;
    margin-top:6px;
}

.fill{
    height:100%;
    width:100%;
    border-radius:999px;
}

#hint{
    position:fixed;
    right:10px;
    top:10px;
    z-index:5;
    background:rgba(20,22,28,.72);
    backdrop-filter:blur(4px);
    border:1px solid rgba(180,200,255,.14);
    border-radius:16px;
    padding:8px 10px;
    color:#dfe8ff;
    font-weight:700;
    box-shadow:0 8px 22px rgba(0,0,0,.25);
}

#resultScreen{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.88);
    z-index:99999;
    justify-content:center;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
}

#resultCard{
    width:min(92vw, 420px);
    background:rgba(20,22,28,.96);
    color:#f3f5ff;
    border:1px solid rgba(255,255,255,.10);
    border-radius:22px;
    padding:24px 18px 18px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
}

#resultTitle{
    margin:0 0 14px;
    font-size:28px;
    letter-spacing:.5px;
}

#resultMessage{
    margin:0 0 18px;
    font-size:16px;
    line-height:1.6;
    color:#e5e8ff;
    min-height:54px;
    white-space:pre-line;
}

#resultButtons{
    display:flex;
    flex-direction:column;
    gap:10px;
}

#resultButtons button{
    width:100%;
    min-width:unset;
    background:#f6f7ff;
    color:#2d2540;
    font-weight:800;
    border-radius:16px;
    font-size:18px;
    padding:12px 16px;
    border:none;
    cursor:pointer;
}

#resultButtons button.secondary{
    background:#2b2f3b;
    color:#f2f4ff;
    border:1px solid rgba(255,255,255,.08);
}

#secretWin{
    position:fixed;
    top:10px;
    right:10px;
    width:18px;
    height:18px;
    padding:0;
    border:none;
    border-radius:50%;
    background:rgba(255,170,210,0.18);
    box-shadow:0 0 0 1px rgba(255,180,220,0.22), 0 0 12px rgba(255,170,210,0.06);
    z-index:10;
    cursor:pointer;
    opacity:0.35;
}

#controls{
    position:fixed;
    bottom:8px;
    width:100%;
    text-align:center;
    z-index:5;
}

#controls .row{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:6px 0;
}

button.ctrl{
    font-size:22px;
    padding:12px 16px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.84);
    box-shadow:0 6px 18px rgba(0,0,0,.18);
    color:#3e3344;
    min-width:58px;
    min-height:58px;
    touch-action:none;
}

button.ctrl:active{
    transform:translateY(1px) scale(.98);
}
</style>
</head>
<body>

<div id="hud">
    <div class="card">
        <div id="playerText">HP 100</div>
        <div class="bar"><div id="playerFill" class="fill" style="background:#7ad66d;width:100%"></div></div>
    </div>
    <div class="card">
        <div id="bossText">BAT LORD 240</div>
        <div class="bar"><div id="bossFill" class="fill" style="background:#ff6565;width:100%"></div></div>
    </div>
</div>

<div id="hint">이동 ⬅️➡️⬆️⬇️ · 공격 ⚔️ · 대시 💨</div>
<button id="secretWin" aria-label="secret win" title=""></button>

<div id="resultScreen">
    <div id="resultCard">
        <h2 id="resultTitle">RESULT</h2>
        <p id="resultMessage"></p>
        <div id="resultButtons"></div>
    </div>
</div>

<canvas id="game" width="400" height="700"></canvas>

<div id="controls">
    <div class="row"><button class="ctrl" id="up">⬆️</button></div>
    <div class="row">
        <button class="ctrl" id="left">⬅️</button>
        <button class="ctrl" id="dash">💨</button>
        <button class="ctrl" id="atk">⚔️</button>
        <button class="ctrl" id="right">➡️</button>
    </div>
    <div class="row"><button class="ctrl" id="down">⬇️</button></div>
</div>

<script>
(() => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const playerFill = document.getElementById("playerFill");
    const bossFill = document.getElementById("bossFill");
    const playerText = document.getElementById("playerText");
    const bossText = document.getElementById("bossText");

    const resultScreen = document.getElementById("resultScreen");
    const resultTitle = document.getElementById("resultTitle");
    const resultMessage = document.getElementById("resultMessage");
    const resultButtons = document.getElementById("resultButtons");

    const keys = { left:false, right:false, up:false, down:false };

    let gameEnd = false;
    let hearts = parseInt(localStorage.getItem("heart") || "0", 10);
    if (Number.isNaN(hearts) || hearts < 0) hearts = 0;

    const state = {
        running: true,
        victory: false,
        gameOver: false,
        shake: 0,
        frame: 0,
        phase: 1,
        patternClock: 0,
        pattern: 0,
    };

    const player = {
        x: 180,
        y: 560,
        w: 26,
        h: 26,
        hp: 100,
        maxHp: 100,
        vx: 0,
        vy: 0,
        atk: 0,
        dash: 0,
        inv: 0,
        atkCooldown: 0,
        dashCooldown: 0,
    };

    const boss = {
        x: 200,
        y: 135,
        r: 28,
        hp: 240,
        maxHp: 240,
        vx: 0,
        vy: 0,
        flash: 0,
        invis: 0,
        orbitA: 0,
        orbitR: 110,
        targetX: 200,
        targetY: 135,
        moveBias: 0,
        lastPattern: -1,
        phase2Trigger: false
    };

    const projectiles = [];
    const particles = [];
    const clones = [];
    const hazards = [];

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
    function rand(a, b) { return a + Math.random() * (b - a); }

    function showResult(title, message, buttonsHtml) {
        state.running = false;
        gameEnd = true;
        resultTitle.textContent = title;
        resultMessage.textContent = message;
        resultButtons.innerHTML = buttonsHtml;
        resultScreen.style.display = "flex";
    }

    function hasHeart(){
        return hasItem("heart");
    }

    function useHeart(){
        if (hasItem("heart")) {
            removeItem("heart");
            return true;
        }
        return false;
    }

    function showVictory() {
        showResult(
            "VICTORY",
            "분하다...! 날 이기다니! 하지만 절대 도달할 수 없을거다!",
            `<button id="goUnderground">안으로 더 들어가기</button>`
        );

        document.getElementById("goUnderground").addEventListener("click", () => {
            location.href = "underground.html";
        });
    }

    function showGameOverWithHeartCheck() {
        showResult(
            "GAME OVER",
            "하하! 넌 통과할 수 없다!",
            `
                <button id="retryHeart">하트를 소모해서 한 번 더 도전하기</button>
                <button id="backKitchen" class="secondary">돌아가기</button>
            `
        );

        document.getElementById("retryHeart").addEventListener("click", () => {
            if (useHeart()) {
                location.reload();
            } else {
                resultMessage.textContent = "하트가 없구만 돌아가라";
                resultButtons.innerHTML = `<button id="backKitchenOnly" class="secondary">돌아가기</button>`;
                document.getElementById("backKitchenOnly").addEventListener("click", () => {
                    location.href = "kitchen.html";
                });
            }
        });

        document.getElementById("backKitchen").addEventListener("click", () => {
            location.href = "kitchen.html";
        });
    }

    function bindButton(id, key) {
        const el = document.getElementById(id);
        const down = (e) => { e.preventDefault(); keys[key] = true; };
        const up = (e) => { if (e) e.preventDefault(); keys[key] = false; };
        el.addEventListener("pointerdown", down);
        el.addEventListener("pointerup", up);
        el.addEventListener("pointerleave", up);
        el.addEventListener("pointercancel", up);
    }

    bindButton("left", "left");
    bindButton("right", "right");
    bindButton("up", "up");
    bindButton("down", "down");

    document.getElementById("atk").addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (!state.running || player.atk > 0) return;
        player.atk = 12;
        player.atkCooldown = 10;
        spawnBurst(player.x + player.w / 2, player.y + player.h / 2, 6, "#ffffff");
    });

    document.getElementById("dash").addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (!state.running || player.dash > 0 || player.dashCooldown > 0) return;

        player.dash = 12;
        player.inv = 18;
        player.dashCooldown = 14;

        let dirX = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        let dirY = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);

        if (dirX === 0 && dirY === 0) {
            const vlen = Math.hypot(player.vx, player.vy);
            if (vlen > 0.1) { dirX = player.vx / vlen; dirY = player.vy / vlen; }
            else { dirY = -1; }
        } else {
            const len = Math.hypot(dirX, dirY);
            dirX /= len; dirY /= len;
        }

        player.vx = dirX * 14;
        player.vy = dirY * 14;
        state.shake = Math.max(state.shake, 3);
        spawnBurst(player.x + player.w / 2, player.y + player.h / 2, 10, "#c8ffff");
    });

    const secretWin = document.getElementById("secretWin");
    secretWin.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (state.running) {
            state.victory = true;
            state.gameOver = false;
            showVictory();
            state.shake = 0;
            spawnBurst(200, 150, 24, "#ffd1e8");
        }
    });

    function choosePattern(phase) {
        const options = phase === 1 ? [0, 1, 1, 2, 2, 3, 4] : [0, 1, 2, 2, 3, 3, 4, 5, 6];
        let pick = options[(Math.random() * options.length) | 0];
        if (pick === boss.lastPattern) pick = options[(Math.random() * options.length) | 0];
        boss.lastPattern = pick;
        return pick;
    }

    function spawnBurst(x, y, n = 10, color = "#fff6b2") {
        for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = 1.5 + Math.random() * 3.2;
            particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 18 + Math.random() * 10, color });
        }
    }

    function spawnRing(count = 12, speed = 3.2, spin = 0) {
        for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 * i) / count + spin;
            projectiles.push({ x: boss.x, y: boss.y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, life: 260, kind: "ring" });
        }
    }

    function spawnHomingBurst(count = 4) {
        for (let i = 0; i < count; i++) {
            projectiles.push({
                x: boss.x + rand(-10,10),
                y: boss.y + rand(-10,10),
                vx: rand(-1.2,1.2),
                vy: rand(-1.2,1.2),
                life: 280,
                kind: "homing",
                turn: 0.085
            });
        }
    }

    function spawnShadowDashMarker(x, y) {
        hazards.push({ x, y, life: 32, kind: "dashMarker" });
    }

    function patternOrbit() {
        boss.orbitA += state.phase === 2 ? 0.075 : 0.05;
        const wobble = Math.sin(state.frame * 0.09) * (state.phase === 2 ? 22 : 16);
        boss.targetX = player.x + player.w / 2 + Math.cos(boss.orbitA) * (boss.orbitR + wobble * 0.2);
        boss.targetY = player.y + player.h / 2 + Math.sin(boss.orbitA * 1.2) * (boss.orbitR * 0.72);
        boss.moveBias = 38;
    }

    function patternTeleportFeint() {
        const candidates = [
            { x: 34, y: 92 },
            { x: 366, y: 92 },
            { x: 40, y: 250 },
            { x: 360, y: 260 },
            { x: 200, y: 105 },
            { x: rand(80, 320), y: rand(80, 250) },
        ];
        const pick = candidates[(Math.random() * candidates.length) | 0];
        boss.x = pick.x;
        boss.y = pick.y;
        boss.invis = 0;
        boss.flash = 8;
        boss.moveBias = 22;
        spawnBurst(boss.x, boss.y, 7, "#e8dcff");

        setTimeout(() => {
            if (state.running) spawnRing(state.phase === 2 ? 16 : 12, state.phase === 2 ? 3.9 : 3.2, state.frame * 0.2);
        }, state.phase === 2 ? 160 : 120);
    }

    function patternDashFake() {
        const dx = player.x + player.w / 2 - boss.x;
        const dy = player.y + player.h / 2 - boss.y;
        const d = Math.hypot(dx, dy) || 1;
        boss.vx = dx / d * (state.phase === 2 ? 12 : 10);
        boss.vy = dy / d * (state.phase === 2 ? 12 : 10);
        boss.moveBias = 30;
        spawnShadowDashMarker(player.x + player.w / 2, player.y + player.h / 2);
        spawnBurst(boss.x, boss.y, 4, "#cfc6ff");
    }

    function patternHomingBurst() {
        spawnHomingBurst(state.phase === 2 ? 6 : 4);
        boss.moveBias = 30;
    }

    function patternShadowCharge() {
        boss.invis = 18;
        boss.moveBias = 0;
        setTimeout(() => {
            if (!state.running) return;
            const side = Math.random() < 0.5 ? 0 : 1;
            boss.x = side ? rand(240, 360) : rand(40, 160);
            boss.y = rand(90, 240);
            boss.flash = 10;
            boss.invis = 0;
            const dx = player.x + player.w / 2 - boss.x;
            const dy = player.y + player.h / 2 - boss.y;
            const d = Math.hypot(dx, dy) || 1;
            boss.vx = dx / d * (state.phase === 2 ? 13 : 11);
            boss.vy = dy / d * (state.phase === 2 ? 13 : 11);
            boss.moveBias = 18;
            spawnBurst(boss.x, boss.y, 10, "#ffffff");
        }, 240);
    }

    function patternHazardWall() {
        hazards.length = 0;
        const leftWall = Math.random() < 0.5;
        const gapY = rand(180, 500);

        for (let i = 0; i < 8; i++) {
            hazards.push({
                x: leftWall ? 0 : 360,
                y: 85 + i * 70,
                w: 40,
                h: 36,
                life: 140,
                kind: "wall"
            });
        }

        hazards.push({
            x: leftWall ? 0 : 360,
            y: gapY,
            w: 40,
            h: 80,
            life: 140,
            kind: "gap"
        });
    }

    function patternCloneBait() {
        clones.length = 0;
        const pts = [
            { x: rand(50, 150), y: rand(120, 220) },
            { x: rand(250, 350), y: rand(120, 220) },
            { x: rand(120, 300), y: rand(150, 260) }
        ];
        pts.forEach((p, i) => clones.push({ x: p.x, y: p.y, life: 80, bait: i !== 1 }));
        boss.x = pts[1].x;
        boss.y = pts[1].y;
        boss.flash = 6;
        boss.moveBias = 20;
        spawnBurst(boss.x, boss.y, 6, "#ffffff");
    }

    function patternSmallSwarm() {
        const n = state.phase === 2 ? 10 : 6;
        for (let i = 0; i < n; i++) {
            const a = (Math.PI * 2 * i) / n + Math.random() * 0.4;
            projectiles.push({
                x: boss.x,
                y: boss.y,
                vx: Math.cos(a) * (state.phase === 2 ? 4.1 : 3.5),
                vy: Math.sin(a) * (state.phase === 2 ? 4.1 : 3.5),
                life: 200,
                kind: "swarm"
            });
        }
    }

    function updatePlayer() {
        const baseMax = 5.6;
        const dashMax = 11.8;
        const accel = 0.92;
        const friction = 0.68;
        const maxSpeed = player.dash > 0 ? dashMax : baseMax;

        let ax = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        let ay = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);

        if (ax !== 0 && ay !== 0) {
            const len = Math.hypot(ax, ay);
            ax /= len; ay /= len;
        }

        if (ax !== 0) {
            if (Math.sign(player.vx) !== Math.sign(ax) && Math.abs(player.vx) > 0.2) player.vx *= 0.42;
            player.vx += ax * accel;
        } else {
            player.vx *= friction;
        }

        if (ay !== 0) {
            if (Math.sign(player.vy) !== Math.sign(ay) && Math.abs(player.vy) > 0.2) player.vy *= 0.42;
            player.vy += ay * accel;
        } else {
            player.vy *= friction;
        }

        player.vx = clamp(player.vx, -maxSpeed, maxSpeed);
        player.vy = clamp(player.vy, -maxSpeed, maxSpeed);

        if (Math.abs(player.vx) < 0.04) player.vx = 0;
        if (Math.abs(player.vy) < 0.04) player.vy = 0;

        player.x += player.vx;
        player.y += player.vy;

        player.x = clamp(player.x, 0, canvas.width - player.w);
        player.y = clamp(player.y, 60, 640 - player.h);

        if (player.atk > 0) player.atk--;
        if (player.dash > 0) player.dash--;
        if (player.inv > 0) player.inv--;
        if (player.atkCooldown > 0) player.atkCooldown--;
        if (player.dashCooldown > 0) player.dashCooldown--;

        if (player.atk > 0) {
            const hit = dist(player.x + player.w / 2, player.y + player.h / 2, boss.x, boss.y) < 72;
            if (hit) {
                boss.hp -= 1.2;
                boss.flash = 4;
                state.shake = Math.max(state.shake, 4);
                spawnBurst(boss.x, boss.y, 5, "#fff3aa");
            }
        }

        if (player.inv <= 0 && dist(player.x + player.w / 2, player.y + player.h / 2, boss.x, boss.y) < boss.r + 12) {
            player.hp -= 10;
            player.inv = 40;
            state.shake = Math.max(state.shake, 8);
            spawnBurst(player.x + player.w / 2, player.y + player.h / 2, 12, "#ffb1b1");
        }
    }

    function updateBoss() {
        if (boss.hp <= 0) return;

        state.phase = boss.hp < 120 ? 2 : 1;
        state.patternClock++;

        if (!boss.phase2Trigger && state.phase === 2) {
            boss.phase2Trigger = true;
            state.shake = Math.max(state.shake, 10);
            spawnBurst(boss.x, boss.y, 20, "#ff8f8f");
            setTimeout(() => { if (!state.running) return; boss.orbitR = 135; }, 50);
        }

        const interval = state.phase === 1 ? 110 : 82;
        if (state.patternClock >= interval || boss.moveBias <= 0) {
            state.patternClock = 0;
            state.pattern = choosePattern(state.phase);

            if (state.pattern === 0) patternOrbit();
            else if (state.pattern === 1) patternTeleportFeint();
            else if (state.pattern === 2) patternDashFake();
            else if (state.pattern === 3) patternHomingBurst();
            else if (state.pattern === 4) patternShadowCharge();
            else if (state.pattern === 5) patternHazardWall();
            else if (state.pattern === 6) patternCloneBait();

            if (state.phase === 2 && Math.random() < 0.55) patternSmallSwarm();
        }

        const dx = (boss.targetX ?? player.x + player.w / 2) - boss.x;
        const dy = (boss.targetY ?? player.y + player.h / 2) - boss.y;
        const d = Math.hypot(dx, dy) || 1;

        if (boss.invis > 0) {
            boss.invis--;
        } else if (boss.moveBias > 0) {
            boss.x += dx / d * (state.phase === 2 ? 4.0 : 3.2);
            boss.y += dy / d * (state.phase === 2 ? 3.0 : 2.4);
            boss.moveBias--;
        } else {
            const px = player.x + player.w / 2;
            const py = player.y + player.h / 2;
            const chaseD = Math.hypot(px - boss.x, py - boss.y) || 1;
            const behind = state.phase === 2 ? 85 : 60;
            const offA = state.frame * 0.08 + Math.sin(state.frame * 0.03) * 1.4;
            const tx = px + Math.cos(offA) * behind + Math.sin(state.frame * 0.04) * 18;
            const ty = py + Math.sin(offA * 1.3) * (behind * 0.5) + Math.cos(state.frame * 0.05) * 12;
            boss.targetX = tx;
            boss.targetY = ty;

            const curve = Math.sin(state.frame * 0.11 + boss.y * 0.02) * (state.phase === 2 ? 1.25 : 0.9);
            boss.x += (tx - boss.x) / chaseD * (state.phase === 2 ? 2.5 : 1.7) + curve;
            boss.y += (ty - boss.y) / chaseD * (state.phase === 2 ? 2.0 : 1.3) - curve * 0.35;
        }

        if (state.phase === 2 && Math.random() < 0.008) {
            boss.x = clamp(rand(40, 360), 30, 370);
            boss.y = clamp(rand(80, 280), 70, 290);
            boss.flash = 5;
            spawnBurst(boss.x, boss.y, 5, "#ffffff");
        }

        boss.x = clamp(boss.x, 30, canvas.width - 30);
        boss.y = clamp(boss.y, 70, 300);

        if (boss.flash > 0) boss.flash--;
    }

    function updateProjectiles() {
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];

            if (p.kind === "homing") {
                const px = player.x + player.w / 2;
                const py = player.y + player.h / 2;
                const dx = px - p.x;
                const dy = py - p.y;
                const d = Math.hypot(dx, dy) || 1;
                p.vx += (dx / d) * p.turn;
                p.vy += (dy / d) * p.turn;
                const sp = Math.hypot(p.vx, p.vy) || 1;
                const max = state.phase === 2 ? 4.8 : 4.0;
                p.vx = (p.vx / sp) * clamp(sp, 0, max);
                p.vy = (p.vy / sp) * clamp(sp, 0, max);
            }

            p.x += p.vx;
            p.y += p.vy;
            p.life--;

            if (p.life <= 0 || p.x < -40 || p.x > canvas.width + 40 || p.y < -40 || p.y > canvas.height + 40) {
                projectiles.splice(i, 1);
                continue;
            }

            if (player.inv <= 0 && dist(player.x + player.w / 2, player.y + player.h / 2, p.x, p.y) < 14) {
                player.hp -= p.kind === "swarm" ? 4 : 6;
                player.inv = p.kind === "swarm" ? 18 : 25;
                state.shake = Math.max(state.shake, 6);
                spawnBurst(p.x, p.y, 8, "#d1d7ff");
                projectiles.splice(i, 1);
            }
        }
    }

    function updateHazards() {
        for (let i = hazards.length - 1; i >= 0; i--) {
            const h = hazards[i];
            h.life--;

            if (h.life <= 0) {
                hazards.splice(i, 1);
                continue;
            }

            if (h.kind === "dashMarker") continue;

            if (h.kind === "wall") {
                const px = player.x, py = player.y, pw = player.w, ph = player.h;
                if (px < h.x + h.w && px + pw > h.x && py < h.y + h.h && py + ph > h.y) {
                    if (player.x < h.x) player.x = h.x - player.w;
                    else player.x = h.x + h.w;
                    player.vx *= -0.15;
                }
            }
        }

        for (let i = hazards.length - 1; i >= 0; i--) {
            const h = hazards[i];
            if (h.kind !== "dashMarker") continue;
            if (h.life <= 0) continue;
            const px = player.x + player.w / 2;
            const py = player.y + player.h / 2;
            if (Math.hypot(px - h.x, py - h.y) < 46 && h.life < 18 && player.inv <= 0) {
                player.hp -= 12;
                player.inv = 20;
                state.shake = Math.max(state.shake, 10);
                spawnBurst(px, py, 14, "#ff9fa6");
            }
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const q = particles[i];
            q.x += q.vx;
            q.y += q.vy;
            q.vx *= 0.95;
            q.vy *= 0.95;
            q.life--;
            if (q.life <= 0) particles.splice(i, 1);
        }
    }

    function updateClones() {
        for (let i = clones.length - 1; i >= 0; i--) {
            const c = clones[i];
            c.life--;
            if (c.life <= 0) {
                clones.splice(i, 1);
                continue;
            }
            if (c.bait && c.life % 20 === 0) {
                const px = player.x + player.w / 2;
                const py = player.y + player.h / 2;
                const dx = px - c.x;
                const dy = py - c.y;
                const d = Math.hypot(dx, dy) || 1;
                projectiles.push({
                    x: c.x,
                    y: c.y,
                    vx: dx / d * 3.3,
                    vy: dy / d * 3.3,
                    life: 160,
                    kind: "cloneShot"
                });
            }
        }
    }

    function update() {
        if (!state.running) return;

        state.frame++;

        if (player.hp <= 0) {
            state.gameOver = true;
            showGameOverWithHeartCheck();
            return;
        }
        if (boss.hp <= 0) {
            state.victory = true;
            showVictory();
            return;
        }

        updatePlayer();
        updateBoss();
        updateProjectiles();
        updateHazards();
        updateParticles();
        updateClones();

        player.hp = clamp(player.hp, 0, player.maxHp);
        boss.hp = clamp(boss.hp, 0, boss.maxHp);

        playerText.textContent = `HP ${Math.ceil(player.hp)}`;
        bossText.textContent = `BAT LORD ${Math.ceil(boss.hp)}`;
        playerFill.style.width = `${(player.hp / player.maxHp) * 100}%`;
        bossFill.style.width = `${(boss.hp / boss.maxHp) * 100}%`;
    }

    function drawBackground() {
        ctx.fillStyle = "#07080d";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 5; i++) {
            ctx.fillStyle = "#171a21";
            ctx.fillRect(i * 90, 0, 10, 700);
        }

        ctx.fillStyle = "#10131a";
        ctx.beginPath();
        ctx.moveTo(0, 85);
        ctx.quadraticCurveTo(100, 28, 200, 84);
        ctx.quadraticCurveTo(300, 140, 400, 82);
        ctx.lineTo(400, 0);
        ctx.lineTo(0, 0);
        ctx.fill();

        ctx.fillStyle = "#1d212b";
        ctx.fillRect(0, 620, 400, 80);

        for (let i = 0; i < 4; i++) {
            const x = 50 + i * 100;
            const flicker = 1 + Math.sin(state.frame * 0.13 + i * 1.7) * 0.12;
            ctx.fillStyle = "#5a3520";
            ctx.fillRect(x - 2, 58, 4, 26);

            ctx.fillStyle = `rgba(255,179,71,${0.82 * flicker})`;
            ctx.beginPath();
            ctx.arc(x, 90, 7 + flicker, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(255,179,71,.10)";
            ctx.beginPath();
            ctx.arc(x, 90, 44 + flicker * 2, 0, Math.PI * 2);
            ctx.fill();
        }

        const crystals = [
            [26, 280, "#7fc9ff"], [352, 255, "#9f86ff"], [58, 196, "#8fd8ff"], [312, 168, "#c7b2ff"]
        ];
        crystals.forEach(([x, y, col]) => {
            ctx.fillStyle = col;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 12, y - 26);
            ctx.lineTo(x + 25, y);
            ctx.lineTo(x + 12, y + 8);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "rgba(143,216,255,.12)";
            ctx.beginPath();
            ctx.arc(x + 12, y - 2, 26, 0, Math.PI * 2);
            ctx.fill();
        });

        for (let i = 0; i < 8; i++) {
            ctx.fillStyle = "#262b34";
            ctx.beginPath();
            ctx.ellipse(24 + i * 50, 587 + Math.sin(i * 1.2) * 11, 18, 12, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        for (let i = 0; i < 7; i++) {
            const x = (state.frame * 0.18 + i * 70) % 470 - 35;
            const y = 255 + i * 52;
            ctx.fillStyle = "rgba(255,255,255,.03)";
            ctx.beginPath();
            ctx.arc(x, y, 34 + i * 2, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.fillStyle = "rgba(255,80,80,.22)";
        for (let i = 0; i < 8; i++) {
            const x = 30 + i * 50;
            const y = 120 + (i % 4) * 54;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        if (boss.hp < 120) {
            ctx.fillStyle = "rgba(115,0,0,.08)";
            ctx.fillRect(0, 0, 400, 700);
        }
    }

    function drawPlayer() {
        const blink = player.inv > 0 && Math.floor(player.inv / 3) % 2 === 0;
        if (blink) return;

        ctx.fillStyle = "rgba(0,0,0,.25)";
        ctx.beginPath();
        ctx.ellipse(player.x + 13, player.y + 37, 14, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f2d1ad";
        ctx.beginPath();
        ctx.arc(player.x + 13, player.y + 9, 9, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#704e2c";
        ctx.beginPath();
        ctx.arc(player.x + 13, player.y + 6, 10, Math.PI, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(player.x + 5, player.y + 2, 16, 5);

        ctx.fillStyle = "#4f88d8";
        ctx.fillRect(player.x + 5, player.y + 16, 16, 16);

        ctx.fillStyle = "#5d4533";
        ctx.fillRect(player.x + 6, player.y + 32, 5, 6);
        ctx.fillRect(player.x + 15, player.y + 32, 5, 6);

        if (player.atk > 0) {
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(player.x + 13, player.y + 13, 42, -0.6, 1.9);
            ctx.stroke();

            ctx.strokeStyle = "#d7fff7";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x + 13, player.y + 13, 46, -0.5, 1.8);
            ctx.stroke();
        }
    }

    function drawBoss() {
        if (boss.hp <= 0 || boss.invis > 0) return;

        ctx.fillStyle = "rgba(0,0,0,.18)";
        ctx.beginPath();
        ctx.ellipse(boss.x, boss.y + boss.r + 12, 28, 9, 0, 0, Math.PI * 2);
        ctx.fill();

        const bodyCol = boss.flash ? "#d9d9d9" : "#101015";
        const wingCol = boss.flash ? "#eeeeee" : "#17151f";
        const eyeCol = boss.hp < 120 ? "#ff4040" : "#ff2a2a";

        ctx.fillStyle = wingCol;
        ctx.beginPath();
        ctx.moveTo(boss.x, boss.y);
        ctx.quadraticCurveTo(boss.x - 54, boss.y - 30, boss.x - 70, boss.y + 10);
        ctx.quadraticCurveTo(boss.x - 42, boss.y + 3, boss.x - 24, boss.y + 18);
        ctx.quadraticCurveTo(boss.x - 10, boss.y + 7, boss.x, boss.y);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(boss.x, boss.y);
        ctx.quadraticCurveTo(boss.x + 54, boss.y - 30, boss.x + 70, boss.y + 10);
        ctx.quadraticCurveTo(boss.x + 42, boss.y + 3, boss.x + 24, boss.y + 18);
        ctx.quadraticCurveTo(boss.x + 10, boss.y + 7, boss.x, boss.y);
        ctx.fill();

        ctx.fillStyle = bodyCol;
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#6d576c";
        ctx.beginPath();
        ctx.moveTo(boss.x - 16, boss.y - 18);
        ctx.lineTo(boss.x - 10, boss.y - 34);
        ctx.lineTo(boss.x - 1, boss.y - 14);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(boss.x + 16, boss.y - 18);
        ctx.lineTo(boss.x + 10, boss.y - 34);
        ctx.lineTo(boss.x + 1, boss.y - 14);
        ctx.fill();

        ctx.fillStyle = eyeCol;
        ctx.beginPath();
        ctx.arc(boss.x - 8, boss.y - 4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(boss.x + 8, boss.y - 4, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#e6a7a7";
        ctx.beginPath();
        ctx.moveTo(boss.x - 5, boss.y + 6);
        ctx.lineTo(boss.x, boss.y + 11);
        ctx.lineTo(boss.x + 5, boss.y + 6);
        ctx.fill();

        if (boss.hp < 120) {
            ctx.fillStyle = "rgba(255,50,50,.08)";
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, 92, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawProjectiles() {
        projectiles.forEach((p) => {
            const color = p.kind === "homing" ? "#80d8ff" : p.kind === "swarm" ? "#c27dff" : p.kind === "cloneShot" ? "#ff9fd1" : "#6e55ff";
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(186,160,255,.16)";
            ctx.beginPath();
            ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawHazards() {
        hazards.forEach((h) => {
            if (h.kind === "dashMarker") {
                ctx.fillStyle = `rgba(255,90,90,${0.12 + (h.life / 32) * 0.2})`;
                ctx.beginPath();
                ctx.arc(h.x, h.y, 42, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,140,140,.9)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(h.x, h.y, 42, 0, Math.PI * 2);
                ctx.stroke();
                return;
            }
            if (h.kind === "wall") {
                ctx.fillStyle = "rgba(52,58,72,.95)";
                ctx.fillRect(h.x, h.y, h.w, h.h);
                ctx.fillStyle = "rgba(120,130,150,.15)";
                ctx.fillRect(h.x + 6, h.y + 6, h.w - 12, h.h - 12);
            }
        });
    }

    function drawClones() {
        clones.forEach((c) => {
            ctx.fillStyle = c.bait ? "rgba(85,70,115,.82)" : "rgba(220,220,230,.72)";
            ctx.beginPath();
            ctx.arc(c.x, c.y, 22, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = c.bait ? "#ff7d7d" : "#fefefe";
            ctx.beginPath();
            ctx.arc(c.x - 8, c.y - 4, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(c.x + 8, c.y - 4, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(255,255,255,.12)";
            ctx.beginPath();
            ctx.arc(c.x, c.y, 36, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawParticles() {
        particles.forEach((p) => {
            const alpha = Math.max(0, p.life / 28);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });
    }

    function drawFog() {
        ctx.fillStyle = "rgba(255,255,255,.02)";
        for (let i = 0; i < 8; i++) {
            const x = (state.frame * 0.15 + i * 60) % 480 - 40;
            const y = 200 + i * 60 + Math.sin(state.frame * 0.04 + i) * 10;
            ctx.beginPath();
            ctx.arc(x, y, 28 + i * 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawUIOverlay() {
        if (state.victory || state.gameOver) {
            ctx.fillStyle = "rgba(0,0,0,.58)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#f2f4ff";
            ctx.font = "700 42px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(state.victory ? "VICTORY" : "GAME OVER", canvas.width / 2, 330);

            ctx.font = "600 18px sans-serif";
            ctx.fillStyle = "#e7ecff";
            ctx.fillText(
                state.victory ? "지하통로의 박쥐왕을 쓰러뜨렸어요!" : "한 번 더 도전해보세요",
                canvas.width / 2,
                368
            );
            ctx.textAlign = "start";
        }
    }

    function draw() {
        let ox = 0, oy = 0;
        if (state.shake > 0) {
            ox = (Math.random() - 0.5) * state.shake;
            oy = (Math.random() - 0.5) * state.shake;
            state.shake *= 0.88;
            if (state.shake < 0.25) state.shake = 0;
        }

        ctx.setTransform(1, 0, 0, 1, ox, oy);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBackground();
        drawFog();
        drawParticles();
        drawHazards();
        drawProjectiles();
        drawClones();
        drawBoss();
        drawPlayer();
        drawUIOverlay();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") keys.left = true;
        if (e.key === "ArrowRight") keys.right = true;
        if (e.key === "ArrowUp") keys.up = true;
        if (e.key === "ArrowDown") keys.down = true;
        if (e.key === "z" || e.key === "Z") document.getElementById("atk").dispatchEvent(new Event("pointerdown"));
        if (e.key === "x" || e.key === "X") document.getElementById("dash").dispatchEvent(new Event("pointerdown"));
    });

    window.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft") keys.left = false;
        if (e.key === "ArrowRight") keys.right = false;
        if (e.key === "ArrowUp") keys.up = false;
        if (e.key === "ArrowDown") keys.down = false;
    });

    loop();
})();
</script>
</body>
</html>
