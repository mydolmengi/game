<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물약 제조대</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    overflow:hidden;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

/* =========================
   물약 버튼 (항상 표시)
========================= */
.make-btn{
    position:absolute;
    left:50%;
    top:8%;
    transform:translateX(-50%);
    z-index:10;

    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:14px 30px;
    font-size:20px;
    color:#5b3719;
    cursor:pointer;
}

/* =========================
   선반 물약 (배경 클릭 방식)
========================= */
.bottle{
    position:absolute;
    width:70px;
    height:90px;
    border-radius:15px;
    cursor:pointer;
    transition:0.2s;
}

.bottle:hover{
    transform:scale(1.1);
}

.b1{ left:18%; top:18%; background:red; }
.b2{ left:28%; top:18%; background:orange; }
.b3{ left:38%; top:18%; background:yellow; }
.b4{ left:48%; top:18%; background:green; }
.b5{ left:58%; top:18%; background:blue; }
.b6{ left:68%; top:18%; background:purple; }
.b7{ left:78%; top:18%; background:white; }

/* 선택 효과 */
.selected{
    outline:4px solid gold;
    transform:scale(1.2);
}

/* =========================
   효과 레이어 (대폭 강화)
========================= */
.effect-layer{
    position:absolute;
    inset:0;
    pointer-events:none;
}

/* 버블 */
.bubble{
    position:absolute;
    bottom:30%;
    left:50%;
    border-radius:50%;
    background:rgba(180,255,255,0.85);
    animation:bubble 2.2s ease-out forwards;
}

@keyframes bubble{
    0%{ transform:translate(-50%,0) scale(0.6); opacity:0.2; }
    40%{ opacity:1; }
    100%{ transform:translate(-50%,-320px) scale(3.5); opacity:0; }
}

/* 연기 */
.smoke{
    position:absolute;
    bottom:30%;
    left:50%;
    border-radius:50%;
    background:rgba(20,20,20,0.9);
    animation:smoke 2.4s ease-out forwards;
}

@keyframes smoke{
    0%{ transform:translate(-50%,0) scale(0.6); opacity:0.3; }
    50%{ opacity:1; }
    100%{ transform:translate(-50%,-260px) scale(4.5); opacity:0; }
}

/* =========================
   버튼
========================= */
.back-btn{
    position:absolute;
    left:50%;
    bottom:3%;
    transform:translateX(-50%);

    background:#6b5bff;
    border:6px solid #3b2fff;
    border-radius:30px;
    padding:12px 30px;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
    z-index:999;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/potion_workbench.png" class="bg">

    <!-- 항상 표시 -->
    <button class="make-btn" onclick="startGame()">
        물약 만들기
    </button>

    <!-- 물약 -->
    <div class="bottle b1" onclick="pick(1)"></div>
    <div class="bottle b2" onclick="pick(2)"></div>
    <div class="bottle b3" onclick="pick(3)"></div>
    <div class="bottle b4" onclick="pick(4)"></div>
    <div class="bottle b5" onclick="pick(5)"></div>
    <div class="bottle b6" onclick="pick(6)"></div>
    <div class="bottle b7" onclick="pick(7)"></div>

    <div class="effect-layer" id="fx"></div>

    <button class="back-btn" onclick="location.href='cave_mage.html'">
        돌아가기
    </button>

</div>

<button class="inventory-btn" onclick="location.href='inventory.html'">🎒</button>

<script>
let selected = [];

function startGame(){
    selected = [];
    document.querySelectorAll(".bottle").forEach(b=>{
        b.classList.remove("selected");
    });
    alert("물약 2개를 선택해라!");
}

function pick(n){

    if(selected.includes(n)){
        selected = selected.filter(x=>x!==n);
    }else{
        if(selected.length >= 2) return;
        selected.push(n);
    }

    document.querySelectorAll(".bottle").forEach((b,i)=>{
        b.classList.toggle("selected", selected.includes(i+1));
    });

    if(selected.length === 2){
        brew();
    }
}

/* =========================
   효과 강화
========================= */
function bubbleEffect(){
    const fx = document.getElementById("fx");
    fx.innerHTML = "";

    for(let i=0;i<25;i++){
        const b = document.createElement("div");
        b.className = "bubble";
        b.style.width = (10 + Math.random()*30)+"px";
        b.style.height = b.style.width;
        b.style.left = (50 + (Math.random()*120-60))+"%";
        b.style.bottom = "30%";
        fx.appendChild(b);
    }
}

function smokeEffect(){
    const fx = document.getElementById("fx");
    fx.innerHTML = "";

    for(let i=0;i<25;i++){
        const s = document.createElement("div");
        s.className = "smoke";
        s.style.width = (15 + Math.random()*40)+"px";
        s.style.height = s.style.width;
        s.style.left = (50 + (Math.random()*120-60))+"%";
        fx.appendChild(s);
    }
}

/* =========================
   조합
========================= */
function brew(){

    const pair = selected.sort().join(",");
    const success = (pair === "1,7");

    selected = [];

    if(success){
        bubbleEffect();

        setTimeout(()=>{
            alert("성공! 벌레 퇴치제 획득!");
            location.href = "cave_mage.html";
        }, 2200);

    }else{
        smokeEffect();

        setTimeout(()=>{
            alert("실패!");
        }, 2200);
    }
}
</script>

</body>
</html>
