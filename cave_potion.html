<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RPG MAP EDITOR FINAL PRO</title>

<style>
body{
margin:0;
background:#111;
display:flex;
justify-content:center;
font-family:sans-serif;
}

/* ======================
MAP
====================== */
.wrapper{
position:relative;
width:900px;
margin-top:20px;
}

.wrapper img{
width:100%;
display:block;
}

/* ======================
BOX (PX 안정 버전)
====================== */
.box{
position:absolute;

width:120px;
height:120px;

background:rgba(255,0,0,0.25);
border:2px dashed red;

cursor:grab;

resize: both;
overflow: hidden;

min-width:30px;
min-height:30px;

transform-origin:center;

will-change: left, top, width, height, transform;
}

/* ======================
🔄 ROTATE ICON (BIG FIX)
====================== */
.rotate-icon{
position:absolute;

top:-30px;
left:50%;
transform:translateX(-50%);

width:36px;
height:36px;

background:white;
border:2px solid #333;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
cursor:grab;

box-shadow:0 2px 8px rgba(0,0,0,0.4);
user-select:none;
}

.rotate-icon::after{
content:"🔄";
}

/* ======================
PANEL
====================== */
#panel{
position:fixed;
top:20px;
left:20px;

width:520px;
background:white;
padding:18px;
border-radius:12px;
z-index:999;
}

textarea{
width:100%;
height:240px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- ======================
PANEL
====================== -->
<div id="panel">
<b>🎮 RPG MAP EDITOR FINAL PRO</b>

<textarea id="output"></textarea>

<button onclick="addBox()">➕ 오브젝트 추가</button>
<button onclick="copyCode()">📋 복사</button>
</div>

<!-- ======================
MAP
====================== -->
<div class="wrapper" id="map">
<img src="images/potion_workbench.png">
</div>

<script>

let activeBox = null;
let activeRotateBox = null;

let offsetX = 0;
let offsetY = 0;

/* ======================
CREATE
====================== */
function addBox(){

const box = document.createElement("div");
box.className = "box";

box.style.left = "100px";
box.style.top = "100px";

box.dataset.name = prompt("이름 입력") || "object";
box.dataset.rotate = 0;

const icon = document.createElement("div");
icon.className = "rotate-icon";

box.appendChild(icon);
document.getElementById("map").appendChild(box);

enableDrag(box);
enableRotate(icon, box);
}

/* ======================
DRAG (PX FIX)
====================== */
function enableDrag(box){

box.addEventListener("mousedown",(e)=>{

if(e.target.classList.contains("rotate-icon")) return;

activeBox = box;

const rect = box.getBoundingClientRect();

offsetX = e.clientX - rect.left;
offsetY = e.clientY - rect.top;
});
}

/* ======================
ROTATE (STABLE FIX)
====================== */
let startAngle = 0;
let startRotate = 0;

function enableRotate(icon, box){

icon.addEventListener("mousedown",(e)=>{

activeRotateBox = box;

const r = box.getBoundingClientRect();

const cx = r.left + r.width / 2;
const cy = r.top + r.height / 2;

startAngle =
Math.atan2(e.clientY - cy, e.clientX - cx);

startRotate =
parseFloat(box.dataset.rotate || 0);

e.stopPropagation();
});
}

/* ======================
MOVE + ROTATE
====================== */
document.addEventListener("mousemove",(e)=>{

const map = document.getElementById("map");
const rect = map.getBoundingClientRect();

/* DRAG */
if(activeBox){

let x = e.clientX - rect.left - offsetX;
let y = e.clientY - rect.top - offsetY;

activeBox.style.left = x + "px";
activeBox.style.top = y + "px";

updateOutput();
}

/* ROTATE */
if(activeRotateBox){

const r = activeRotateBox.getBoundingClientRect();

const cx = r.left + r.width / 2;
const cy = r.top + r.height / 2;

const currentAngle =
Math.atan2(e.clientY - cy, e.clientX - cx);

let delta = currentAngle - startAngle;

let finalAngle =
startRotate + delta * (180 / Math.PI);

activeRotateBox.style.transform =
`rotate(${finalAngle}deg)`;

activeRotateBox.dataset.rotate = finalAngle;

updateOutput();
}
});

document.addEventListener("mouseup",()=>{

activeBox = null;
activeRotateBox = null;
});

/* ======================
OUTPUT
====================== */
function updateOutput(){

const boxes = document.querySelectorAll(".box");
const map = document.getElementById("map").getBoundingClientRect();

let result = "";

boxes.forEach((b)=>{

const rect = b.getBoundingClientRect();

let x = rect.left - map.left;
let y = rect.top - map.top;
let w = rect.width;
let h = rect.height;

let rot = b.dataset.rotate || 0;
let name = b.dataset.name;

result += `/* ${name} */\n`;
result += `.${name}{
left:${x}px;
top:${y}px;
width:${w}px;
height:${h}px;
transform:rotate(${rot}deg);
}\n\n`;
});

document.getElementById("output").value = result;
}

/* ======================
COPY
====================== */
function copyCode(){

const t = document.getElementById("output");
t.select();
document.execCommand("copy");

alert("복사 완료!");
}

</script>

</body>
</html>
