<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물약 제조대</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    overflow:hidden;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

/* =========================
   물약 만들기 버튼
========================= */
.make-btn{
    position:absolute;
    left:316.8984375px;
    top:1093.921875px;
    width:276px;
    height:33px;
    z-index:10;

    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    font-family:'GmarketSans', sans-serif;
}

/* =========================
   물약 클릭 영역
========================= */
.bottle{
    position:absolute;
    width:63.984375px;
    height:51px;
    cursor:pointer;
    transition:0.2s;
    z-index:8;
    background:rgba(255,255,255,0);
}

.bottle:hover{
    transform:scale(1.05);
}

/* 좌표 적용 */
.b1{ left:138.9609375px; top:552.984375px; }
.b2{ left:237.9609375px; top:543.984375px; }
.b3{ left:333.9609375px; top:549.984375px; }
.b4{ left:427.9453125px; top:547.96875px; }
.b5{ left:525.9375px; top:550.96875px; }
.b6{ left:621.9375px; top:552.9609375px; }
.b7{ left:717.9375px; top:552.9609375px; }

/* 선택 표시 */
.bottle.selected{
    outline:4px solid gold;
    border-radius:12px;
}

/* 별 표시 */
.bottle.selected::before{
    content:"⭐";
    position:absolute;
    left:50%;
    top:-34px;
    transform:translateX(-50%);
    font-size:32px;
    line-height:1;
    z-index:12;
    animation:starPulse 0.7s infinite alternate ease-in-out;
    text-shadow:0 0 10px rgba(255,215,0,0.9);
}

@keyframes starPulse{
    from{
        transform:translateX(-50%) scale(1);
    }
    to{
        transform:translateX(-50%) scale(1.22);
    }
}

/* =========================
   효과 레이어
========================= */
.effect-layer{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:15;
    overflow:hidden;
}

/* 버블 */
.bubble{
    position:absolute;
    bottom:27%;
    left:50%;
    border-radius:50%;
    background:rgba(180,245,255,0.88);
    box-shadow:0 0 16px rgba(180,245,255,0.6);
    animation:bubble 4.2s ease-out forwards;
}

@keyframes bubble{
    0%{
        transform:translate(-50%,0) scale(0.5);
        opacity:0.15;
    }
    25%{
        opacity:1;
    }
    100%{
        transform:translate(-50%,-540px) scale(4.6);
        opacity:0;
    }
}

.bubble.small{ width:18px; height:18px; }
.bubble.mid{ width:30px; height:30px; }
.bubble.big{ width:46px; height:46px; }

/* 연기 */
.smoke{
    position:absolute;
    bottom:27%;
    left:50%;
    border-radius:50%;
    background:rgba(20,20,20,0.92);
    box-shadow:0 0 24px rgba(0,0,0,0.55);
    filter:blur(1px);
    animation:smoke 4.6s ease-out forwards;
}

@keyframes smoke{
    0%{
        transform:translate(-50%,0) scale(0.5);
        opacity:0.2;
    }
    30%{
        opacity:0.95;
    }
    100%{
        transform:translate(-50%,-460px) scale(5.2);
        opacity:0;
    }
}

.smoke.small{ width:26px; height:26px; }
.smoke.mid{ width:40px; height:40px; }
.smoke.big{ width:58px; height:58px; }

/* =========================
   버튼
========================= */
.back-btn{
    position:absolute;
    left:50%;
    bottom:3%;
    transform:translateX(-50%);
    z-index:20;

    background:#6b5bff;
    border:6px solid #3b2fff;
    border-radius:30px;
    padding:12px 30px;
    color:white;
    cursor:pointer;
    font-size:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    font-family:'GmarketSans', sans-serif;
}

.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
    z-index:999;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/potion_workbench.png" class="bg" alt="물약 제조대">

    <!-- 항상 표시 -->
    <button class="make-btn" onclick="startGame()">
        물약 만들기
    </button>

    <!-- 물약 클릭 영역 -->
    <div class="bottle b1" onclick="pick(1, this)"></div>
    <div class="bottle b2" onclick="pick(2, this)"></div>
    <div class="bottle b3" onclick="pick(3, this)"></div>
    <div class="bottle b4" onclick="pick(4, this)"></div>
    <div class="bottle b5" onclick="pick(5, this)"></div>
    <div class="bottle b6" onclick="pick(6, this)"></div>
    <div class="bottle b7" onclick="pick(7, this)"></div>

    <div class="effect-layer" id="fx"></div>

    <button class="back-btn" onclick="location.href='cave_mage.html'">
        돌아가기
    </button>

</div>

<button class="inventory-btn" onclick="location.href='inventory.html'">🎒</button>

<script>
let selected = [];
let brewing = false;

function startGame(){
    selected = [];
    document.querySelectorAll(".bottle").forEach(b => b.classList.remove("selected"));
    document.getElementById("fx").innerHTML = "";
    alert("물약 2개를 선택해라!");
}

function pick(n, el){
    if(brewing) return;

    const idx = selected.indexOf(n);

    if(idx >= 0){
        selected.splice(idx, 1);
        el.classList.remove("selected");
    }else{
        if(selected.length >= 2) return;
        selected.push(n);
        el.classList.add("selected");
    }

    if(selected.length === 2){
        brew();
    }
}

/* =========================
   효과 강화
========================= */
function bubbleEffect(){
    const fx = document.getElementById("fx");
    fx.innerHTML = "";

    for(let i = 0; i < 36; i++){
        const b = document.createElement("div");
        const sizeClass = i % 3 === 0 ? "big" : (i % 2 === 0 ? "mid" : "small");
        b.className = `bubble ${sizeClass}`;
        b.style.left = `calc(50% + ${Math.random() * 240 - 120}px)`;
        b.style.bottom = `calc(28% + ${Math.random() * 80 - 40}px)`;
        b.style.animationDelay = `${Math.random() * 0.6}s`;
        fx.appendChild(b);
    }
}

function smokeEffect(){
    const fx = document.getElementById("fx");
    fx.innerHTML = "";

    for(let i = 0; i < 30; i++){
        const s = document.createElement("div");
        const sizeClass = i % 3 === 0 ? "big" : (i % 2 === 0 ? "mid" : "small");
        s.className = `smoke ${sizeClass}`;
        s.style.left = `calc(50% + ${Math.random() * 220 - 110}px)`;
        s.style.bottom = `calc(28% + ${Math.random() * 70 - 35}px)`;
        s.style.animationDelay = `${Math.random() * 0.5}s`;
        fx.appendChild(s);
    }
}

/* =========================
   조합
========================= */
function brew(){
    brewing = true;

    const pair = [...selected].sort((a, b) => a - b).join(",");
    const success = (pair === "1,7");

    selected = [];
    document.querySelectorAll(".bottle").forEach(b => b.classList.remove("selected"));

    if(success){
        bubbleEffect();

        setTimeout(() => {
            alert("성공! 벌레 퇴치제 획득!");
            location.href = "cave_mage.html";
        }, 4400);

    }else{
        smokeEffect();

        setTimeout(() => {
            alert("실패!");
            brewing = false;
        }, 4600);
    }
}
</script>

</body>
</html>
