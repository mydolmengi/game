<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>애기미를 구해라!</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#ffd6e7;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;
}

.cover-container{

    position:relative;

    width:100%;

    max-width:700px;
}

.cover{

    width:100%;

    display:block;

    border-radius:20px;
}

.start-btn{

    position:absolute;

    bottom:80px;

    left:50%;

    transform:translateX(-50%);

    background:linear-gradient(
        180deg,
        #ff9fd2,
        #ff6fb5
    );

    color:white;

    border:4px solid white;

    border-radius:999px;

    padding:10px 30px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:
    0 0 25px rgba(255,105,180,0.8);

    transition:0.2s;
}

.start-btn:hover{

    transform:
    translateX(-50%)
    scale(1.05);
}

.start-btn:active{

    transform:
    translateX(-50%)
    scale(0.95);
}

</style>
</head>
<body>

<div class="cover-container">

    <img
    src="images/cover.png"
    class="cover"
    alt="애기미를 구해라!">

    <button
    class="start-btn"
    onclick="location.href='story.html'">

    💖 시작하기

    </button>

</div>

</body>
</html>
