<body>

‚Äč

<!-- ======================

   PANEL

====================== -->

<div id="panel">

<b>ūüéģ RPG MAP EDITOR FINAL PRO</b>

‚Äč

<textarea id="output"></textarea>

‚Äč

<button onclick="addBox()">‚ěē žė§ŽłĆž†ĚŪäł ž∂ĒÍįÄ</button>

<button onclick="copyCode()">ūüďč Ž≥Ķžā¨</button>

</div>

‚Äč

<!-- ======================

   MAP

====================== -->

<div class="wrapper" id="map">

    <img src="images/cave_mage_bg.png">

</div>

‚Äč

<script>

‚Äč

let activeBox = null;

let activeRotateBox = null;

‚Äč

let offsetX = 0;

let offsetY = 0;

‚Äč

/* ======================

   CREATE

====================== */

function addBox(){

‚Äč

    const box = document.createElement("div");

    box.className = "box";

‚Äč

    box.style.left = "100px";

    box.style.top = "100px";

‚Äč

    box.dataset.name = prompt("žĚīŽ¶Ą žěÖŽ†•") || "object";

    box.dataset.rotate = 0;

‚Äč

    const icon = document.createElement("div");

    icon.className = "rotate-icon";

‚Äč

    box.appendChild(icon);

    document.getElementById("map").appendChild(box);

‚Äč

    enableDrag(box);

    enableRotate(icon, box);

}

‚Äč

/* ======================

   DRAG (PX FIX)

====================== */

function enableDrag(box){

‚Äč

    box.addEventListener("mousedown",(e)=>{

‚Äč

        if(e.target.classList.contains("rotate-icon")) return;

‚Äč

        activeBox = box;

‚Äč

        const rect = box.getBoundingClientRect();

‚Äč

        offsetX = e.clientX - rect.left;

        offsetY = e.clientY - rect.top;

    });

}

‚Äč

/* ======================

   ROTATE (STABLE FIX)

====================== */

let startAngle = 0;

let startRotate = 0;

‚Äč

function enableRotate(icon, box){

‚Äč

    icon.addEventListener("mousedown",(e)=>{

‚Äč

        activeRotateBox = box;

‚Äč

        const r = box.getBoundingClientRect();

‚Äč

        const cx = r.left + r.width / 2;

        const cy = r.top + r.height / 2;

‚Äč

        startAngle =

        Math.atan2(e.clientY - cy, e.clientX - cx);

‚Äč

        startRotate =

        parseFloat(box.dataset.rotate || 0);

‚Äč

        e.stopPropagation();

    });

}

‚Äč

/* ======================

   MOVE + ROTATE

====================== */

document.addEventListener("mousemove",(e)=>{

‚Äč

    const map = document.getElementById("map");

    const rect = map.getBoundingClientRect();

‚Äč

    /* DRAG */

    if(activeBox){

‚Äč

        let x = e.clientX - rect.left - offsetX;

        let y = e.clientY - rect.top - offsetY;

‚Äč

        activeBox.style.left = x + "px";

        activeBox.style.top = y + "px";

‚Äč

        updateOutput();

    }

‚Äč

    /* ROTATE */

    if(activeRotateBox){

‚Äč

        const r = activeRotateBox.getBoundingClientRect();

‚Äč

        const cx = r.left + r.width / 2;

        const cy = r.top + r.height / 2;

‚Äč

        const currentAngle =

        Math.atan2(e.clientY - cy, e.clientX - cx);

‚Äč

        let delta = currentAngle - startAngle;

‚Äč

        let finalAngle =

        startRotate + delta * (180 / Math.PI);

‚Äč

        activeRotateBox.style.transform =

        `rotate(${finalAngle}deg)`;

‚Äč

        activeRotateBox.dataset.rotate = finalAngle;

‚Äč

        updateOutput();

    }

});

‚Äč

document.addEventListener("mouseup",()=>{

‚Äč

    activeBox = null;

    activeRotateBox = null;

});

‚Äč

/* ======================

   OUTPUT

====================== */

function updateOutput(){

‚Äč

    const boxes = document.querySelectorAll(".box");

    const map = document.getElementById("map").getBoundingClientRect();

‚Äč

    let result = "";

‚Äč

    boxes.forEach((b)=>{

‚Äč

        const rect = b.getBoundingClientRect();

‚Äč

        let x = rect.left - map.left;

        let y = rect.top - map.top;

        let w = rect.width;

        let h = rect.height;

‚Äč

        let rot = b.dataset.rotate || 0;

        let name = b.dataset.name;

‚Äč

        result += `/* ${name} */\n`;

        result += `.${name}{

  left:${x}px;

  top:${y}px;

  width:${w}px;

  height:${h}px;

  transform:rotate(${rot}deg);

}\n\n`;

    });

‚Äč

    document.getElementById("output").value = result;

}

‚Äč

/* ======================

   COPY

====================== */

function copyCode(){

‚Äč

    const t = document.getElementById("output");

    t.select();

    document.execCommand("copy");

‚Äč

    alert("Ž≥Ķžā¨ žôĄŽ£Ć!");

}

‚Äč

</script>
