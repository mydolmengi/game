<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>애기미를 구해라!</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffd6e7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'GmarketSans', sans-serif;
}

.cover-container{
    position:relative;
    width:100%;
    max-width:700px;
}

.cover{
    width:100%;
    display:block;
    border-radius:20px;
}

.start-btn{
    position:absolute;
    bottom:105px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(180deg, #ff9fd2, #ff6fb5);
    color:white;
    border:4px solid white;
    border-radius:999px;
    padding:12px 35px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,105,180,0.8);
    transition:0.2s;
}

.start-btn:hover{
    transform:translateX(-50%) scale(1.05);
}

.start-btn:active{
    transform:translateX(-50%) scale(0.95);
}

@media (max-width: 600px){
    .title{
        font-size:30px;
    }

    .story{
        font-size:18px;
        line-height:1.8;
    }

    .story-box{
        padding:25px 20px;
    }

    .start-btn{
        padding:12px 30px;
        font-size:18px;
    }
}
</style>
</head>
<body>

<div class="cover-container">
    <img src="images/cover.png" class="cover" alt="애기미를 구해라!">

    <button class="start-btn" onclick="location.href='story.html'">
        💖 시작하기
    </button>
</div>

<script>
let bgClickCount = 0;
let bgClickTimer = null;

document.body.addEventListener("click", function (e) {
    // 버튼이나 이미지가 아닌 "빈 배경"만 카운트
    if (e.target !== document.body) return;

    bgClickCount++;

    if (bgClickCount === 1) {
        bgClickTimer = setTimeout(() => {
            bgClickCount = 0;
            bgClickTimer = null;
        }, 1500);
    }

    if (bgClickCount >= 7) {
        clearTimeout(bgClickTimer);
        bgClickCount = 0;
        bgClickTimer = null;
        localStorage.clear();
        alert("게임 진행 상태를 초기화했어!");
    }
});
</script>

</body>
</html>
