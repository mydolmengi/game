<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>애기미를 구해라!</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffd6e7;
    text-align:center;
    font-family:'Malgun Gothic', sans-serif;
}

.cover{

    width:100%;
    max-width:1080px;

    display:block;

    margin:auto;
}

.start-btn{

    background:linear-gradient(
        180deg,
        #ff9fd2,
        #ff6fb5
    );

    color:white;

    border:5px solid white;

    border-radius:999px;

    padding:20px 80px;

    font-size:32px;

    font-weight:bold;

    cursor:pointer;

    margin-top:20px;
    margin-bottom:30px;

    box-shadow:
    0 0 20px rgba(255,105,180,0.7);

    transition:0.2s;
}

.start-btn:hover{

    transform:scale(1.05);
}

.start-btn:active{

    transform:scale(0.97);
}

</style>
</head>
<body>

<img
src="images/cover.png"
class="cover"
alt="애기미를 구해라!"
>

<button
class="start-btn"
onclick="location.href='story.html'"
>
💖 시작하기
</button>

</body>
</html>
