<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RPG MAP EDITOR PRO</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#111;font-family:sans-serif;display:flex;justify-content:center}
#panel{position:fixed;left:20px;top:20px;width:520px;background:#fff;padding:15px;border-radius:12px;z-index:9999}
textarea{width:100%;height:220px}
button{width:100%;margin-top:6px;padding:10px}
.wrapper{position:relative;width:900px;margin-top:20px}
.wrapper img{width:100%;display:block;pointer-events:none;user-select:none}
.box{position:absolute;width:120px;height:120px;background:rgba(255,0,0,.25);border:2px dashed red;resize:both;overflow:hidden;cursor:move;transform-origin:center}
.box.selected{border-color:#00e5ff}
.rotate{position:absolute;left:50%;top:-30px;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;background:#fff;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:grab}
.rotate:after{content:"⟳"}
</style>
</head>
<body>
<div id="panel">
<b>RPG MAP EDITOR PRO</b>
<textarea id="out"></textarea>
<button onclick="addBox()">➕ 오브젝트 추가</button>
<button onclick="copyCss()">📋 복사</button>
</div>

<div class="wrapper" id="map">
<img src="images/cave_mage_bg.png">
</div>

<script>
const map=document.getElementById("map");
const out=document.getElementById("out");

let drag=null,rot=null,ox=0,oy=0,startA=0,startR=0;
let selected=null;
let clipboard=null;

function addBox(copy){
 let b=document.createElement("div");
 b.className="box";
 b.style.left=(copy?.left||100)+"px";
 b.style.top=(copy?.top||100)+"px";
 b.style.width=(copy?.w||120)+"px";
 b.style.height=(copy?.h||120)+"px";
 b.dataset.rotate=copy?.r||0;
 b.style.transform=`rotate(${b.dataset.rotate}deg)`;
 b.dataset.name=copy?.name||prompt("이름")||"object";
 let r=document.createElement("div");
 r.className="rotate";
 b.appendChild(r);
 map.appendChild(b);
 select(b);

 new ResizeObserver(update).observe(b);

 b.onmousedown=e=>{
   if(e.target===r)return;
   e.preventDefault();
   select(b);
   drag=b;
   let rc=b.getBoundingClientRect();
   ox=e.clientX-rc.left;
   oy=e.clientY-rc.top;
 };

 r.onmousedown=e=>{
   e.preventDefault();e.stopPropagation();
   select(b);
   rot=b;
   let rc=b.getBoundingClientRect();
   let cx=rc.left+rc.width/2;
   let cy=rc.top+rc.height/2;
   startA=Math.atan2(e.clientY-cy,e.clientX-cx);
   startR=parseFloat(b.dataset.rotate);
 };
 update();
}

function select(b){
 document.querySelectorAll(".box").forEach(x=>x.classList.remove("selected"));
 selected=b;
 if(b)b.classList.add("selected");
}

document.onmousemove=e=>{
 let rc=map.getBoundingClientRect();
 if(drag){
  drag.style.left=(e.clientX-rc.left-ox)+"px";
  drag.style.top=(e.clientY-rc.top-oy)+"px";
  update();
 }
 if(rot){
  let r=rot.getBoundingClientRect();
  let cx=r.left+r.width/2;
  let cy=r.top+r.height/2;
  let ang=Math.atan2(e.clientY-cy,e.clientX-cx);
  let deg=startR+(ang-startA)*180/Math.PI;
  rot.dataset.rotate=deg;
  rot.style.transform=`rotate(${deg}deg)`;
  update();
 }
};
document.onmouseup=()=>{drag=null;rot=null;}

function pct(v,t){return (v/t*100).toFixed(2)}

function update(){
 let mw=map.clientWidth,mh=map.clientHeight,s="";
 document.querySelectorAll(".box").forEach(b=>{
  s+=`/* ${b.dataset.name} */\n.${b.dataset.name}{\n`;
  s+=` left:${pct(parseFloat(b.style.left),mw)}%;\n`;
  s+=` top:${pct(parseFloat(b.style.top),mh)}%;\n`;
  s+=` width:${pct(b.offsetWidth,mw)}%;\n`;
  s+=` height:${pct(b.offsetHeight,mh)}%;\n`;
  s+=` transform:rotate(${parseFloat(b.dataset.rotate).toFixed(2)}deg);\n}\n\n`;
 });
 out.value=s;
}

async function copyCss(){
 try{await navigator.clipboard.writeText(out.value);}
 catch{out.select();document.execCommand("copy");}
 alert("복사 완료");
}

document.onkeydown=e=>{
 if(!selected)return;
 if(e.key==="Delete"){
   selected.remove();selected=null;update();
 }
 if(e.ctrlKey&&e.key.toLowerCase()==="c"){
   clipboard={
    left:parseFloat(selected.style.left),
    top:parseFloat(selected.style.top),
    w:selected.offsetWidth,
    h:selected.offsetHeight,
    r:parseFloat(selected.dataset.rotate),
    name:selected.dataset.name+"_copy"
   };
   e.preventDefault();
 }
 if(e.ctrlKey&&e.key.toLowerCase()==="v"&&clipboard){
   let c={...clipboard,left:clipboard.left+20,top:clipboard.top+20};
   addBox(c);
   e.preventDefault();
 }
 if(e.key==="]"){selected.style.zIndex=(+selected.style.zIndex||1)+1;}
 if(e.key==="["){selected.style.zIndex=(+selected.style.zIndex||1)-1;}
};

window.onresize=update;
</script>
</body>
</html>
