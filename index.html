<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPG MAP EDITOR FINAL PRO - Percent</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      color: #222;
      display: flex;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 520px;
      background: #fff;
      padding: 18px;
      border-radius: 12px;
      z-index: 9999;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .panel b {
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 240px;
      margin-top: 10px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font-size: 14px;
    }

    button:hover { background: #000; }

    .wrapper {
      position: relative;
      width: min(900px, 100vw);
      margin-top: 20px;
      user-select: none;
    }

    .wrapper img {
      width: 100%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .box {
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(255, 0, 0, 0.25);
      border: 2px dashed red;
      cursor: grab;
      resize: both;
      overflow: hidden;
      min-width: 30px;
      min-height: 30px;
      transform-origin: center center;
      z-index: 10;
      touch-action: none;
    }

    .box:active { cursor: grabbing; }

    .rotate-icon {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 36px;
      background: white;
      border: 2px solid #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: grab;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      user-select: none;
      touch-action: none;
    }

    .rotate-icon::after { content: "⟲"; }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="panel">
    <b>🎮 RPG MAP EDITOR FINAL PRO</b>
    <textarea id="output" placeholder="여기에 오브젝트 CSS가 출력됩니다."></textarea>
    <button id="addBtn">➕ 오브젝트 추가</button>
    <button id="copyBtn">📋 복사</button>
    <div class="hint">
      배경 이미지: <code>images/cave_mage_bg.png</code><br>
      출력값은 <b>퍼센트(%)</b> 기준입니다.
    </div>
  </div>

  <div class="wrapper" id="map">
    <img src="images/cave_mage_bg.png" alt="map background" />
  </div>

  <script>
    let activeBox = null;
    let activeRotateBox = null;
    let offsetX = 0;
    let offsetY = 0;
    let startAngle = 0;
    let startRotate = 0;

    const map = document.getElementById("map");
    const output = document.getElementById("output");

    document.getElementById("addBtn").addEventListener("click", addBox);
    document.getElementById("copyBtn").addEventListener("click", copyCode);

    function addBox() {
      const box = document.createElement("div");
      box.className = "box";
      box.style.left = "100px";
      box.style.top = "100px";
      box.dataset.name = prompt("이름 입력") || "object";
      box.dataset.rotate = "0";

      const icon = document.createElement("div");
      icon.className = "rotate-icon";

      box.appendChild(icon);
      map.appendChild(box);

      enableDrag(box);
      enableRotate(icon, box);
      updateOutput();
    }

    function enableDrag(box) {
      box.addEventListener("mousedown", (e) => {
        if (e.target.classList.contains("rotate-icon")) return;
        e.preventDefault();

        activeBox = box;
        const rect = box.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        box.style.zIndex = 9999;
      });
    }

    function enableRotate(icon, box) {
      icon.addEventListener("mousedown", (e) => {
        e.preventDefault();
        e.stopPropagation();

        activeRotateBox = box;

        const r = box.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;

        startAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
        startRotate = parseFloat(box.dataset.rotate || "0");
        box.style.zIndex = 9999;
      });
    }

    document.addEventListener("mousemove", (e) => {
      const rect = map.getBoundingClientRect();

      if (activeBox) {
        let x = e.clientX - rect.left - offsetX;
        let y = e.clientY - rect.top - offsetY;

        activeBox.style.left = x + "px";
        activeBox.style.top = y + "px";
        updateOutput();
      }

      if (activeRotateBox) {
        const r = activeRotateBox.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;

        const currentAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
        const delta = currentAngle - startAngle;
        const finalAngle = startRotate + delta * (180 / Math.PI);

        activeRotateBox.style.transform = `rotate(${finalAngle}deg)`;
        activeRotateBox.dataset.rotate = String(finalAngle);
        updateOutput();
      }
    });

    document.addEventListener("mouseup", () => {
      activeBox = null;
      activeRotateBox = null;
    });

    function toPercentX(px, mapWidth) {
      return (px / mapWidth) * 100;
    }

    function toPercentY(px, mapHeight) {
      return (px / mapHeight) * 100;
    }

    function updateOutput() {
      const boxes = document.querySelectorAll(".box");
      const mapRect = map.getBoundingClientRect();

      let result = "";

      boxes.forEach((b) => {
        const rect = b.getBoundingClientRect();
        const xPx = rect.left - mapRect.left;
        const yPx = rect.top - mapRect.top;
        const wPx = rect.width;
        const hPx = rect.height;
        const rot = b.dataset.rotate || "0";
        const name = b.dataset.name || "object";

        const x = toPercentX(xPx, mapRect.width).toFixed(4);
        const y = toPercentY(yPx, mapRect.height).toFixed(4);
        const w = toPercentX(wPx, mapRect.width).toFixed(4);
        const h = toPercentY(hPx, mapRect.height).toFixed(4);

        result += `/* ${name} */\n`;
        result += `.${name}{\n`;
        result += `  left:${x}%;\n`;
        result += `  top:${y}%;\n`;
        result += `  width:${w}%;\n`;
        result += `  height:${h}%;\n`;
        result += `  transform:rotate(${rot}deg);\n`;
        result += `}\n\n`;
      });

      output.value = result;
    }

    function copyCode() {
      output.select();
      document.execCommand("copy");
      alert("복사 완료!");
    }

    window.addEventListener("resize", updateOutput);
    updateOutput();
  </script>
</body>
</html>
