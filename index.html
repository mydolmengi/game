<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개구리 연구소 탈출</title>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>🐸 개구리 연구소 탈출</h1>

<div id="game">

    <div id="room-container">

        <img
            id="room-image"
            src="images/room1.png"
            alt="방"
        >

        <img
            id="frog"
            class="hotspot"
            src="images/frog.png"
            onclick="inspectFrog()"
        >

        <img
            id="door"
            class="hotspot"
            src="images/door.png"
            onclick="openDoor()"
        >

    </div>

    <div id="message">
        수상한 연구소에 갇혔다...
    </div>

</div>

<div id="inventory">
    <h3>인벤토리</h3>
    <div id="items">없음</div>
</div>

<script src="js/game.js"></script>

</body>
</html>
