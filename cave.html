<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동굴 입구</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100%;
}

body{
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow-x:hidden;
}

.game{
    position:relative;
    width:min(100%, 900px);
    margin:0 auto;
}

.bg{
    width:100%;
    display:block;
    position:relative;
    z-index:1;
}

/* 동굴 문 클릭 영역 */
.door{
    position:absolute;
    left:35%;
    top:28%;
    width:30%;
    height:35%;
    cursor:pointer;
    background:rgba(0,255,0,0.25);
    border:3px solid lime;
    z-index:10;
}

/* 버튼 공통 */
.game-btn{
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 30px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
    font-family:'GmarketSans', sans-serif;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* 돌아가기 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
    z-index:20;
}

/* 바로 들어가기 */
.enter-btn{
    position:absolute;
    left:50%;
    top:52%;
    transform:translateX(-50%);
    display:none;
    z-index:20;
}

/* 인벤토리 버튼 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
    z-index:999;
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
    font-family:'GmarketSans', sans-serif;
}

/* 팝업 */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.popup-box{
    position:relative;
    width:85%;
    max-width:500px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.close-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#ff9fd2;
    color:white;
    font-size:20px;
    cursor:pointer;
    font-family:'GmarketSans', sans-serif;
}

.popup-title{
    font-size:24px;
    color:#5b3719;
    margin-bottom:20px;
    line-height:1.8;
}

.popup-body{
    font-size:20px;
    color:#5b3719;
    line-height:1.8;
    margin-bottom:18px;
}

.choice-btn{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    font-size:18px;
    cursor:pointer;
    font-family:'GmarketSans', sans-serif;
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
}

.choice-btn:active{
    transform:scale(0.98);
}

@media (max-width: 600px){
    .game-btn{
        font-size:16px;
        padding:10px 24px;
    }

    .popup-title{
        font-size:22px;
    }

    .popup-body{
        font-size:18px;
    }

    .choice-btn{
        font-size:16px;
        padding:10px 14px;
    }

    .inventory-btn{
        width:58px;
        height:58px;
        font-size:26px;
    }
}
</style>
</head>
<body>

<div class="game">

    <img src="images/cave.png" class="bg" alt="동굴 입구">

    <!-- 동굴 문 -->
    <div class="door" onclick="openPopup()"></div>

    <!-- 바로 들어가기 -->
    <button class="game-btn enter-btn" id="enterBtn" onclick="location.href='cave_inside.html'">
        🚪 바로 들어가기
    </button>

    <!-- 돌아가기 -->
    <button class="game-btn back-btn" onclick="location.href='room1.html'">
        ↩ 돌아가기
    </button>

</div>

<!-- 인벤토리 -->
<button class="inventory-btn" onclick="location.href='inventory.html'">🎒</button>

<!-- 팝업 -->
<div class="popup" id="popup">
    <div class="popup-box">
        <button class="close-btn" onclick="closePopup()">✕</button>

        <div class="popup-title" id="popupContent">
            문을 어떻게 열지?
        </div>

        <div class="popup-body" id="popupBody"></div>

        <div id="buttons">
            <button class="choice-btn" onclick="useHand()">✋ 손</button>
            <button class="choice-btn" onclick="useAxe()">🪓 도끼</button>
        </div>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>
window.addEventListener("DOMContentLoaded", () => {
    localStorage.setItem("lastPage", "cave.html");

    if(localStorage.getItem("caveOpened") === "true"){
        document.getElementById("enterBtn").style.display = "block";
    }
});

function openPopup(){
    document.getElementById("popup").style.display = "flex";
    resetPopup();
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function resetPopup(){
    document.getElementById("popupContent").innerHTML = "문을 어떻게 열지?";
    document.getElementById("popupBody").innerHTML = "";
    document.getElementById("buttons").innerHTML = `
        <button class="choice-btn" onclick="useHand()">✋ 손</button>
        <button class="choice-btn" onclick="useAxe()">🪓 도끼</button>
    `;
}

function useHand(){
    document.getElementById("popupContent").innerHTML = "아야얏,<br>너무 단단해서 열 수가 없어.....";
    document.getElementById("popupBody").innerHTML = "";
    document.getElementById("buttons").innerHTML = `
        <button class="choice-btn" onclick="resetPopup()">확인</button>
    `;
}

function resetPopup(){
    resetPopup;
    document.getElementById("popupContent").innerHTML = "문을 어떻게 열지?";
    document.getElementById("popupBody").innerHTML = "";
    document.getElementById("buttons").innerHTML = `
        <button class="choice-btn" onclick="useHand()">✋ 손</button>
        <button class="choice-btn" onclick="useAxe()">🪓 도끼</button>
    `;
}

function useAxe(){
    if(hasItem("axe")){
        document.getElementById("popupContent").innerHTML = "깡! 깡!<br><br>내가 해냈다.....!";
        document.getElementById("popupBody").innerHTML = "";
        document.getElementById("buttons").innerHTML = `
            <button class="choice-btn" onclick="enterCave()">들어가기</button>
        `;

        removeItem("axe");
    }else{
        document.getElementById("popupContent").innerHTML = "아, 맞다.<br><br>도끼가 없지?<br><br>머석타드 ㅎㅎ";
        document.getElementById("popupBody").innerHTML = "";
        document.getElementById("buttons").innerHTML = `
            <button class="choice-btn" onclick="resetPopup()">확인</button>
        `;
    }
}

function enterCave(){
    localStorage.setItem("caveOpened", "true");
    document.getElementById("enterBtn").style.display = "block";
    closePopup();
    location.href = "cave_inside.html";
}
</script>

</body>
</html>
