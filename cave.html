<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>동굴 입구</title>

<style>

@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'GmarketSans', sans-serif;
}

.game{
    position:relative;
    width:100%;
    max-width:900px;
    margin:auto;
}

.bg{
    width:100%;
    display:block;
}

/* 문 클릭 영역 */

.door{
    position:absolute;

    left:35%;
    top:28%;

    width:30%;
    height:35%;

    cursor:pointer;

    /* 디버그용 */
    background:rgba(0,255,0,0.3);
    border:3px solid lime;
}

/* 버튼 공통 */

.game-btn{

    background:#f9e9c8;

    border:6px solid #c89b5d;

    border-radius:30px;

    padding:12px 30px;

    font-size:18px;

    color:#5b3719;

    cursor:pointer;
}

/* 돌아가기 */

.back-btn{

    position:absolute;

    bottom:3%;

    left:50%;

    transform:translateX(-50%);
}

/* 바로 들어가기 */

.enter-btn{

    position:absolute;

    top:3%;

    right:3%;

    display:none;
}

/* 팝업 */

.popup{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.6);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:100;
}

.popup-box{

    position:relative;

    width:85%;

    max-width:500px;

    background:#f9e9c8;

    border:6px solid #c89b5d;

    border-radius:30px;

    padding:25px;

    text-align:center;
}

.close-btn{

    position:absolute;

    top:10px;

    right:10px;

    width:40px;

    height:40px;

    border:none;

    border-radius:50%;

    background:#ff9fd2;

    color:white;

    font-size:20px;

    cursor:pointer;
}

.popup-title{

    font-size:24px;

    color:#5b3719;

    margin-bottom:20px;

    line-height:1.8;
}

.choice-btn{

    display:block;

    width:100%;

    margin:10px 0;

    padding:12px;

    border:none;

    border-radius:20px;

    background:#ff9fd2;

    color:white;

    font-size:18px;

    cursor:pointer;
}

</style>
</head>
<body>

<div class="game">

    <img src="images/cave.png" class="bg">

    <div class="door" onclick="openPopup()"></div>

    <button
    class="game-btn enter-btn"
    id="enterBtn"
    onclick="location.href='cave_inside.html'">

    🚪 바로 들어가기

    </button>

    <button
    class="game-btn back-btn"
    onclick="location.href='room1.html'">

    ↩ 돌아가기

    </button>

</div>

<div class="popup" id="popup">

    <div class="popup-box">

        <button
        class="close-btn"
        onclick="closePopup()">

        ✕
        </button>

        <div
        class="popup-title"
        id="popupContent">

        문을 어떻게 열지?

        </div>

        <div id="buttons">

            <button
            class="choice-btn"
            onclick="useHand()">

            ✋ 손

            </button>

            <button
            class="choice-btn"
            onclick="useAxe()">

            🪓 도끼

            </button>

        </div>

    </div>

</div>

<script>

if(localStorage.getItem("caveOpened")){

    document.getElementById(
    "enterBtn"
    ).style.display="block";
}

function openPopup(){

    document.getElementById(
    "popup"
    ).style.display="flex";

    resetPopup();
}

function closePopup(){

    document.getElementById(
    "popup"
    ).style.display="none";
}

function resetPopup(){

    document.getElementById(
    "popupContent"
    ).innerHTML=
    "문을 어떻게 열지?";

    document.getElementById(
    "buttons"
    ).innerHTML=
    `
    <button
    class="choice-btn"
    onclick="useHand()">

    ✋ 손

    </button>

    <button
    class="choice-btn"
    onclick="useAxe()">

    🪓 도끼

    </button>
    `;
}

function useHand(){

    document.getElementById(
    "popupContent"
    ).innerHTML=
    "아야얏,<br>너무 단단해서 열 수가 없어.....";

    document.getElementById(
    "buttons"
    ).innerHTML=
    `
    <button
    class="choice-btn"
    onclick="resetPopup()">

    확인

    </button>
    `;
}

function useAxe(){

    if(localStorage.getItem("axe")){

        document.getElementById(
        "popupContent"
        ).innerHTML=
        "깡! 깡!<br><br>내가 해냈다.....!";

        document.getElementById(
        "buttons"
        ).innerHTML=
        `
        <button
        class="choice-btn"
        onclick="enterCave()">

        들어가기

        </button>
        `;
    }

    else{

        document.getElementById(
        "popupContent"
        ).innerHTML=
        "아, 맞다.<br><br>도끼가 없지?<br><br>머석타드 ㅎㅎ";

        document.getElementById(
        "buttons"
        ).innerHTML=
        `
        <button
        class="choice-btn"
        onclick="resetPopup()">

        확인

        </button>
        `;
    }
}

function enterCave(){

    localStorage.setItem(
    "caveOpened",
    "true"
    );

    location.href=
    "cave_inside.html";
}

</script>

</body>
</html>
