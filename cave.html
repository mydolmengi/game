<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동굴 내부</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

/* 버튼 */
.game-btn{
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 30px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
}

/* 바로가기 버튼 */
.enter-btn{
    position:absolute;
    left:50%;
    top:55%;
    transform:translateX(-50%);
    display:none;
}

/* 돌아가기 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
}

/* 인벤토리 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/cave_inside.png" class="bg">

    <!-- 🔥 마녀 집으로 이동 버튼 -->
    <button class="game-btn enter-btn" id="enterBtn"
    onclick="location.href='cave_mage.html'">
        마녀의 집으로 바로가기
    </button>

    <!-- ↩ 돌아가기 -->
    <button class="game-btn back-btn"
    onclick="location.href='cave.html'">
        돌아가기
    </button>

</div>

<!-- 🎒 인벤토리 -->
<button class="inventory-btn"
onclick="location.href='inventory.html'">🎒</button>

<script>

/* ======================
   핵심 FIX
====================== */
window.onload = function(){

    // 🔥 동굴 입구 클리어 상태 체크
    if(localStorage.getItem("caveOpened") === "true"){
        document.getElementById("enterBtn").style.display = "block";
    }

    // 현재 위치 저장 (인벤 복귀용)
    localStorage.setItem("lastPage","cave_inside.html");
};

</script>

</body>
</html>
