<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동굴 입구</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
}

.game{
    position:relative;
    width:min(100%, 900px);
}

.bg{
    width:100%;
    display:block;
}

/* 방패 */
.shield-item{
    position:absolute;
    left:8%;
    bottom:10%;
    width:12%;
    cursor:pointer;
}

/* 문 */
.door{
    position:absolute;
    left:35%;
    top:28%;
    width:30%;
    height:35%;
    cursor:pointer;
    background:rgba(0,255,0,0.25);
}

/* 버튼 */
.game-btn{
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
    color:#5b3719;
}

.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);
}

.enter-btn{
    position:absolute;
    left:50%;
    top:52%;
    transform:translateX(-50%);
    display:none;
}

/* 인벤토리 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/cave.png" class="bg">

    <!-- 방패 -->
    <img src="images/shield.png"
         class="shield-item"
         id="shield"
         onclick="getShield()">

    <!-- 문 -->
    <div class="door" onclick="useAxe()"></div>

    <!-- 바로가기 -->
    <button class="game-btn enter-btn" id="enterBtn"
    onclick="location.href='cave_inside.html'">
        🚪 바로 들어가기
    </button>

    <!-- 돌아가기 -->
    <button class="game-btn back-btn"
    onclick="location.href='room1.html'">
        ↩ 돌아가기
    </button>

</div>

<button class="inventory-btn"
onclick="location.href='inventory.html'">🎒</button>

<script src="js/inventory.js"></script>

<script>

/* ======================
   도끼 사용 (핵심)
====================== */
function useAxe(){

    if(!hasItem("axe")) return;

    removeItem("axe");

    // 상태 저장 (핵심)
    localStorage.setItem("caveOpened","true");
    localStorage.setItem("caveUnlocked","true");

    // 버튼 활성화
    const btn = document.getElementById("enterBtn");
    if(btn) btn.style.display = "block";

    // 즉시 이동
    location.href = "cave_inside.html";
}

/* ======================
   방패
====================== */
function getShield(){

    if(hasItem("shield")) return;

    addItem("shield");

    document.getElementById("shield").style.display = "none";

    alert("🛡 방패 획득!");
}

/* ======================
   상태 복구
====================== */
window.addEventListener("DOMContentLoaded", () => {

    if(localStorage.getItem("caveUnlocked") === "true"){
        document.getElementById("enterBtn").style.display = "block";
    }
});

</script>

</body>
</html>
