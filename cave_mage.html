<script src="js/inventory.js"></script>

<script>

/* =========================
   마녀 선물 시스템 (FIXED)
========================= */

function giveGift(){

    const input = document.getElementById("giftInput").value.trim();

    let giftId = "";

    if(input.includes("흑당") || input.includes("버블") || input.includes("티라미슈")){
        giftId = "sweet";
    }
    else if(input.includes("짬뽕") || input.includes("아메리카노")){
        giftId = "normal";
    }
    else if(input.includes("황금사과")){
        giftId = "goldenApple";
    }
    else if(input.includes("도끼") || input.includes("방패") || input.includes("꽃")){
        giftId = "bad";
    }

    /* =========================
       반응 시스템
    ========================= */

    if(giftId === "sweet"){

        openPopup(
            "마녀",
            "개맛도리~ 감사용",
            `<button class='choice-btn' onclick='openWitchMenu()'>확인</button>`
        );
    }

    else if(giftId === "normal"){

        openPopup(
            "마녀",
            "아니 난 괜찮아. 너 먹어",
            `<button class='choice-btn' onclick='openWitchMenu()'>확인</button>`
        );
    }

    else if(giftId === "goldenApple"){

        safeAddItem("dateCoupon"); // ⭐ 핵심 추가

        openPopup(
            "마녀",
            `
                <img class="popup-img" src="images/date_coupon.png">
                <div>...뭐야? 어이없네 ㅋ 풉</div>
                <div style="margin-top:10px;font-weight:bold;">
                    💌 마녀와 데이트 쿠폰 획득!
                </div>
            `,
            `<button class='choice-btn' onclick='openWitchMenu()'>확인</button>`
        );
    }

    else if(giftId === "bad"){

        openPopup(
            "마녀",
            "이걸 왜 줌?",
            `<button class='choice-btn' onclick='openWitchMenu()'>확인</button>`
        );
    }

    else{

        openPopup(
            "마녀",
            "흠... 어디있어? 없잖아",
            `<button class='choice-btn' onclick='openWitchMenu()'>확인</button>`
        );
    }
}

</script>
