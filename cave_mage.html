<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RPG MAP EDITOR PRO MAX</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    font-family:sans-serif;
}

/* ======================
   STAGE
====================== */
.wrapper{
    position:relative;
    width:900px;
    user-select:none;
}

.wrapper img{
    width:100%;
    display:block;
}

/* ======================
   BOX
====================== */
.box{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,0,0,0.25);
    border:2px dashed red;
    cursor:grab;
    transform-origin:center;
}

/* ======================
   ROTATE HANDLE
====================== */
.rotate-icon{
    position:absolute;
    top:-25px;
    left:50%;
    transform:translateX(-50%);
    width:30px;
    height:30px;
    background:#fff;
    border-radius:50%;
    border:2px solid #000;
    cursor:grab;
}

.rotate-icon::after{
    content:"🔄";
    font-size:18px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ======================
   PANEL
====================== */
#panel{
    position:fixed;
    top:10px;
    left:10px;
    width:320px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    z-index:9999;
}

textarea{
    width:100%;
    height:200px;
}
button{
    width:100%;
    margin-top:5px;
    padding:8px;
}
</style>
</head>

<body>

<div id="panel">
<b>MAP EDITOR PRO MAX</b>

<button onclick="addBox()">+ 오브젝트 추가</button>
<button onclick="saveMap()">저장</button>
<button onclick="loadMap()">불러오기</button>

<textarea id="output"></textarea>
</div>

<div class="wrapper" id="map">
    <img src="images/cave_mage_bg.png">
</div>

<script>

let activeBox = null;
let activeRotate = null;

let offsetX = 0;
let offsetY = 0;

let zIndex = 10;

/* ======================
   CREATE BOX
====================== */
function addBox(){

    const box = document.createElement("div");
    box.className = "box";

    box.style.left = "100px";
    box.style.top = "100px";
    box.style.zIndex = zIndex++;

    box.dataset.rotate = 0;
    box.dataset.name = prompt("이름") || "object";

    const rot = document.createElement("div");
    rot.className = "rotate-icon";

    box.appendChild(rot);
    document.getElementById("map").appendChild(box);

    enableDrag(box);
    enableRotate(rot, box);

    updateOutput();
}

/* ======================
   DRAG (FIXED)
====================== */
function enableDrag(box){

    box.addEventListener("mousedown",(e)=>{

        if(e.target.classList.contains("rotate-icon")) return;

        activeBox = box;

        const rect = box.getBoundingClientRect();

        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
    });
}

/* ======================
   ROTATE FIXED
====================== */
let startAngle = 0;
let startRotate = 0;

function enableRotate(icon, box){

    icon.addEventListener("mousedown",(e)=>{

        activeRotate = box;

        const r = box.getBoundingClientRect();

        const cx = r.left + r.width/2;
        const cy = r.top + r.height/2;

        startAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
        startRotate = parseFloat(box.dataset.rotate);

        e.stopPropagation();
    });
}

/* ======================
   MOVE ENGINE
====================== */
document.addEventListener("mousemove",(e)=>{

    const map = document.getElementById("map");
    const rect = map.getBoundingClientRect();

    /* DRAG */
    if(activeBox){

        let x = e.clientX - rect.left - offsetX;
        let y = e.clientY - rect.top - offsetY;

        activeBox.style.left = x + "px";
        activeBox.style.top = y + "px";

        updateOutput();
    }

    /* ROTATE */
    if(activeRotate){

        const r = activeRotate.getBoundingClientRect();

        const cx = r.left + r.width/2;
        const cy = r.top + r.height/2;

        const angle = Math.atan2(e.clientY - cy, e.clientX - cx);

        let deg = startRotate + (angle - startAngle) * 180 / Math.PI;

        activeRotate.style.transform = `rotate(${deg}deg)`;

        activeRotate.dataset.rotate = deg;

        updateOutput();
    }
});

document.addEventListener("mouseup",()=>{

    activeBox = null;
    activeRotate = null;
});

/* ======================
   OUTPUT (FIXED)
====================== */
function updateOutput(){

    const map = document.getElementById("map").getBoundingClientRect();
    const boxes = document.querySelectorAll(".box");

    let out = "";

    boxes.forEach(b=>{

        let x = b.offsetLeft;
        let y = b.offsetTop;

        let w = b.offsetWidth;
        let h = b.offsetHeight;

        let rot = b.dataset.rotate || 0;
        let name = b.dataset.name;

        out += `/* ${name} */\n`;
        out += `.${name}{ left:${x}px; top:${y}px; width:${w}px; height:${h}px; transform:rotate(${rot}deg); }\n\n`;
    });

    document.getElementById("output").value = out;
}

/* ======================
   SAVE / LOAD (NEW)
====================== */
function saveMap(){
    const data = [];

    document.querySelectorAll(".box").forEach(b=>{
        data.push({
            x: b.offsetLeft,
            y: b.offsetTop,
            w: b.offsetWidth,
            h: b.offsetHeight,
            r: b.dataset.rotate,
            name: b.dataset.name
        });
    });

    localStorage.setItem("mapData", JSON.stringify(data));
    alert("저장 완료");
}

function loadMap(){

    const data = JSON.parse(localStorage.getItem("mapData") || "[]");

    data.forEach(d=>{

        const box = document.createElement("div");
        box.className = "box";

        box.style.left = d.x + "px";
        box.style.top = d.y + "px";
        box.style.width = d.w + "px";
        box.style.height = d.h + "px";
        box.dataset.rotate = d.r;
        box.dataset.name = d.name;
        box.style.transform = `rotate(${d.r}deg)`;

        const rot = document.createElement("div");
        rot.className = "rotate-icon";

        box.appendChild(rot);
        document.getElementById("map").appendChild(box);

        enableDrag(box);
        enableRotate(rot, box);
    });

    alert("불러오기 완료");
}

</script>

</body>
</html>
