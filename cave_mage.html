<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마녀의 집</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{ width:100%; display:block; }

/* 클릭 영역 */
.hotspot{
    position:absolute;
    cursor:pointer;
    z-index:8;
    background:rgba(255,255,255,0);
}

/* 가마솥 */
.cauldron-zone{
    left:39%;
    top:48%;
    width:22%;
    height:28%;
}

/* 왼쪽 수정 */
.left-crystal-zone{
    left:6%;
    top:69%;
    width:15%;
    height:21%;
}

/* 오른쪽 수정 */
.right-crystal-zone{
    left:84%;
    top:41%;
    width:10%;
    height:18%;
}

/* 대화 */
.대화{
    left:143px;
    top:477px;
    width:123px;
    height:123px;
    transform:rotate(-25.42585725143388deg);
}

/* 돌아가기 */
.back-btn{
    position:absolute;
    left:50%;
    bottom:3%;
    transform:translateX(-50%);
    z-index:20;
    background:#6b5bff;
    border:6px solid #3b2fff;
    border-radius:30px;
    padding:12px 30px;
    font-size:18px;
    color:white;
    cursor:pointer;
}

/* 인벤토리 */
.inventory-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:65px;
    height:65px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    font-size:30px;
    cursor:pointer;
    z-index:9999;
}

/* 팝업 */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.68);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
    padding:18px;
}

.popup-box{
    width:100%;
    max-width:520px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:28px;
    padding:22px 20px 18px;
    text-align:center;
    position:relative;
}

/* 닫기 = 파란색 */
.close-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:#6b5bff;
    color:white;
    font-size:20px;
    cursor:pointer;
}

/* 공용 버튼 */
.choice-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    cursor:pointer;
    font-size:18px;
}

/* 이미지 */
.popup-img{
    width:min(100%, 320px);
    border-radius:18px;
    margin:0 auto 10px;
}

/* 파란 버튼 */
.choice-btn.blue{
    background:#6b5bff;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/cave_mage_bg.png" class="bg">

    <div class="hotspot cauldron-zone" onclick="openCauldron()"></div>
    <div class="hotspot left-crystal-zone" onclick="openDish()"></div>
    <div class="hotspot right-crystal-zone" onclick="openHint()"></div>
    <div class="hotspot 대화" onclick="openWitch()"></div>

</div>

<button class="inventory-btn" onclick="location.href='inventory.html'">🎒</button>

<!-- 팝업 -->
<div class="popup" id="popup">
    <div class="popup-box">

        <button class="close-btn" onclick="closePopup()">✕</button>

        <div id="popupBody"></div>
        <div id="popupBtns"></div>

    </div>
</div>

<script src="js/inventory.js"></script>

<script>

function openPopup(html, btns=""){
    document.getElementById("popupBody").innerHTML = html;
    document.getElementById("popupBtns").innerHTML = btns;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

/* =====================
   마녀 데이트 쿠폰 FIX
===================== */
function giveDateCoupon(){
    addItem("dateCoupon");

    openPopup(
        `
        <img class="popup-img" src="images/date_coupon.png">
        <div>...뭐야? 어이없네 ㅋ 풉</div>
        <div>💌 마녀와 데이트 쿠폰 획득!</div>
        `,
        `<button class="choice-btn" onclick="closePopup()">확인</button>`
    );
}

/* =====================
   선물 예시
===================== */
function openWitch(){
    openPopup(
        `
        <div>마녀와 대화</div>
        <img class="popup-img" src="images/witch.png">
        `,
        `
        <button class="choice-btn" onclick="alert('대화')">대화하기</button>
        <button class="choice-btn" onclick="alert('선물')">선물주기</button>
        <button class="choice-btn blue" onclick="closePopup()">닫기</button>
        `
    );
}

</script>

</body>
</html>
