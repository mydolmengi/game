<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지하통로</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

/* 지하문 오버레이 */
.door-panel{
    position:absolute;
    inset:0;
    background:url("images/underground_gate.png") center/cover no-repeat;
    z-index:3;
    transform-origin:center center;
    transition:
        transform 0.8s cubic-bezier(.2,.8,.2,1),
        opacity 0.55s ease,
        filter 0.55s ease;
    pointer-events:none;
}

.door-panel.open{
    transform:perspective(1100px) translateX(-18%) rotateY(-78deg) scaleX(0.62);
    opacity:0.18;
    filter:brightness(0.72);
}

/* 문 안쪽 열릴 때 보이는 빛 */
.portal-glow{
    position:absolute;
    left:50%;
    top:28%;
    width:34%;
    height:34%;
    transform:translateX(-50%);
    background:radial-gradient(circle at center,
        rgba(140,120,255,0.35) 0%,
        rgba(80,60,150,0.16) 38%,
        rgba(0,0,0,0) 72%);
    opacity:0;
    transition:opacity 0.5s ease;
    z-index:4;
    pointer-events:none;
}

.portal-glow.on{
    opacity:1;
}

/* 임벌레 */
.imb{
    position:absolute;
    left:50%;
    top:40%;
    transform:translateX(-50%);
    width:300px;
    height:300px;
    object-fit:contain;
    z-index:7;
    opacity:0;
    transition:opacity 0.35s ease;
    user-select:none;
    pointer-events:none;
}

.imb.show{
    opacity:1;
    animation:imbAppear 0.45s ease;
}

@keyframes imbAppear{
    0%{ transform:translateX(-50%) scale(0.75); }
    100%{ transform:translateX(-50%) scale(1); }
}

/* 실패 시: 더 크게 + 더 많이 회전 */
.imb.bigspin{
    opacity:1;
    animation:bigSpin 1.15s ease forwards;
}

@keyframes bigSpin{
    0%{
        transform:translateX(-50%) scale(1) rotate(0deg);
        filter:brightness(1);
    }
    30%{
        transform:translateX(-50%) scale(1.8) rotate(360deg);
    }
    60%{
        transform:translateX(-50%) scale(3.2) rotate(720deg);
    }
    100%{
        transform:translateX(-50%) scale(5.2) rotate(1080deg);
        filter:brightness(1.05);
    }
}

/* 퇴치제 효과 */
.imb.spray{
    animation:sprayHit 0.8s ease;
    filter:drop-shadow(0 0 18px rgba(120,255,120,0.7));
}

@keyframes sprayHit{
    0%   { transform:translateX(-50%) scale(1); }
    35%  { transform:translateX(-50%) scale(1.08); }
    70%  { transform:translateX(-50%) scale(0.96); }
    100% { transform:translateX(-50%) scale(1); }
}

.hidden{
    display:none;
}

/* 문 클릭 영역 */
.door-zone{
    position:absolute;
    left:33%;
    top:18%;
    width:34%;
    height:46%;
    cursor:pointer;
    z-index:8;
}

/* 안으로 들어가기 버튼 */
.enter-btn{
    position:absolute;
    left:50%;
    top:52%;
    transform:translateX(-50%);
    display:none;
    z-index:20;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 28px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    font-family:'GmarketSans', sans-serif;
}

/* 하단 설명창 */
.dialog-ui{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:31%;
    background:#efe0ba;
    border-top:6px solid #b88c49;
    box-shadow:0 -8px 24px rgba(0,0,0,0.28);
    padding:18px 18px 14px;
    z-index:15;
}

.dialog-ui::before{
    content:"";
    position:absolute;
    inset:10px;
    border:2px solid rgba(120, 88, 40, 0.18);
    border-radius:18px;
    pointer-events:none;
}

.dialog-name{
    color:#24509a;
    font-size:26px;
    font-weight:900;
    line-height:1;
    margin-bottom:8px;
    min-height:30px;
}

.dialog-text{
    color:#6b4b28;
    font-size:23px;
    line-height:1.7;
    white-space:pre-line;
    padding-right:92px;
    min-height:84px;
}

.dialog-actions{
    position:absolute;
    right:18px;
    bottom:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
}

.dialog-btn{
    background:#f7f1e1;
    border:4px solid #b88c49;
    border-radius:18px;
    padding:10px 16px;
    font-size:16px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
    font-family:'GmarketSans', sans-serif;
}

/* 선택 팝업 */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.popup-box{
    width:90%;
    max-width:520px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:28px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.popup-title{
    font-size:22px;
    color:#5b3719;
    margin-bottom:12px;
    line-height:1.6;
}

.popup-body{
    font-size:18px;
    color:#5b3719;
    line-height:1.6;
    margin-bottom:12px;
    white-space:pre-line;
}

.choice-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    cursor:pointer;
    font-size:18px;
    font-family:'GmarketSans', sans-serif;
}

.item-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:42vh;
    overflow:auto;
    margin-top:10px;
    padding-right:4px;
}

.item-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:18px;
    background:#fff;
    color:#5b3719;
    font-size:17px;
    cursor:pointer;
    border:2px solid #c89b5d;
    font-family:'GmarketSans', sans-serif;
}

@media (max-width: 600px){
    .dialog-name{
        font-size:22px;
    }

    .dialog-text{
        font-size:18px;
        line-height:1.6;
    }

    .dialog-ui{
        height:34%;
    }

    .imb{
        width:190px;
        height:190px;
        top:30%;
    }
}
</style>
</head>

<body>

<div class="game">

    <img src="images/underground_gate.png" class="bg" alt="지하문 배경">

    <div class="door-panel" id="doorPanel"></div>
    <div class="portal-glow" id="portalGlow"></div>

    <div class="door-zone" onclick="openDoorScene()"></div>

    <img src="images/imbure.png" class="imb hidden" id="imb" alt="임벌레">

    <button class="enter-btn" id="enterBtn" onclick="location.href='underground_hi.html'">
        안으로 들어가기
    </button>

    <div class="dialog-ui">
        <div class="dialog-name" id="dialogName">&nbsp;</div>
        <div class="dialog-text" id="dialogText">여긴가? 드디어 다왔군.<br>저 문으로 들어가면 되나?</div>
        <div class="dialog-actions" id="dialogActions">
            <button class="dialog-btn" onclick="nextIntro()">다음</button>
        </div>
    </div>

</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-title" id="popupTitle"></div>
        <div class="popup-body" id="popupBody"></div>
        <div id="popupActions"></div>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>
let introStep = 0;
let doorOpened = false;
let cleared = localStorage.getItem("undergroundCleared") === "true";
let introDone = false;
let encounterStep = 0;
let currentEncounterLines = [];

function setDialog(name, text, actionsHtml){
    const nameEl = document.getElementById("dialogName");
    const textEl = document.getElementById("dialogText");
    const actEl = document.getElementById("dialogActions");

    if(name && name.trim()){
        nameEl.textContent = name;
        nameEl.style.visibility = "visible";
    }else{
        nameEl.textContent = "";
        nameEl.style.visibility = "hidden";
    }

    textEl.innerHTML = text;
    actEl.innerHTML = actionsHtml || "";
}

function normalizeLabel(item){
    if(item === "bugSpray" || item === "insectSpray" || item === "벌레퇴치제") return "벌레퇴치제";
    if(item === "axe") return "도끼";
    if(item === "shield") return "방패";
    if(item === "key") return "열쇠";
    if(item === "heart") return "하트 생명";
    if(item === "bubbletea") return "흑당 버블티";
    if(item === "jjamppong") return "짬뽕";
    if(item === "flower") return "꽃";
    if(item === "iceAmericano") return "아이스 아메리카노";
    if(item === "tiramisu") return "티라미슈";
    if(item === "goldenApple") return "황금사과";
    return item;
}

function getInventorySafe(){
    try{
        if(typeof getInventory === "function"){
            const inv = getInventory();
            return Array.isArray(inv) ? inv : [];
        }
    }catch(e){}
    return [];
}

function removeItemSafe(item){
    try{
        if(typeof removeItem === "function"){
            removeItem(item);
            return;
        }
    }catch(e){}
}

function hasBugSprayItem(item){
    return item === "bugSpray" || item === "insectSpray" || item === "벌레퇴치제";
}

function openPopup(title, bodyHtml, actionsHtml = ""){
    document.getElementById("popupTitle").innerHTML = title || "";
    document.getElementById("popupBody").innerHTML = bodyHtml || "";
    document.getElementById("popupActions").innerHTML = actionsHtml || "";
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

window.addEventListener("DOMContentLoaded", () => {
    localStorage.setItem("lastPage", "underground.html");

    if(cleared){
        document.getElementById("enterBtn").style.display = "block";
    }
});

function nextIntro(){
    introStep++;

    if(introStep === 1){
        setDialog("", "여긴가? 드디어 다왔군.", `<button class="dialog-btn" onclick="nextIntro()">다음</button>`);
    }else if(introStep === 2){
        setDialog("", "저 문으로 들어가면 되나?", `<button class="dialog-btn" onclick="nextIntro()">다음</button>`);
    }else{
        introDone = true;
        setDialog("", "문을 클릭해보자.", "");
    }
}

function openDoorScene(){
    if(cleared){
        document.getElementById("enterBtn").style.display = "block";
        setDialog("", "이미 길은 열려 있다.", "");
        return;
    }

    if(!introDone){
        introDone = true;
    }

    if(doorOpened) return;
    doorOpened = true;

    const panel = document.getElementById("doorPanel");
    const glow = document.getElementById("portalGlow");
    const imb = document.getElementById("imb");

    panel.classList.add("open");

    setTimeout(() => {
        glow.classList.add("on");
        imb.classList.remove("hidden");
        imb.classList.add("show");

        currentEncounterLines = [
            { speaker:"임벌레", text:"여기는 무슨일이지?" },
            { speaker:"나", text:"애기미를 구하려왔다" },
            { speaker:"임벌레", text:"푸하하하, 이 바보같은 녀석." },
            { speaker:"나", text:"왜 비웃는거지?" },
            { speaker:"임벌레", text:"너의 모습을 보고 있으면 웃음이 나온다!" },
            { speaker:"나", text:"머라는거야..." },
            { speaker:"나", text:"걍 빨리 퇴치해버려야겠다" }
        ];
        encounterStep = 0;
        showEncounterLine();
    }, 550);
}

function showEncounterLine(){
    if(encounterStep >= currentEncounterLines.length){
        showEncounterChoices();
        return;
    }

    const line = currentEncounterLines[encounterStep];
    setDialog(
        line.speaker,
        line.text,
        `<button class="dialog-btn" onclick="nextEncounterLine()">다음</button>`
    );
}

function nextEncounterLine(){
    encounterStep++;
    showEncounterLine();
}

function showEncounterChoices(){
    setDialog(
        "",
        "",
        `
            <button class="dialog-btn" onclick="fightMode()">퇴치하기</button>
            <button class="dialog-btn" onclick="goHome()">집으로 돌아가기</button>
        `
    );
}

function goHome(){
    location.href = "house_inside.html";
}

function fightMode(){
    const items = getInventorySafe();

    if(items.length === 0){
        setDialog("", "가지고 있는 도구가 없다...", `<button class="dialog-btn" onclick="showEncounterChoices()">뒤로</button>`);
        return;
    }

    openPopup(
        "도구 선택하기",
        "인벤토리에서 사용할 것을 고르자.",
        ""
    );

    const actions = document.getElementById("popupActions");
    actions.innerHTML = "";

    const list = document.createElement("div");
    list.className = "item-list";

    items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item-btn";
        btn.innerText = normalizeLabel(item);
        btn.onclick = () => useItemForFight(item);
        list.appendChild(btn);
    });

    actions.appendChild(list);

    const closeBtn = document.createElement("button");
    closeBtn.className = "choice-btn";
    closeBtn.innerText = "닫기";
    closeBtn.onclick = () => closePopup();
    actions.appendChild(closeBtn);
}

function useItemForFight(item){
    closePopup();

    const itemName = normalizeLabel(item);
    setDialog("", `그래 ${itemName} 이걸로 널 처단한다`, "");

    setTimeout(() => {
        if(hasBugSprayItem(item)){
            const imb = document.getElementById("imb");
            imb.classList.remove("bigspin");
            imb.classList.add("spray");
            removeItemSafe(item);

            setDialog("임벌레", "앙돼...... 내가 퇴치되다니!!!!!!!", "");

            setTimeout(() => {
                imb.classList.add("hidden");
                document.getElementById("enterBtn").style.display = "block";
                localStorage.setItem("undergroundCleared", "true");
                cleared = true;
                setDialog("", "길이 열렸다.", `<button class="dialog-btn" onclick="location.href='underground_hi.html'">안으로 들어가기</button>`);
            }, 900);
        }else{
            const imb = document.getElementById("imb");
            imb.classList.remove("spray");
            imb.classList.add("bigspin");

            setDialog("", "음하하하하하하! 여긴 못들어간다!", "");

            setTimeout(() => {
                location.href = "kitchen.html";
            }, 1100);
        }
    }, 700);
}
</script>

</body>
</html>
