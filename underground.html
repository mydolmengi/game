<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지하통로</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    font-family:'GmarketSans', sans-serif;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
}

.game{
    position:relative;
    width:min(100%,900px);
}

.bg{
    width:100%;
    display:block;
}

/* 기본 하단 설명창 */
.dialog-ui{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:31%;
    background:#efe0ba;
    border-top:6px solid #b88c49;
    box-shadow:0 -8px 24px rgba(0,0,0,0.28);
    padding:18px 18px 14px;
    z-index:15;
}

.dialog-ui::before{
    content:"";
    position:absolute;
    inset:10px;
    border:2px solid rgba(120, 88, 40, 0.18);
    border-radius:18px;
    pointer-events:none;
}

.dialog-name{
    color:#24509a;
    font-size:26px;
    font-weight:900;
    line-height:1;
    margin-bottom:8px;
}

.dialog-text{
    color:#6b4b28;
    font-size:23px;
    line-height:1.7;
    white-space:pre-line;
    padding-right:92px;
    min-height:84px;
}

.dialog-actions{
    position:absolute;
    right:18px;
    bottom:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
}

.dialog-btn{
    background:#f7f1e1;
    border:4px solid #b88c49;
    border-radius:18px;
    padding:10px 16px;
    font-size:16px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 6px 14px rgba(0,0,0,0.12);
    font-family:'GmarketSans', sans-serif;
}

/* 문 클릭 영역 */
.door-zone{
    position:absolute;
    left:33%;
    top:18%;
    width:34%;
    height:46%;
    cursor:pointer;
    z-index:8;
}

/* 임벌레 */
.imb{
    position:absolute;
    left:50%;
    top:20%;
    transform:translateX(-50%);
    font-size:92px;
    z-index:9;
    transition:transform 0.35s ease, opacity 0.35s ease;
    user-select:none;
}

.imb.big{
    transform:translateX(-50%) scale(1.45);
}

.hidden{
    opacity:0;
    pointer-events:none;
}

/* 마녀/안쪽으로 들어가기 버튼 */
.enter-btn{
    position:absolute;
    left:50%;
    top:52%;
    transform:translateX(-50%);
    display:none;
    z-index:20;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:12px 28px;
    font-size:18px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* 인벤토리 선택 팝업 */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.popup-box{
    width:90%;
    max-width:520px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:28px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.popup-title{
    font-size:22px;
    color:#5b3719;
    margin-bottom:12px;
    line-height:1.6;
}

.popup-body{
    font-size:18px;
    color:#5b3719;
    line-height:1.6;
    margin-bottom:12px;
}

.choice-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#ff9fd2;
    color:white;
    cursor:pointer;
    font-size:18px;
    font-family:'GmarketSans', sans-serif;
}

.item-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:42vh;
    overflow:auto;
    margin-top:10px;
    padding-right:4px;
}

.item-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:18px;
    background:#fff;
    color:#5b3719;
    font-size:17px;
    cursor:pointer;
    border:2px solid #c89b5d;
    font-family:'GmarketSans', sans-serif;
}
</style>
</head>

<body>

<div class="game">

    <img src="images/underground_gate.png" class="bg" alt="지하문">

    <!-- 문 영역 -->
    <div class="door-zone" onclick="openDoorScene()"></div>

    <!-- 임벌레 -->
    <div class="imb" id="imb">🐛</div>

    <!-- 안으로 들어가기 -->
    <button class="enter-btn" id="enterBtn" onclick="location.href='underground_hi.html'">
        안으로 들어가기
    </button>

    <!-- 하단 대사창 -->
    <div class="dialog-ui">
        <div class="dialog-name" id="dialogName">혼잣말</div>
        <div class="dialog-text" id="dialogText">여긴가? 드디어 다왔군.\n저 문으로 들어가면 되나?</div>
        <div class="dialog-actions" id="dialogActions">
            <button class="dialog-btn" onclick="nextIntro()">다음</button>
        </div>
    </div>

</div>

<!-- 인벤토리 선택 팝업 -->
<div class="popup" id="popup">
    <div class="popup-box">
        <div class="popup-title" id="popupTitle"></div>
        <div class="popup-body" id="popupBody"></div>
        <div id="popupActions"></div>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>
let introStep = 0;
let battleMode = false;
let cleared = localStorage.getItem("undergroundCleared") === "true";

function setDialog(name, text, actionsHtml){
    document.getElementById("dialogName").innerText = name;
    document.getElementById("dialogText").innerHTML = text;
    document.getElementById("dialogActions").innerHTML = actionsHtml || "";
}

window.addEventListener("DOMContentLoaded", () => {
    localStorage.setItem("lastPage", "underground.html");

    if(cleared){
        document.getElementById("enterBtn").style.display = "block";
    }
});

function nextIntro(){
    introStep++;

    if(introStep === 1){
        setDialog("혼잣말", "여긴가? 드디어 다왔군.", `<button class="dialog-btn" onclick="nextIntro()">다음</button>`);
    } else if(introStep === 2){
        setDialog("혼잣말", "저 문으로 들어가면 되나?", `<button class="dialog-btn" onclick="nextIntro()">다음</button>`);
    } else {
        setDialog("혼잣말", "문을 클릭해보자.", "");
    }
}

function openDoorScene(){
    if(cleared){
        document.getElementById("enterBtn").style.display = "block";
        setDialog("혼잣말", "이미 길은 열려 있다.", "");
        return;
    }

    document.getElementById("imb").classList.remove("hidden");
    setDialog(
        "임벌레",
        "여기는 무슨일이지?\n애기미를 구하려왔다.\n푸하하하, 이 바보같은 녀석.\n왜 비웃는거지?\n너의 모습을 보고 있으면 웃음이 나온다!\n머라는거야...\n걍 빨리 퇴치해버려야겠다.",
        `
            <button class="dialog-btn" onclick="fightMode()">퇴치하기</button>
            <button class="dialog-btn" onclick="goHome()">집으로 돌아가기</button>
        `
    );
}

function goHome(){
    location.href = "house_inside.html";
}

function fightMode(){
    battleMode = true;

    const inv = getInventory ? getInventory() : [];
    const mapped = inv.map(item => {
        if(item === "bugSpray" || item === "벌레퇴치제" || item === "insectSpray") return "벌레퇴치제";
        if(item === "axe") return "도끼";
        if(item === "shield") return "방패";
        if(item === "key") return "열쇠";
        if(item === "heart") return "하트 생명";
        if(item === "bubbletea") return "흑당 버블티";
        if(item === "jjamppong") return "짬뽕";
        return item;
    });

    if(mapped.length === 0){
        setDialog("혼잣말", "가지고 있는 도구가 없다...", `<button class="dialog-btn" onclick="openDoorScene()">뒤로</button>`);
        return;
    }

    document.getElementById("popup").style.display = "flex";
    document.getElementById("popupTitle").innerText = "도구 선택하기";
    document.getElementById("popupBody").innerText = "인벤토리에서 사용할 것을 고르자.";
    document.getElementById("popupActions").innerHTML = "";

    const list = document.createElement("div");
    list.className = "item-list";

    const rawItems = getInventory ? getInventory() : [];
    rawItems.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item-btn";

        let label = item;
        if(item === "bugSpray" || item === "벌레퇴치제" || item === "insectSpray") label = "벌레퇴치제";
        else if(item === "axe") label = "도끼";
        else if(item === "shield") label = "방패";
        else if(item === "key") label = "열쇠";
        else if(item === "heart") label = "하트 생명";

        btn.innerText = label;
        btn.onclick = () => useItemForFight(item);
        list.appendChild(btn);
    });

    const actions = document.getElementById("popupActions");
    actions.appendChild(list);

    const backBtn = document.createElement("button");
    backBtn.className = "choice-btn";
    backBtn.innerText = "닫기";
    backBtn.onclick = () => {
        document.getElementById("popup").style.display = "none";
    };
    actions.appendChild(backBtn);
}

function useItemForFight(item){
    document.getElementById("popup").style.display = "none";

    const isBugSpray = item === "bugSpray" || item === "벌레퇴치제" || item === "insectSpray";

    if(isBugSpray){
        if(typeof removeItem === "function") removeItem(item === "벌레퇴치제" ? "bugSpray" : item);

        const imb = document.getElementById("imb");
        imb.style.opacity = "1";
        imb.classList.add("sprayed");

        setDialog("임벌레", "앙돼...... 내가 퇴치되다니!!!!!!!", "");
        setTimeout(() => {
            imb.classList.add("hidden");
            document.getElementById("enterBtn").style.display = "block";
            localStorage.setItem("undergroundCleared", "true");
            setDialog("혼잣말", "길이 열렸다.", `<button class="dialog-btn" onclick="location.href='underground_hi.html'">안으로 들어가기</button>`);
        }, 900);
        return;
    }

    const imb = document.getElementById("imb");
    imb.classList.add("big");

    setDialog("임벌레", "음하하하하하하! 여긴 못들어간다!", "");
    setTimeout(() => {
        location.href = "kitchen.html";
    }, 1100);
}

/* 퇴치제 효과 */
const sprayStyle = document.createElement("style");
sprayStyle.innerHTML = `
    .sprayed{
        animation:sprayPop 0.6s ease;
        filter:drop-shadow(0 0 18px rgba(120,255,120,0.65));
    }
    @keyframes sprayPop{
        0%{ transform:translateX(-50%) scale(1); opacity:1; }
        35%{ transform:translateX(-50%) scale(1.25); }
        70%{ transform:translateX(-50%) scale(0.95); }
        100%{ transform:translateX(-50%) scale(1); opacity:1; }
    }
`;
document.head.appendChild(sprayStyle);
</script>

</body>
</html>
