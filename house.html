<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>집</title>

<style>
@font-face {
    font-family: 'GmarketSans';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'GmarketSans', sans-serif;
}

.game{
    position:relative;
    width:100%;
    max-width:900px;
    margin:auto;
}

.bg{
    width:100%;
    display:block;
}

/* 문 클릭 영역 */
.door{
    position:absolute;
    left:42%;
    top:38%;
    width:16%;
    height:25%;
    cursor:pointer;

    background:rgba(0,255,0,0.3);
    border:3px solid lime;
}

/* 돌아가기 버튼 */
.back-btn{
    position:absolute;
    bottom:3%;
    left:50%;
    transform:translateX(-50%);

    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:14px 35px;
    font-size:20px;
    color:#5b3719;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* 바로 들어가기 버튼 */
.enter-btn{
    position:absolute;
    left:42%;
    top:38%;
    width:16%;
    height:25%;
    display:none;
    cursor:pointer;

    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:18px;
    font-size:16px;
    color:#5b3719;
    font-family:'GmarketSans', sans-serif;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    z-index:5;
}

/* 팝업 */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.popup-box{
    position:relative;
    width:85%;
    max-width:500px;
    background:#f9e9c8;
    border:6px solid #c89b5d;
    border-radius:30px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

/* 닫기 버튼 */
.close-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#ff9fd2;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.popup-title{
    font-size:24px;
    color:#5b3719;
    line-height:1.8;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:15px;
    border:2px solid #c89b5d;
    font-size:20px;
    text-align:center;
    margin-bottom:15px;
    outline:none;
}

.popup-btn{
    background:#ff9fd2;
    border:none;
    border-radius:20px;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

.message{
    margin-top:15px;
    color:#5b3719;
    font-size:20px;
    line-height:1.8;
}
</style>
</head>
<body>

<div class="game">
    <img src="images/house.png" class="bg" alt="집">

    <div class="door" onclick="openPopup()" title="문"></div>

    <button class="enter-btn" id="enterBtn" onclick="location.href='house_inside.html'">
        바로 들어가기
    </button>

    <button class="back-btn" onclick="location.href='room1.html'">
        ↩ 돌아가기
    </button>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <button class="close-btn" onclick="closePopup()">✕</button>

        <div class="popup-title">
            비밀번호를 입력하시오<br>
            (신중하게...)
        </div>

        <input type="password" id="pw" placeholder="비밀번호 입력">

        <button class="popup-btn" onclick="checkPassword()">
            확인
        </button>

        <div class="message" id="message"></div>
    </div>
</div>

<script>
let failCount = 0;

window.onload = function () {
    if (localStorage.getItem("houseOpened") === "true") {
        document.getElementById("enterBtn").style.display = "block";
    }
};

function openPopup(){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("pw").value = "";
    document.getElementById("message").innerHTML = "";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function checkPassword(){
    const pw = document.getElementById("pw").value;
    const msg = document.getElementById("message");

    if(pw === "0627"){
        localStorage.setItem("houseOpened", "true");
        location.href = "house_inside.html";
        return;
    }

    failCount++;

    if(failCount >= 3){
        msg.innerHTML = `
            흥! 신중하라고 했징!<br><br>
            <button class="popup-btn" onclick="resetTry()">
                네.... 신중하게 하겠움당
            </button>
        `;
        return;
    }

    msg.innerHTML = `
        갈!!!!!!!!<br>
        남의 집 몰래 들어가지마세욧!<br><br>
        <button class="popup-btn" onclick="retry()">
            다시 시도하기
        </button>
    `;
}

function retry(){
    document.getElementById("pw").value = "";
    document.getElementById("message").innerHTML = "";
}

function resetTry(){
    failCount = 0;
    retry();
}
</script>

</body>
</html>
