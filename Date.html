<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>데이트 선택</title>

<style>
@font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:'GmarketSans', sans-serif;
    overflow:hidden;
    background:#000;
}

.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    user-select:none;
    pointer-events:none;
}

.popup-wrap{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:18px;
}

.popup{
    width:min(92vw, 680px);
    background:#fff7e6;
    border:6px solid #d6a65c;
    border-radius:30px;
    padding:22px 20px 18px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.title{
    font-size:30px;
    color:#6b4318;
    margin-bottom:18px;
    line-height:1.3;
}

.ticket-list{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:18px;
    margin-bottom:22px;
}

.ticket{
    width:180px;
    cursor:pointer;
    transition:transform .2s ease;
}

.ticket:hover{
    transform:scale(1.04);
}

.ticket img{
    width:100%;
    border-radius:18px;
    background:#fff;
    padding:10px;
    box-shadow:0 8px 16px rgba(0,0,0,0.12);
}

.ticket-name{
    margin-top:10px;
    color:#5b3719;
    font-size:18px;
    line-height:1.35;
}

.empty{
    width:100%;
    color:#7a5b36;
    font-size:18px;
    margin-bottom:18px;
}

.back-btn{
    border:none;
    background:#f1d8a8;
    color:#5b3719;
    font-size:18px;
    padding:12px 28px;
    border-radius:16px;
    cursor:pointer;
}

@media (max-width:600px){
    .title{
        font-size:24px;
    }

    .ticket{
        width:150px;
    }

    .ticket-name{
        font-size:15px;
    }

    .empty{
        font-size:16px;
    }

    .back-btn{
        font-size:16px;
        padding:11px 22px;
    }
}
</style>
</head>
<body>

<img src="images/date_bg.png" class="bg" alt="카페 배경">

<div class="popup-wrap">
    <div class="popup">
        <div class="title">💕 데이트권을 선택하시오 💕</div>
        <div class="ticket-list" id="ticketList"></div>
        <button class="back-btn" onclick="location.href='room1.html'">돌아가기</button>
    </div>
</div>

<script src="js/inventory.js"></script>

<script>
const ticketList = document.getElementById("ticketList");

let inventory = [];
try{
    if(typeof getInventory === "function"){
        inventory = getInventory() || [];
    }else{
        inventory = JSON.parse(localStorage.getItem("inventory") || "[]");
    }
}catch(e){
    inventory = [];
}

function addTicket(img, name, target){
    const item = document.createElement("div");
    item.className = "ticket";
    item.onclick = () => location.href = target;
    item.innerHTML = `
        <img src="${img}" alt="${name}">
        <div class="ticket-name">${name}</div>
    `;
    ticketList.appendChild(item);
}

// 공주와 데이트 쿠폰
if(inventory.includes("pdateCoupon")){
    addTicket(
        "images/p_date_coupon.png",
        "💌 공주와 데이트",
        "pdate.html"
    );
}

// 마녀와 데이트 쿠폰
if(inventory.includes("dateCoupon")){
    addTicket(
        "images/date_coupon.png",
        "💌 마녀와 데이트",
        "adate.html"
    );
}

if(ticketList.children.length === 0){
    ticketList.innerHTML = `<div class="empty">사용할 수 있는 데이트권이 없습니다.</div>`;
}
</script>

</body>
</html>
