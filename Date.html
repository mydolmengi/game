
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>데이트 선택</title>

<style>

@font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'GmarketSans',sans-serif;
    overflow:hidden;
}

.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

.popup-wrap{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.35);

    display:flex;
    justify-content:center;
    align-items:center;
}

.popup{

    width:min(92vw,650px);

    background:#fff7e6;

    border:6px solid #d6a65c;

    border-radius:30px;

    padding:24px;

    text-align:center;

    box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.title{

    font-size:30px;

    color:#6b4318;

    margin-bottom:20px;
}

.ticket-list{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:20px;

    margin-bottom:25px;
}

.ticket{

    width:180px;

    cursor:pointer;

    transition:.2s;
}

.ticket:hover{

    transform:scale(1.05);
}

.ticket img{

    width:100%;

    border-radius:18px;

    background:white;

    padding:10px;
}

.ticket-name{

    margin-top:10px;

    color:#5b3719;

    font-size:18px;
}

.back-btn{

    border:none;

    background:#f1d8a8;

    color:#5b3719;

    font-size:18px;

    padding:12px 28px;

    border-radius:16px;

    cursor:pointer;
}

.empty{

    color:#7a5b36;

    font-size:18px;

    margin-bottom:20px;
}

</style>
</head>
<body>

<img
src="images/date_bg.png"
class="bg"
alt="카페">

<div class="popup-wrap">

    <div class="popup">

        <div class="title">
            💕 데이트권을 선택하시오 💕
        </div>

        <div
        class="ticket-list"
        id="ticketList">
        </div>

        <button
        class="back-btn"
        onclick="location.href='room1.html'">

            돌아가기

        </button>

    </div>

</div>

<script>

const ticketList =
document.getElementById("ticketList");

let inventory = [];

try{

    if(typeof getInventory === "function"){

        inventory = getInventory();

    }else{

        inventory =
        JSON.parse(
        localStorage.getItem("inventory")
        || "[]");
    }

}catch(e){}

function addTicket(
    img,
    name,
    target
){

    ticketList.innerHTML += `

        <div
        class="ticket"
        onclick="location.href='${target}'">

            <img
            src="${img}"
            alt="${name}">

            <div class="ticket-name">
                ${name}
            </div>

        </div>

    `;
}

/* 공주 */

if(
inventory.includes("pdateCoupon")
){

    addTicket(

        "images/p_date_coupon.png",

        "공주와 데이트",

        "pdate.html"
    );
}

/* 마녀 */

if(
inventory.includes("adateCoupon")
){

    addTicket(

        "images/date_coupon.png",

        "마녀와 데이트",

        "adate.html"
    );
}

if(
ticketList.innerHTML.trim() === ""
){

    ticketList.innerHTML = `

        <div class="empty">

            사용할 수 있는
            데이트권이 없습니다.

        </div>

    `;
}

</script>

</body>
</html>
