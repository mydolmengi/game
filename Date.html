<script src="js/inventory.js"></script>

<script>

const ticketList =
document.getElementById("ticketList");

let inventory = [];

try{

    if(typeof getInventory === "function"){

        inventory = getInventory();

    }else{

        inventory =
        JSON.parse(
        localStorage.getItem("inventory")
        || "[]");
    }

}catch(e){
    console.log(e);
}

function addTicket(
    img,
    name,
    target
){

    ticketList.innerHTML += `

        <div
        class="ticket"
        onclick="location.href='${target}'">

            <img
            src="${img}"
            alt="${name}">

            <div class="ticket-name">
                ${name}
            </div>

        </div>

    `;
}

/* 💌 공주와 데이트 쿠폰 */

if(
inventory.includes("pdateCoupon")
){

    addTicket(

        "images/p_date_coupon.png",

        "공주와 데이트",

        "pdate.html"
    );
}

/* 💌 마녀와 데이트 쿠폰 */

if(
inventory.includes("dateCoupon")
){

    addTicket(

        "images/date_coupon.png",

        "마녀와 데이트",

        "adate.html"
    );
}

/* 데이트권 없음 */

if(
ticketList.innerHTML.trim() === ""
){

    ticketList.innerHTML = `

        <div class="empty">

            사용할 수 있는
            데이트권이 없습니다.

        </div>

    `;
}

</script>
